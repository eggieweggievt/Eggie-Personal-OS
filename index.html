<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Eggie OS 🐙</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon.png" />
<!-- =========================================================================
  Eggie OS — a gentle VTuber content operating system, for Eggie 🐙
  Content pipeline (by format + pillar) · editable spoon-theory habits ·
  income + tax set-aside + sponsors · weekly review · ask.

  CONFIGURE: paste your Supabase URL + anon key in CONFIG below, then run
  supabase/eggie-os-setup.sql. Leave blank to run in demo mode.
  Everything (habits, goals, briefs, income) is editable right in the page.
========================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#fbf3f9; --bg2:#f3ecfb; --panel:#fff; --panel-soft:#fef7fc;
    --line:#f0dcec; --line-2:#ecd7ef; --ink:#4a3a4d; --ink-soft:#7c6a80; --muted:#ab9bb0;
    --pink:#ec7faf; --pink-deep:#db5e98; --lav:#a98fe0; --lav-deep:#8d6fd1;
    --mint:#5cc6a3; --peach:#f3a978; --rose:#ef7a85;
    --shadow:0 6px 22px rgba(180,120,170,.12); --shadow-sm:0 2px 8px rgba(180,120,170,.10);
    --r:18px; --sans:"Quicksand",ui-rounded,"SF Pro Rounded",system-ui,sans-serif; --display:"Fredoka",var(--sans);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:url("eggiebackground.png") center top/cover no-repeat fixed;opacity:.22;}
  body{background:var(--bg);background-image:radial-gradient(80% 50% at 100% 0%,#f7e0f0 0%,transparent 60%),radial-gradient(70% 50% at 0% 0%,#e9e0fb 0%,transparent 55%);background-attachment:fixed;color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;font-weight:500;-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:var(--display);font-weight:600;margin:0;}
  .muted{color:var(--muted);} .soft{color:var(--ink-soft);} .pink{color:var(--pink-deep);} .lav{color:var(--lav-deep);} .mint{color:var(--mint);}
  .num{font-variant-numeric:tabular-nums;} a{color:var(--lav-deep);}
  button{font-family:inherit;cursor:pointer;font-weight:600;} input,textarea,select{font-family:inherit;font-weight:500;}
  .label{font-size:10.5px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px;}
  .inp{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px 12px;color:var(--ink);font-size:13px;width:100%;outline:none;}
  .inp:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(236,127,175,.12);}
  textarea.inp{resize:vertical;}
  .btn{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;color:var(--ink-soft);font-size:12px;padding:7px 14px;transition:.15s;}
  .btn:hover{border-color:var(--pink);color:var(--pink-deep);}
  .btn-pink{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff;border:none;box-shadow:var(--shadow-sm);}
  .btn-pink:hover{filter:brightness(1.05);color:#fff;}
  .pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;letter-spacing:.03em;}
  .pill-pink{background:#fde4ef;color:var(--pink-deep);} .pill-lav{background:#ece2fb;color:var(--lav-deep);}
  .pill-mint{background:#ddf4ec;color:#2f9d79;} .pill-peach{background:#fdeadb;color:#cc7a3e;} .pill-gray{background:#f2ebf2;color:var(--muted);}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#ecd7ef;border-radius:9px;}
  #rail{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.78);backdrop-filter:blur(12px);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,#5cc6a3,#8fb8f0,#a98fe0,#ec7faf) 1;}
  .brand{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px;}
  .brand-logo-img{height:26px;width:auto;display:block;flex:0 0 auto;filter:drop-shadow(0 1px 3px rgba(141,111,209,.3));}
  .brand-name{background:linear-gradient(120deg,#5cc6a3,#8d6fd1 45%,#db5e98);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;letter-spacing:.02em;font-size:17px;}
  nav{display:flex;gap:4px;flex-wrap:wrap;}
  .tab{font-size:13px;padding:6px 13px;border-radius:999px;color:var(--ink-soft);border:none;background:none;}
  .tab.active{background:linear-gradient(135deg,#fde4ef,#ece2fb);color:var(--pink-deep);} .tab:hover{color:var(--pink-deep);}
  #rail .right{display:flex;align-items:center;gap:10px;}
  .chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1.5px solid var(--line-2);color:var(--muted);background:#fff;}
  .chip.on{color:var(--mint);border-color:#bfe9d8;background:#f0fbf6;} .chip.demo{color:var(--lav-deep);border-color:#ddcdf6;background:#f6f0ff;}
  .avatar{width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,var(--pink),var(--lav));display:grid;place-items:center;color:#fff;font-weight:700;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  main{padding:18px;max-width:1380px;margin:0 auto;}
  .grid-home{display:grid;grid-template-columns:320px minmax(0,1fr) 320px;gap:16px;}
  /* ---- modular dashboard ---- */
  .grid-modular{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));grid-auto-rows:8px;grid-auto-flow:row dense;gap:16px;}
  .home-widget{position:relative;transition:transform .24s cubic-bezier(.2,.8,.25,1);}
  .home-widget.resizing{transition:none;}
  #nav .tab{transition:transform .2s cubic-bezier(.2,.8,.25,1);}
  .drag-clone{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;border-radius:18px;box-shadow:0 16px 38px rgba(120,80,120,.34);opacity:.97;}
  .home-widget.dragsrc,#nav .tab.dragsrc{visibility:hidden;}
  .home-widget.reordering{outline:2px dashed var(--lav);outline-offset:3px;border-radius:18px;}
  .home-widget.resizing{outline:2px dashed var(--pink);outline-offset:3px;border-radius:18px;}
  .home-widget.min .panel,.home-widget.min section{max-height:50px;overflow:hidden;}
  .home-tools{position:absolute;top:9px;right:9px;z-index:6;display:flex;gap:3px;}
  .home-tools button{border:none;background:rgba(255,255,255,.6);border-radius:7px;font-size:11px;line-height:1;color:#9b8fae;cursor:pointer;padding:4px 6px;opacity:.4;touch-action:none;user-select:none;}
  .home-tools .home-grip{cursor:grab;}
  .home-widget:hover .home-tools button,.home-tools button:hover{opacity:.95;}
  .home-resize{position:absolute;right:3px;bottom:3px;z-index:6;border:none;background:rgba(255,255,255,.6);border-radius:7px;font-size:12px;line-height:1;color:#9b8fae;cursor:nwse-resize;padding:2px 5px;opacity:.4;touch-action:none;user-select:none;}
  .home-widget:hover .home-resize,.home-resize:hover{opacity:.95;}
  .home-add{border:2px dashed var(--line);border-radius:16px;background:rgba(255,255,255,.4);color:var(--lav-deep);font-size:13px;cursor:pointer;min-height:80px;grid-column:span 4;grid-row:span 4;}
  body.locked .home-tools,body.locked .home-resize,body.locked .home-add{display:none!important;}
  #nav .tab{touch-action:none;user-select:none;-webkit-user-select:none;}
  #nav .tab.reordering{opacity:.55;}
  .col{display:flex;flex-direction:column;gap:16px;}
  @media(max-width:1040px){.grid-home{grid-template-columns:1fr;}}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .soft-card{background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;padding:12px;}
  .seg{display:inline-flex;background:#f6eef6;border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap;}
  .seg button{border:none;background:none;border-radius:999px;padding:5px 11px;font-size:12px;color:var(--ink-soft);}
  .seg button.on{background:#fff;color:var(--pink-deep);box-shadow:var(--shadow-sm);}
  .hbtn{text-align:left;border:1.5px solid var(--line-2);border-radius:13px;padding:9px 11px;background:#fff;transition:.15s;}
  .hbtn.done{border-color:#bfe9d8;background:#f1fbf6;} .hbtn:hover{border-color:var(--pink);}
  .check{width:18px;height:18px;border-radius:7px;border:2px solid var(--line-2);background:#fff;flex:none;} .check.on{background:var(--mint);border-color:var(--mint);}
  .kanban{display:grid;grid-template-columns:repeat(7,minmax(150px,1fr));gap:10px;overflow-x:auto;padding-bottom:6px;}
  @media(max-width:1100px){.kanban{grid-template-columns:repeat(7,180px);}}
  .kcol{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:120px;}
  .citem{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px;transition:.15s;cursor:grab;box-shadow:var(--shadow-sm);}
  .citem:hover{border-color:var(--pink);} .citem.dim{opacity:.35;} .citem.hit{border-color:var(--lav);}
  .bar{height:6px;border-radius:999px;background:#f0e6f2;overflow:hidden;} .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--lav));}
  .modal-bg{position:fixed;inset:0;background:rgba(90,60,90,.32);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;}
  th{text-align:left;padding:8px 6px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:700;}
  td{padding:8px 6px;font-size:13px;border-bottom:1px solid var(--line);}
  .hidden{display:none!important;} .grow{flex:1;}
  .meter{position:relative;height:10px;border-radius:999px;background:#f0e6f2;overflow:hidden;}
  .meter>i{position:absolute;top:0;bottom:0;background:rgba(141,111,209,.18);} /* target band */
  .meter>b{position:absolute;top:0;bottom:0;left:0;border-radius:999px;background:linear-gradient(90deg,var(--pink),var(--lav));}
  .meter.ok>b{background:linear-gradient(90deg,#7ed0b0,var(--mint));}
  /* ---- gentle page transition (auto-off in calm / reduce-motion via the rules below) ---- */
  #view.view-enter{ animation:viewIn .4s cubic-bezier(.22,.61,.36,1) both; }
  #view.view-enter > *{ animation:panelIn .44s cubic-bezier(.22,.61,.36,1) both; }
  #view.view-enter > *:nth-child(2){ animation-delay:.06s; }
  #view.view-enter > *:nth-child(3){ animation-delay:.12s; }
  #view.view-enter > *:nth-child(4){ animation-delay:.18s; }
  #view.view-enter > *:nth-child(n+5){ animation-delay:.22s; }
  @keyframes viewIn{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;} }
  @keyframes panelIn{ from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:none;} }
  /* ---- calendar ---- */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:11px;text-align:center;color:var(--lav-deep);font-weight:600;padding:2px 0;}
  .cal-cell{min-height:94px;border:1px solid var(--line);border-radius:12px;padding:5px 6px;background:rgba(255,255,255,.5);display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s;}
  .cal-cell:hover{border-color:var(--lav);}
  .cal-cell.other{opacity:.4;}
  .cal-cell.today{border-color:var(--pink);box-shadow:inset 0 0 0 2px rgba(236,127,175,.25);}
  .cal-cell.drag-over{background:rgba(169,143,224,.18);border-color:var(--lav-deep);transform:scale(1.03);}
  .cal-daynum{font-size:11.5px;color:#8a7d92;align-self:flex-end;line-height:1;}
  .cal-cell.today .cal-daynum{color:var(--pink-deep);font-weight:700;}
  .cal-ev{font-size:11px;line-height:1.3;padding:3px 7px;border-radius:8px;color:#5a3b52;cursor:grab;user-select:none;white-space:normal;overflow-wrap:anywhere;word-break:break-word;transition:transform .12s,opacity .12s,box-shadow .12s;}
  .cal-ev:hover{box-shadow:0 2px 8px rgba(150,110,150,.28);}
  .cal-ev:active{cursor:grabbing;}
  .cal-ev.dragging{opacity:.45;transform:scale(.95);}
  .cal-ev.span{font-weight:500;}
  .cal-ev.span-start{border-top-right-radius:3px;border-bottom-right-radius:3px;}
  .cal-ev.span-mid{border-radius:3px;opacity:.9;}
  .cal-ev.span-end{border-top-left-radius:3px;border-bottom-left-radius:3px;opacity:.95;}
  .cal-stream{font-size:10.5px;line-height:1.25;padding:3px 7px;border-radius:8px;background:rgba(236,127,175,.16);color:var(--pink-deep);border-left:3px solid var(--pink);cursor:pointer;white-space:normal;overflow-wrap:anywhere;transition:background .12s;}
  .cal-stream:hover{background:rgba(236,127,175,.28);}
  .cal-game{font-size:10.5px;line-height:1.25;padding:3px 7px;border-radius:8px;background:rgba(117,138,198,.16);color:#46508a;border-left:3px solid #758ac6;cursor:pointer;white-space:normal;overflow-wrap:anywhere;transition:background .12s;}
  .cal-game:hover{background:rgba(117,138,198,.3);}
  .cal-content,.cc-chip{font-size:10.5px;line-height:1.25;padding:3px 7px;border-radius:8px;background:rgba(124,189,164,.2);color:#2f6a55;border-left:3px solid #5cc6a3;cursor:grab;white-space:normal;overflow-wrap:anywhere;transition:background .12s;}
  .cal-content{cursor:pointer;}
  .cal-content:hover,.cc-chip:hover{background:rgba(124,189,164,.34);}
  .cc-cell.drag-over{background:rgba(124,189,164,.18);border-color:#5cc6a3;}
  .cal-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;}
  /* ---- touch / iPad ---- */
  html{-webkit-text-size-adjust:100%;}
  .drop-hot{outline:2px dashed var(--lav-deep);outline-offset:-2px;}
  .drag-ghost{border-radius:8px;}
  /* ---- cursor petal trail ---- */
  .petal{position:fixed;pointer-events:none;z-index:9000;border-radius:150% 0 150% 0;will-change:transform,opacity;opacity:0;}
  @keyframes petalFloat{ 0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(.55);} 18%{opacity:var(--o,.7);} 100%{opacity:0;transform:translate(var(--dx,12px),var(--dy,60px)) rotate(var(--dr,200deg)) scale(1);} }
  /* ambient bubble field is a canvas (#bubbleCanvas) injected at boot — see the bubble IIFE */
  .kanban{-webkit-overflow-scrolling:touch;}
  .cal-ev,.cc-chip,.citem,[data-act="dragSponsor"],.sticky-head,.sticky-resize{touch-action:none;}
  @media (hover:none){
    .inp,input,textarea,select{font-size:16px;}   /* ≥16px stops iOS zoom-on-focus */
    .tab{padding:7px 13px;}
    .seg button{padding:7px 11px;}
    .check{min-width:20px;min-height:20px;}
    .hbtn,.chiptog,.btn{min-height:34px;}
    *{-webkit-tap-highlight-color:transparent;}
  }
  /* ---- accessibility ---- */
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
  body.calm *{animation:none!important;transition:none!important;}
  body.calm{background-image:none;background:#f6f2f6;--pink:#c79ab6;--pink-deep:#a87f9b;--lav:#aea0d2;--lav-deep:#8b7cb8;--mint:#7cbda4;--rose:#cf9aa0;--peach:#d8b291;}
  body.text-lg{font-size:16px;} body.text-lg .label{font-size:11.5px;} body.text-lg .citem,body.text-lg .pill{font-size:13px;}
  .scale{display:flex;gap:4px;flex-wrap:wrap;}
  .scale button{min-width:32px;height:32px;border:1.5px solid var(--line-2);border-radius:9px;background:#fff;color:var(--ink-soft);font-size:12px;}
  .scale button.on{background:linear-gradient(135deg,var(--pink),var(--lav));border-color:var(--pink);color:#fff;}
  .chiptog{border:1.5px solid var(--line-2);border-radius:999px;padding:7px 14px;background:#fff;color:var(--ink-soft);font-size:13px;display:inline-flex;align-items:center;gap:8px;}
  .chiptog.on{background:#fde4ef;border-color:var(--pink);color:var(--pink-deep);}
  .spark{display:flex;align-items:flex-end;gap:2px;height:34px;}
  .spark span{flex:1;background:linear-gradient(180deg,var(--pink),var(--lav));border-radius:3px 3px 0 0;min-height:2px;opacity:.85;}
  /* brain-dump note chips */
  .note{display:inline-block;background:var(--panel-soft);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:12px;color:var(--ink);cursor:pointer;max-width:100%;transition:.15s;}
  .note:hover{border-color:var(--pink);}
  /* floating sticky notes */
  #stickyLayer{position:fixed;inset:0;z-index:80;pointer-events:none;}
  .sticky{position:absolute;width:184px;height:150px;min-width:140px;min-height:108px;border-radius:12px;overflow:hidden;box-shadow:0 8px 22px rgba(120,80,120,.22);pointer-events:auto;display:flex;flex-direction:column;transform:rotate(-1deg);}
  .sticky-head{height:22px;display:flex;align-items:center;justify-content:space-between;padding:0 6px;cursor:grab;border-radius:12px 12px 0 0;flex:0 0 auto;}
  .sticky-head:active{cursor:grabbing;}
  .sticky-dot{width:13px;height:13px;border-radius:999px;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.5);cursor:pointer;}
  .sticky-x{border:none;background:none;font-size:15px;line-height:1;color:rgba(74,58,77,.55);cursor:pointer;}
  .sticky-tools{display:flex;gap:1px;flex-wrap:wrap;padding:1px 5px 2px;flex:0 0 auto;}
  .sticky-tools button{border:none;background:transparent;min-width:19px;height:18px;font-size:11px;line-height:1;color:rgba(74,58,77,.7);cursor:pointer;border-radius:4px;padding:0 3px;}
  .sticky-tools button:hover{background:rgba(0,0,0,.07);}
  .sticky-tools button.on{background:rgba(74,58,77,.18);color:#3a2d3d;}
  .sticky textarea{flex:1 1 auto;border:none;background:transparent;resize:none;outline:none;font-family:var(--sans);font-size:12.5px;color:#4a3a4d;padding:2px 10px 12px;}
  .sticky-resize{position:absolute;right:1px;bottom:0;width:16px;height:16px;font-size:10px;line-height:16px;text-align:center;color:rgba(74,58,77,.45);cursor:nwse-resize;user-select:none;}
  .sticky-resize:hover{color:rgba(74,58,77,.85);}
  #addStickyBtn{position:fixed;left:16px;bottom:16px;z-index:81;border:none;border-radius:999px;width:46px;height:46px;font-size:18px;background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff;box-shadow:var(--shadow);}
  /* floating focus timer */
  #focusBtn{position:fixed;right:16px;bottom:16px;z-index:81;border:1.5px solid var(--line-2);border-radius:999px;width:46px;height:46px;font-size:18px;background:#fff;box-shadow:var(--shadow);}
  #focusWidget{position:fixed;z-index:82;width:250px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 32px rgba(150,100,150,.26);padding:10px 12px 12px;}
  #focusWidget.hidden{display:none;}
  #focusWidget.min{width:156px;padding:6px 8px;}
  .ft-head{display:flex;align-items:center;justify-content:space-between;cursor:grab;}
  .ft-head:active{cursor:grabbing;}
  .ft-ic{border:none;background:none;color:var(--ink-soft);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:7px;}
  .ft-ic:hover{background:#f6eef6;color:var(--pink-deep);}
  .ft-ring{position:relative;width:118px;height:118px;margin:4px auto 6px;}
  .ft-ring.running svg{animation:ftpulse 2.6s ease-in-out infinite;}
  @keyframes ftpulse{0%,100%{filter:drop-shadow(0 0 0 rgba(236,127,175,0))}50%{filter:drop-shadow(0 0 7px rgba(236,127,175,.55))}}
  .ft-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:25px;color:var(--ink);}
  /* ---- planner ---- */
  .focus-one{box-shadow:var(--shadow);}
  /* ---- care: breathing bubble ---- */
  .breath-wrap{position:relative;height:240px;display:grid;place-items:center;}
  .breath-bubble{width:110px;height:110px;border-radius:999px;background:radial-gradient(circle at 35% 30%,#fcdcef,var(--pink) 58%,var(--lav));box-shadow:0 0 42px rgba(169,143,224,.5);transform:scale(1);will-change:transform;}
  .breath-label{position:absolute;font-family:var(--display);font-size:17px;color:#fff;text-shadow:0 1px 7px rgba(141,111,209,.65);pointer-events:none;}
  /* ---- care: DBT flip cards ---- */
  .dbt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
  .flip{perspective:1100px;min-height:208px;cursor:pointer;}
  .flip-inner{position:relative;width:100%;min-height:208px;transition:transform .6s;transform-style:preserve-3d;}
  .flip.open .flip-inner{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:1px solid var(--line);padding:14px;display:flex;flex-direction:column;}
  .flip-back{background:#fff;transform:rotateY(180deg);overflow:auto;}

const CAL_TZ_TARGET="America/New_York";
const CAL_TZS=[["America/New_York","ET · Eastern (your time)"],["America/Los_Angeles","PT · Pacific"],["America/Denver","MT · Mountain"],["America/Chicago","CT · Central"],["UTC","UTC"],["Europe/London","UK"],["Europe/Amsterdam","CET · Europe"],["Asia/Tokyo","JP · Japan"]];

function tzOffsetMs(tz,utcMs){ const p=new Intl.DateTimeFormat("en-US",{timeZone:tz,hourCycle:"h23",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}).formatToParts(new Date(utcMs)).reduce((a,x)=>(a[x.type]=x.value,a),{}); const asUTC=Date.UTC(+p.year,+p.month-1,+p.day,+p.hour,+p.minute,+p.second); return asUTC-utcMs; }
function wallToUtc(dateStr,timeStr,tz){ const [Y,M,D]=dateStr.split("-").map(Number); const [h,m]=(timeStr||"00:00").split(":").map(Number); const guess=Date.UTC(Y,M-1,D,h,m); let off=tzOffsetMs(tz,guess); off=tzOffsetMs(tz,guess-off); return guess-off; }
/* convert an event's wall-clock time in its source zone into Eastern; returns {etTime, etDate, dayDiff} or null */
function toET(dateStr,timeStr,tz){ if(!timeStr)return null; const utc=wallToUtc(dateStr,timeStr,tz||CAL_TZ_TARGET); const p=new Intl.DateTimeFormat("en-US",{timeZone:CAL_TZ_TARGET,hour:"numeric",minute:"2-digit",hour12:true,year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date(utc)).reduce((a,x)=>(a[x.type]=x.value,a),{}); const etDate=`${p.year}-${p.month}-${p.day}`; return { etTime:`${p.hour}:${p.minute} ${p.dayPeriod}`, etDate, dayDiff: etDate!==dateStr }; }
function fmt12(timeStr){ if(!timeStr)return ""; const [h,m]=timeStr.split(":").map(Number); const ap=h<12?"AM":"PM"; const hh=h%12||12; return `${hh}:${String(m).padStart(2,"0")} ${ap}`; }
/* date-string math for multi-day events ("YYYY-MM-DD") */
function calDiff(a,b){ const pa=a.split("-").map(Number), pb=b.split("-").map(Number); return Math.round((Date.UTC(pb[0],pb[1]-1,pb[2])-Date.UTC(pa[0],pa[1]-1,pa[2]))/86400000); }
function calAdd(ds,n){ const p=ds.split("-").map(Number); return new Date(Date.UTC(p[0],p[1]-1,p[2]+n)).toISOString().slice(0,10); }

async function renderCalendar(){
  const sent=await DB.daily(SENTINEL);
  const events=sent.calendarEvents||[];
  const schedule=sent.schedule||[];
  const games=GAME_RELEASES.concat(sent.gameEvents||[]);
  const showStream=localStorage.getItem("cal-hide-stream")!=="1", showGame=localStorage.getItem("cal-hide-game")!=="1", showEvent=localStorage.getItem("cal-hide-event")!=="1", showContent=localStorage.getItem("cal-hide-content")!=="1";
  const content = showContent ? await DB.content() : [];
  if(!state.calRef){ const t=new Date(); state.calRef=new Date(t.getFullYear(),t.getMonth(),1); }
  const ref=state.calRef, y=ref.getFullYear(), m=ref.getMonth();
  const startDow=new Date(y,m,1).getDay();
  const gridStart=new Date(y,m,1-startDow);
  const monthName=ref.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(gridStart); d.setDate(gridStart.getDate()+i);
    const ds=d.toLocaleDateString("en-CA");
    const inMonth=d.getMonth()===m, isToday=ds===TODAY;
    const dayShort=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    const streamChips=showStream?schedule.filter(s=>s.day===dayShort).map(s=>`<div class="cal-stream" data-act="editSchedule" title="Stream day — tap to edit your schedule">🔴 ${s.time?esc(s.time)+" · ":""}${esc(s.title||"Stream")}</div>`).join(""):"";
    const gameChips=showGame?games.filter(g=>g.date===ds).map(g=>`<div class="cal-game" ${g.url?`data-act="gameLink" data-url="${esc(g.url)}"`:""} title="${esc(g.title)}${g.approx?" — date is a window/estimate, not officially confirmed":""}">🎮 ${esc(g.title)}${g.approx?" ~":""}</div>`).join(""):"";
    const contentChips=showContent?content.filter(c=>!c.parent_id&&c.scheduled_for===ds).map(c=>`<div class="cal-content" data-act="openContent" data-id="${c.id}" title="${esc(c.title)}">🎬 ${stageShort(c.stage)} ${esc(c.title)}</div>`).join(""):"";
    const dayEvents=showEvent?events.filter(ev=>ds>=ev.date && ds<=((ev.endDate&&ev.endDate>=ev.date)?ev.endDate:ev.date)):[];
    dayEvents.sort((a,b)=>{ const sa=(a.endDate&&a.endDate>a.date)?0:1, sb=(b.endDate&&b.endDate>b.date)?0:1; if(sa!==sb)return sa-sb; return (a.time||"99:99").localeCompare(b.time||"99:99"); });
    const chips=dayEvents.map(ev=>{
      const end=(ev.endDate&&ev.endDate>ev.date)?ev.endDate:null;
      const isStart=ds===ev.date, isEnd=ds===(end||ev.date);
      const et=toET(ev.date,ev.time,ev.tz);
      const tip=esc((et?et.etTime+" ET — ":"")+ev.title+(end?` (through ${end})`:"")+(ev.note?" — "+ev.note:""));
      if(end){
        const span=isStart?"span-start":(isEnd?"span-end":"span-mid");
        const body=isStart?`${et?`<b>${et.etTime}</b> `:""}${esc(ev.title)}${ev.note?" 📝":""} ›`:(isEnd?`‹ ${esc(ev.title)}`:`‹ ${esc(ev.title)} ›`);
        return `<div class="cal-ev span ${span}" draggable="true" data-eid="${ev.id}" data-act="calEvent" style="background:${ev.color||CAL_COLORS[0]}" title="${tip}">${body}</div>`;
      }
      const tlabel=et?`<b>${et.etTime}${et.dayDiff?" (+1d)":""}</b> `:"";
      return `<div class="cal-ev" draggable="true" data-eid="${ev.id}" data-act="calEvent" style="background:${ev.color||CAL_COLORS[0]}" title="${tip}">${tlabel}${esc(ev.title)}${ev.note?" 📝":""}</div>`;
    }).join("");
    cells+=`<div class="cal-cell ${inMonth?"":"other"} ${isToday?"today":""}" data-date="${ds}" data-act="calAdd"><span class="cal-daynum">${d.getDate()}</span>${streamChips}${gameChips}${contentChips}${chips}</div>`;
  }
  return `<div class="panel" style="max-width:900px;margin:0 auto">
    <div class="card-head"><div><h2 style="font-size:18px">📅 ${monthName}</h2><div class="label" style="margin-top:2px">tap a day to add · drag to move · 🔴 streams · 🎮 games · 📹 scheduled content 🐙</div></div>
      <div style="display:flex;gap:6px"><button class="btn" data-act="calPrev" title="previous month">‹</button><button class="btn" data-act="calToday">today</button><button class="btn" data-act="calNext" title="next month">›</button></div></div>
    <div style="margin:2px 0 12px"><span class="label" style="margin-right:8px">show</span><div class="seg" style="display:inline-flex">
      <button data-act="calToggle" data-layer="stream" class="${showStream?"on":""}">🔴 Streams</button>
      <button data-act="calToggle" data-layer="game" class="${showGame?"on":""}">🎮 Games</button>
      <button data-act="calToggle" data-layer="event" class="${showEvent?"on":""}">🗓️ Events</button>
      <button data-act="calToggle" data-layer="content" class="${showContent?"on":""}">📹 Content</button>
    </div></div>
    <div class="cal-grid" style="margin-bottom:6px">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join("")}</div>
    <div class="cal-grid">${cells}</div>
    <p class="soft" style="font-size:11.5px;margin-top:12px">Nothing here is set in stone — drag things around whenever your week shifts. 💗</p>
  </div>`;
}

/* drag-to-move wiring — re-attached each render via postRender when the calendar is open */
function wireCalDnD(){
  let dragEid=null;
  document.querySelectorAll(".cal-ev").forEach(ev=>{
    ev.addEventListener("dragstart",e=>{ dragEid=ev.dataset.eid; ev.classList.add("dragging"); if(e.dataTransfer){e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",dragEid);}catch{}} });
    ev.addEventListener("dragend",()=>{ ev.classList.remove("dragging"); document.querySelectorAll(".cal-cell.drag-over").forEach(c=>c.classList.remove("drag-over")); });
  });
  document.querySelectorAll(".cal-cell").forEach(cell=>{
    cell.addEventListener("dragover",e=>{ e.preventDefault(); if(e.dataTransfer)e.dataTransfer.dropEffect="move"; cell.classList.add("drag-over"); });
    cell.addEventListener("dragleave",()=>cell.classList.remove("drag-over"));
    cell.addEventListener("drop",async e=>{
      e.preventDefault(); cell.classList.remove("drag-over");
      const eid=dragEid||(e.dataTransfer&&e.dataTransfer.getData("text/plain"));
      const date=cell.dataset.date;
      if(!eid||!date)return;
      if(RO){ toast("Read-only mode 🌸"); return; }
      await DB.saveDaily(SENTINEL,n=>{ const evs=(n.calendarEvents||[]).slice(); const t=evs.find(x=>x.id===eid); if(t){ if(t.endDate&&t.endDate>t.date){ const dur=calDiff(t.date,t.endDate); t.date=date; t.endDate=calAdd(date,dur); } else { t.date=date; } } return {...n,calendarEvents:evs}; });
      render();
    });
  });
}

    else if(state.tab==="script") html=await renderScript();
    else if(state.tab==="health") html=await renderHealth();

    else if(state.tab==="pitch") html=await renderPitch();

    else if(state.tab==="eugene") html=renderEugene();
    view.innerHTML=html;                                    // single swap — no "loading…" flash on re-renders
    postRender(); renderStickies();

    else { window.scrollTo(0,sy); }                         // keep your place on toggles / edits

/* ===== generic modular page: any page = a reorderable/resizable grid of keyed boxes ===== */
function layoutFor(tab){ const L=(SENT.layouts&&SENT.layouts[tab])||{}; return {order:L.order||[],size:L.size||{},min:L.min||{},hidden:L.hidden||{}}; }
/* items = [[key, html], ...]; defCols = default column span per card (4≈3-up, 6≈2-up, 12≈full) */
function modularPage(tab, labels, items, defCols){
  const L=layoutFor(tab), map=Object.fromEntries(items);
  let order=L.order.length?L.order.filter(k=>map[k]!=null):[];
  items.forEach(it=>{ if(!order.includes(it[0]))order.push(it[0]); });
  const sz=k=>{ const r=L.size[k]; return (typeof r==="number")?{c:r}:(r||{}); };
  const dc=defCols||(items.length<=2?12:6);
  const cells=order.filter(k=>!L.hidden[k]).map(k=>{ const s=sz(k), cols=Math.max(3,s.c||dc), min=!!L.min[k];
    return `<div class="home-widget ${min?'min':''}" data-w="${k}" data-h="${s.h||''}" style="grid-column:span ${cols}">
      <div class="home-tools"><button class="home-grip" title="drag to move">⠿</button><button data-act="homeMin" data-w="${k}" title="${min?'expand':'minimize'}">${min?'＋':'–'}</button><button data-act="homeHide" data-w="${k}" title="remove">✕</button></div>
      <span class="home-resize" title="drag to resize ⤡">⤡</span>${map[k]}</div>`; }).join("");
  const hiddenN=Object.keys(L.hidden).filter(k=>L.hidden[k]&&map[k]).length;
  return `<div class="grid-modular" data-tab="${tab}" data-labels="${esc(JSON.stringify(labels))}">${cells}<button class="home-add" data-act="manageCards">＋ cards${hiddenN?` · ${hiddenN} hidden`:""}</button></div>`;
}
/* JS masonry: pack each widget's row-span to its content (or its set/min height) so there are no gaps */
function layoutHome(){
  const grid=document.querySelector(".grid-modular"); if(!grid)return;
  const rowH=8, gap=16;
  grid.querySelectorAll(".home-widget").forEach(w=>{ const panel=w.querySelector(".panel,section")||w.lastElementChild; if(!panel)return;
    let h;
    if(w.classList.contains("min")){ h=50; }
    else { const sh=parseFloat(w.dataset.h||"0")||0; panel.style.minHeight=sh?sh+"px":""; h=panel.getBoundingClientRect().height; }
    if(h>0)w.style.gridRowEnd="span "+Math.max(1,Math.ceil((h+gap)/(rowH+gap)));
  });
}

/* gentle, non-punitive pattern spotter for the Care center (emotion + executive function) */
function carePatterns(rows){
  const recs=rows.map(r=>(r.notes&&r.notes.care)||{}).filter(c=>Object.keys(c).length);
  const days=recs.length, out=[];
  const mean=a=>a.length?a.reduce((x,y)=>x+Number(y),0)/a.length:null;
  function cmp(cond,val){ const t=[],f=[]; recs.forEach(c=>{const o=val(c); if(o==null||o==="")return; (cond(c)?t:f).push(Number(o));}); return (t.length>=3&&f.length>=3)?{t:mean(t),f:mean(f)}:null; }
  const usedSkill=c=>(c.emoSkills&&c.emoSkills.length)||c.skill;
  const usedSupport=c=>(c.efSupports&&c.efSupports.length);
  { const cc=cmp(usedSkill,c=>c.mood); if(cc&&cc.t-cc.f>=0.6) out.push("🩷 On days you <b>used a regulation skill</b>, your mood tended to read a little brighter."); }
  { const cc=cmp(usedSupport,c=>c.efInit); if(cc&&cc.f-cc.t>=0.6) out.push("🪜 When you <b>broke things down or body-doubled</b>, starting felt easier (lower stuck-ness)."); }
  { const cc=cmp(c=>Number(c.efOverwhelm)>=3,c=>c.efInit); if(cc&&cc.t-cc.f>=0.6) out.push("🌪️ Higher-overwhelm days were harder to start on — those days, shrinking the first step may help most."); }
  { const cc=cmp(c=>!!c.joy,c=>c.mood); if(cc&&cc.t-cc.f>=0.5) out.push("💗 Days you <b>did something just for you</b> leaned brighter. Joy counts."); }
  const namedN=recs.filter(c=>c.feelings&&c.feelings.length).length;
  if(days>=5&&namedN>=3) out.push(`🔖 You named what you felt on ${namedN} of the last ${days} check-ins — that naming is regulation in action.`);
  return { days, items: out.slice(0,5) };
}

/* gentle, non-punitive pattern spotter over recent daily logs — correlations, never claims */
function healthPatterns(rows){
  const recs=rows.map(r=>({h:(r.notes&&r.notes.health)||{}, c:(r.notes&&r.notes.care)||{}})).filter(r=>Object.keys(r.h).length||Object.keys(r.c).length);
  const days=recs.length;
  const mean=a=>a.length?a.reduce((x,y)=>x+Number(y),0)/a.length:null;
  const vals=f=>recs.map(r=>r.h[f]).filter(v=>v!=null&&v!=="");
  function cmp(cond,outF){ const t=[],f=[]; recs.forEach(r=>{const o=r.h[outF]; if(o==null||o==="")return; (cond(r.h)?t:f).push(Number(o));}); return (t.length>=3&&f.length>=3)?{t:mean(t),f:mean(f)}:null; }
  const out=[];
  let mw=median(vals("water"));
  if(mw!=null&&mw>0){ const c=cmp(h=>Number(h.water)>=mw,"lighthead"); if(c&&c.f-c.t>=0.7) out.push("💧 On days you drank <b>more water</b>, you noted <b>less lightheadedness</b> — hydration may be helping you stand steadier."); }
  { const c=cmp(h=>!!h.compression,"lighthead"); if(c&&c.f-c.t>=0.7) out.push("🧦 Lightheadedness ran <b>lower on days you wore compression</b>."); }
  let ms=median(vals("salt"));
  if(ms!=null&&ms>0){ const c=cmp(h=>Number(h.salt)>=ms,"lighthead"); if(c&&c.f-c.t>=0.7) out.push("🧂 More salt / electrolyte days lined up with <b>less lightheadedness</b>."); }
  { const c=cmp(h=>Number(h.sleepH)>=7,"fog"); if(c&&c.f-c.t>=0.7) out.push("😴 Brain fog was <b>gentler after 7+ hours of sleep</b>."); }
  { const c=cmp(h=>Number(h.sleepH)>=7,"pain"); if(c&&c.f-c.t>=0.7) out.push("🌙 Pain tended to be <b>lower after a longer sleep</b>."); }
  { const c=cmp(h=>!!h.paced,"fatigue"); if(c&&c.f-c.t>=0.7) out.push("🐢 On days you <b>paced yourself</b>, fatigue ran lower — pacing seems to pay off for you."); }
  { const c=cmp(h=>!!h.movement,"pain"); if(c&&c.f-c.t>=0.7) out.push("🧘 Gentle-movement days had <b>slightly lower pain</b> on average."); }
  { const c=cmp(h=>Number(h.anxiety)>=3,"mood"); if(c&&c.t-c.f<=-0.8) out.push("🌧️ Your mood tends to <b>dip on higher-anxiety days</b> — those days may deserve extra gentleness."); }
  const joyN=recs.filter(r=>r.c&&r.c.joy).length;
  if(days>=5&&joyN>=1) out.push(`💗 You did something <b>just for you</b> on ${joyN} of the last ${days} tracked days. That counts.`);
  return { days, items:out.slice(0,5) };
}

function healthChartSVG(rows,key,max,offset,color,days){
  const sorted=rows.slice().sort((a,b)=>a.date.localeCompare(b.date)).slice(-days);
  const pts=sorted.map(r=>{ const hv=(r.notes&&r.notes.health)||{}; let raw=hv[key]; const has=raw!=null&&raw!==""; return {date:r.date, raw:has?Number(raw):null, v:has?Number(raw)+(offset||0):null}; });
  const W=680,H=168,padL=26,padR=12,padT=14,padB=22, n=pts.length, innerW=W-padL-padR, innerH=H-padT-padB;
  const X=i=> padL+(n<=1?innerW/2:i*innerW/(n-1)), Y=v=> padT+innerH*(1-Math.max(0,Math.min(1,v/max)));
  let grid=""; [0,0.5,1].forEach(g=>{ const yy=padT+innerH*(1-g); grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="#efe6f2" stroke-width="1"/><text x="${padL-5}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#b3a6c0">${Math.round(max*g-(offset||0))}</text>`; });
  let areas="",lines="",dots="",seg=[];
  const flush=()=>{ if(seg.length){ const lp=seg.map((p,i)=>(i?"L":"M")+X(p.i).toFixed(1)+" "+Y(p.v).toFixed(1)).join(" "); lines+=`<path d="${lp}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`; if(seg.length>1)areas+=`<path d="${lp} L${X(seg[seg.length-1].i).toFixed(1)} ${padT+innerH} L${X(seg[0].i).toFixed(1)} ${padT+innerH} Z" fill="url(#hgrad)"/>`; seg=[]; } };
  pts.forEach((p,i)=>{ if(p.v==null)flush(); else seg.push({i,v:p.v}); }); flush();
  pts.forEach((p,i)=>{ if(p.v!=null){ const last=i===n-1; dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="${last?3.8:2.6}" fill="#fff" stroke="${color}" stroke-width="${last?2.6:1.6}"><title>${p.date}: ${p.raw}</title></circle>`; } });
  const dl=ds=>{const p=ds.split("-");return p[1]+"/"+p[2];};
  const xl=n?`<text x="${X(0).toFixed(1)}" y="${H-6}" font-size="9" fill="#b3a6c0">${dl(pts[0].date)}</text><text x="${(W-padR).toFixed(1)}" y="${H-6}" text-anchor="end" font-size="9" fill="#b3a6c0">${dl(pts[n-1].date)}</text>`:"";
  const vals=pts.filter(p=>p.raw!=null).map(p=>p.raw);
  const summary=vals.length?`avg ${(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)} · range ${Math.min.apply(null,vals)}–${Math.max.apply(null,vals)} · ${vals.length} day${vals.length>1?"s":""} logged`:"no data for this one yet — log a few days 🌸";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:100%;height:auto;display:block"><defs><linearGradient id="hgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".5"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>${grid}${areas}${lines}${dots}${xl}</svg><div class="soft" style="font-size:11.5px;margin-top:4px;text-align:center">${summary}</div>`;
}

  const W=680,H=180,padL=30,padR=12,padT=14,padB=22, n=sorted.length, innerW=W-padL-padR, innerH=H-padT-padB;
  const X=i=> padL+(n<=1?innerW/2:i*innerW/(n-1)), Y=norm=> padT+innerH*(1-Math.max(0,Math.min(1,norm)));
  let grid=""; [0,0.5,1].forEach(g=>{ const yy=padT+innerH*(1-g); grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="#efe6f2" stroke-width="1"/><text x="${padL-5}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#b3a6c0">${Math.round(g*100)}%</text>`; });
  let body="", legend=[];
  metrics.forEach(m=>{ const key=m[0],label=m[1],max=m[2],offset=m[3],emoji=m[4],color=m[5];
    const pts=sorted.map((r,i)=>{ const hv=(r.notes&&r.notes.health)||{}; let raw=hv[key]; const has=raw!=null&&raw!==""; return {i, raw:has?Number(raw):null, norm:has?(Number(raw)+(offset||0))/max:null}; });
    let lines="",dots="",seg=[]; const flush=()=>{ if(seg.length){ const lp=seg.map((p,k)=>(k?"L":"M")+X(p.i).toFixed(1)+" "+Y(p.norm).toFixed(1)).join(" "); lines+=`<path d="${lp}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`; seg=[]; } };
    pts.forEach(p=>{ if(p.norm==null)flush(); else seg.push(p); }); flush();
    pts.forEach((p,i)=>{ if(p.norm!=null){ const last=i===n-1; dots+=`<circle cx="${X(p.i).toFixed(1)}" cy="${Y(p.norm).toFixed(1)}" r="${last?3.4:2.2}" fill="#fff" stroke="${color}" stroke-width="1.8"><title>${sorted[p.i].date} · ${label}: ${p.raw}</title></circle>`; } });
    body+=lines+dots;
    const vals=pts.filter(p=>p.raw!=null).map(p=>p.raw); const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):"—";
    legend.push(`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#5a4a5e"><span style="width:14px;height:3px;border-radius:2px;background:${color};display:inline-block"></span>${emoji} ${label} <span class="muted">avg ${avg}</span></span>`);
  });
  const dl=ds=>{const p=ds.split("-");return p[1]+"/"+p[2];};
  const xl=n?`<text x="${X(0).toFixed(1)}" y="${H-6}" font-size="9" fill="#b3a6c0">${dl(sorted[0].date)}</text><text x="${(W-padR).toFixed(1)}" y="${H-6}" text-anchor="end" font-size="9" fill="#b3a6c0">${dl(sorted[n-1].date)}</text>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:100%;height:auto;display:block">${grid}${body}${xl}</svg>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px">${legend.join("")}</div>
    <div class="soft" style="font-size:11px;margin-top:6px;text-align:center">each line scaled to its own range (0–100%) so you can compare shapes 🌸</div>`;
}

let _artInt=null;
function artPickGesture(){ return ART_GESTURES[Math.floor(Math.random()*ART_GESTURES.length)]; }
function artTimerStart(){ const t=state.art.timer=state.art.timer||{len:60,round:0,left:60}; t.on=true; t.left=t.len; t.round=(t.round||0)+1; t.subject=artPickGesture(); if(_artInt)clearInterval(_artInt); _artInt=setInterval(artTick,1000); render(); }
function artTimerStop(){ const t=state.art&&state.art.timer; if(t)t.on=false; if(_artInt){clearInterval(_artInt);_artInt=null;} render(); }
function artTimerSkip(){ const t=state.art&&state.art.timer; if(!t||!t.on)return; t.left=t.len; t.round=(t.round||0)+1; t.subject=artPickGesture(); artPaint(); }
function fmtClock(s){ s=Math.max(0,s); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); }
function artPaint(){ const t=state.art&&state.art.timer; if(!t)return; const d=document.getElementById("artTimerDisp"); if(d)d.textContent=fmtClock(t.left); const s=document.getElementById("artTimerSub"); if(s)s.textContent=t.subject||""; const r=document.getElementById("artTimerRound"); if(r)r.textContent="round "+t.round; }
function artTick(){ const t=state.art&&state.art.timer; if(!t||!t.on||state.tab!=="art"){ if(_artInt){clearInterval(_artInt);_artInt=null;} if(t)t.on=false; return; } t.left--; if(t.left<0){ t.round++; t.left=t.len-1; t.subject=artPickGesture(); const w=document.getElementById("artStage"); if(w){ w.style.background="#fdeaf3"; setTimeout(()=>{ w.style.background=""; },450); } } artPaint(); }

/* ===== web push: this device subscribes itself; the public key comes from the reminders function (GET) ===== */
if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js").catch(function(){}); }catch(e){} }
function b64ToU8(b64){ const pad="=".repeat((4-b64.length%4)%4); const s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/"); const raw=atob(s); return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
async function pushSubscribe(){
  try{
    if(!("serviceWorker" in navigator)||!("PushManager" in window)){ toast("This browser doesn't support push 🌸"); return; }
    if(DEMO||!SB){ toast("Push needs the backend — switch demo off first 🌸"); return; }
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ toast("Notifications are blocked for this site 🌸"); return; }
    let pub="";
    try{ const r=await fetch(CONFIG.url+"/functions/v1/reminders",{headers:{apikey:CONFIG.anonKey}}); const j=await r.json(); pub=j.publicKey||""; }catch(e){}
    if(!pub){ toast("Deploy the reminders function + set the VAPID keys first 🌸"); return; }
    const reg=await navigator.serviceWorker.register("sw.js"); await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(sub && sub.options && sub.options.applicationServerKey){ /* keep existing */ }
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToU8(pub)});
    const j2=sub.toJSON();
    await DB.saveDaily(SENTINEL,n=>{ const subs=(n.pushSubs||[]).filter(s=>s.endpoint!==j2.endpoint); subs.push({endpoint:j2.endpoint,keys:j2.keys,ua:(navigator.userAgent||"").slice(0,90),added:TODAY}); return {...n,pushSubs:subs}; });
    toast("This device gets pushes now — even with the tab closed 📲");
    render();
  }catch(e){ console.error(e); toast("Push setup hiccuped: "+(e.message||e)+" 🌸"); }
}

/* Eugene voice input — separate recognizer so it never clashes with the Script Writer's */
let EUREC=null, euRecOn=false;
function euMicToggle(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast("Voice needs Chrome or Edge on desktop 🌸"); return; }
  const btn=document.getElementById("euMicBtn");
  if(euRecOn){ euRecOn=false; try{EUREC&&EUREC.stop();}catch(e){} if(btn)btn.textContent="🎙️"; return; }
  try{ EUREC=new SR(); }catch(e){ toast("Couldn't start the mic 🌸"); return; }
  EUREC.lang="en-US"; EUREC.continuous=true; EUREC.interimResults=true; EUREC._fin="";
  EUREC.onresult=function(e){ let interim="",fin=""; for(let i=e.resultIndex;i<e.results.length;i++){ const tx=e.results[i][0].transcript; if(e.results[i].isFinal)fin+=tx; else interim+=tx; } if(fin)EUREC._fin=(EUREC._fin+" "+fin).trim(); const inp=document.getElementById("euInput"); if(inp)inp.value=(EUREC._fin+(interim?" "+interim:"")).trim(); };
  EUREC.onerror=function(e){ if(e.error==="not-allowed"||e.error==="service-not-allowed"){ toast("Let the browser use your mic 🌸"); euRecOn=false; const b=document.getElementById("euMicBtn"); if(b)b.textContent="🎙️"; } };
  EUREC.onend=function(){ if(euRecOn){ try{EUREC.start();}catch(e){} } };
  try{ EUREC.start(); euRecOn=true; if(btn)btn.textContent="⏹"; }catch(e){ toast("Mic busy — try again 🌸"); }
}

function openTeleprompter(text){
  text=(text||"").trim();
  if(!text){ toast("No script to read yet 🌸"); return; }
  closeTeleprompter();
  const ov=document.createElement("div"); ov.className="tp-overlay"; ov.id="tpOverlay";
  ov.innerHTML=`
    <div class="tp-bar">
      <button class="tp-go" id="tpPlay">▶ Play</button>
      <button id="tpRestart">↻ Restart</button>
      <label>🐢 Speed <input type="range" id="tpSpeed" min="10" max="240" value="55"> 🐇</label>
      <label>Size <input type="range" id="tpSize" min="24" max="92" value="44"></label>
      <label>Width <input type="range" id="tpWidth" min="30" max="100" value="70"></label>
      <button id="tpMirror" title="flip for teleprompter glass">🪞 Mirror</button>
      <div style="flex:1"></div>
      <span style="font-size:11.5px;color:#9a9ab0">space play/pause · ↑↓ speed · scroll to scrub · Esc close</span>
      <button id="tpClose">✕ Close</button>
    </div>
    <div class="tp-scroll" id="tpScroll">
      <div class="tp-mask"></div><div class="tp-line"></div>
      <div class="tp-text" id="tpText">${esc(text)}</div>
    </div>`;
  document.body.appendChild(ov);
  const txt=ov.querySelector("#tpText");
  const T={y:0,speed:55,size:44,width:70,playing:false,mirror:false,raf:null,last:0};
  function maxY(){ return Math.max(0, txt.scrollHeight - innerHeight*0.5); }
  function apply(){ txt.style.fontSize=T.size+"px"; txt.style.maxWidth=T.width+"%"; txt.style.transform=(T.mirror?"scaleX(-1) ":"")+"translateY("+(-T.y)+"px)"; }
  function setPlay(p){ T.playing=p; const b=ov.querySelector("#tpPlay"); b.textContent=p?"⏸ Pause":"▶ Play"; if(p){ T.last=0; T.raf=requestAnimationFrame(frame); } else if(T.raf){ cancelAnimationFrame(T.raf); T.raf=null; } }
  function frame(now){ if(!T.playing)return; const dt=Math.min(80, now-(T.last||now)); T.last=now; T.y+=T.speed*dt/1000; if(T.y>=maxY()){ T.y=maxY(); apply(); setPlay(false); return; } apply(); T.raf=requestAnimationFrame(frame); }
  ov.querySelector("#tpPlay").onclick=()=>setPlay(!T.playing);
  ov.querySelector("#tpRestart").onclick=()=>{ T.y=0; apply(); };
  ov.querySelector("#tpClose").onclick=closeTeleprompter;
  ov.querySelector("#tpMirror").onclick=function(){ T.mirror=!T.mirror; this.style.background=T.mirror?"#ec7faf":""; this.style.borderColor=T.mirror?"#ec7faf":""; apply(); };
  ov.querySelector("#tpSpeed").oninput=e=>{ T.speed=+e.target.value; };
  ov.querySelector("#tpSize").oninput=e=>{ T.size=+e.target.value; apply(); };
  ov.querySelector("#tpWidth").oninput=e=>{ T.width=+e.target.value; apply(); };
  ov.querySelector("#tpScroll").addEventListener("wheel",e=>{ e.preventDefault(); T.y=Math.max(0,Math.min(maxY(),T.y+e.deltaY)); apply(); },{passive:false});
  T._key=e=>{ if(!document.getElementById("tpOverlay"))return; if(e.key===" "){e.preventDefault();setPlay(!T.playing);} else if(e.key==="Escape"){closeTeleprompter();} else if(e.key==="ArrowUp"){e.preventDefault();T.speed=Math.min(240,T.speed+10);ov.querySelector("#tpSpeed").value=T.speed;} else if(e.key==="ArrowDown"){e.preventDefault();T.speed=Math.max(10,T.speed-10);ov.querySelector("#tpSpeed").value=T.speed;} };
  document.addEventListener("keydown",T._key);
  window._tp=T; apply();
}
function closeTeleprompter(){ const o=document.getElementById("tpOverlay"); if(o){ const T=window._tp; if(T){ if(T.raf)cancelAnimationFrame(T.raf); if(T._key)document.removeEventListener("keydown",T._key); } o.remove(); window._tp=null; } }

let RECOG=null, recOn=false;
function setRecBtn(on){ const b=document.getElementById("recBtn"); if(b){ b.textContent=on?"⏹ Stop":"🎙️ Record"; b.classList.toggle("on",on); } const h=document.getElementById("recHint"); if(h)h.textContent=on?"listening… speak naturally, tap Stop when you're done 🌸":""; }
function recToggle(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast("Voice typing needs Chrome or Edge on desktop 🌸"); return; }
  if(!state.script)state.script={kind:"short",raw:""};
  if(recOn){ recOn=false; try{RECOG&&RECOG.stop();}catch(e){} scrCapture(); setRecBtn(false); return; }
  try{ RECOG=new SR(); }catch(e){ toast("Couldn't start the mic 🌸"); return; }
  RECOG.lang="en-US"; RECOG.continuous=true; RECOG.interimResults=true;
  RECOG.onresult=function(e){ let interim="",fin=""; for(let i=e.resultIndex;i<e.results.length;i++){ const tx=e.results[i][0].transcript; if(e.results[i].isFinal)fin+=tx; else interim+=tx; } if(fin){ state.script.raw=((state.script.raw||"").replace(/\s*$/,"")+" "+fin.trim()).trim(); } const ta=document.getElementById("scrRaw"); if(ta){ ta.value=state.script.raw+(interim?" "+interim:""); ta.scrollTop=ta.scrollHeight; } };
  RECOG.onerror=function(e){ if(e.error==="not-allowed"||e.error==="service-not-allowed"){ toast("Let the browser use your mic 🌸"); recOn=false; setRecBtn(false); } };
  RECOG.onend=function(){ if(recOn){ try{RECOG.start();}catch(e){} } };
  try{ RECOG.start(); recOn=true; setRecBtn(true); }catch(e){ toast("Mic busy — try again 🌸"); }
}
function scrCapture(){ if(!state.script)state.script={kind:"short"}; const g=id=>{const el=document.getElementById(id);return el?el.value:undefined;}; const t=g("scrTitle"),r=g("scrRefs"),w=g("scrRaw"); if(t!=null)state.script.title=t; if(r!=null)state.script.references=r; if(w!=null)state.script.raw=w; }

function loadThumb(file){
  const reader=new FileReader();
  reader.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=640, sc=Math.min(1,max/img.width), c=document.createElement("canvas");
    c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    state._thumb=c.toDataURL("image/jpeg",0.82);
    const p=document.getElementById("thumbPrev");
    if(p)p.innerHTML=`<div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">${[[120,"mobile feed"],[320,"desktop"],[480,"large"]].map(([w,l])=>`<div style="text-align:center"><img src="${state._thumb}" style="width:${w}px;max-width:100%;border-radius:8px;border:1px solid var(--line)" /><div class="label" style="margin-top:3px">${w}px · ${l}</div></div>`).join("")}</div>`;
  }; img.src=reader.result; };
  reader.readAsDataURL(file);
}

/* ===================== FOCUS TIMER 🍅 (with always-on-top pop-out) ===================== */
let PIP=null;
const timer={ running:false, mode:"work", workMin:+(localStorage.getItem("eggie-work")||25), breakMin:+(localStorage.getItem("eggie-break")||5), remaining:0, pomos:0, task:"", min:false, iv:null };
timer.remaining=timer.workMin*60;
function ftFmt(s){ s=Math.max(0,s); const m=Math.floor(s/60),x=s%60; return m+":"+String(x).padStart(2,"0"); }
function actDoc(){ return PIP?PIP.document:document; }
function paintTimer(){ if(PIP)renderPip(); else renderTimer(); }
function toggleTimer(){ if(PIP)return; const w=document.getElementById("focusWidget"); if(!w)return; if(w.classList.contains("hidden")){ w.classList.remove("hidden"); if(!w.style.left){w.style.left=Math.max(8,window.innerWidth-272)+"px";w.style.top=Math.max(60,window.innerHeight-380)+"px";} renderTimer(); } else { pauseTimer(); w.classList.add("hidden"); } }
function startPause(){ const t=actDoc().getElementById("focusTask"); if(t)timer.task=t.value; if(timer.running){ timer.running=false; if(timer.iv){clearInterval(timer.iv);timer.iv=null;} } else { timer.running=true; timer.iv=setInterval(()=>{ timer.remaining--; if(timer.remaining<=0){phaseComplete();return;} tickTimer(); },1000); } paintTimer(); }
function pauseTimer(){ timer.running=false; if(timer.iv){clearInterval(timer.iv);timer.iv=null;} }
function resetTimer(){ pauseTimer(); timer.remaining=(timer.mode==="work"?timer.workMin:timer.breakMin)*60; paintTimer(); }
function phaseComplete(){ pauseTimer(); ftChime(); if(timer.mode==="work"){ timer.pomos++; timer.mode="break"; timer.remaining=timer.breakMin*60; toast("Focus block done 🍅 — gentle break 🌸"); } else { timer.mode="work"; timer.remaining=timer.workMin*60; toast("Break over — ready when you are 💗"); } paintTimer(); }
function setLen(which,d){ if(which==="work"){ timer.workMin=Math.max(5,Math.min(90,timer.workMin+d)); localStorage.setItem("eggie-work",timer.workMin); if(timer.mode==="work"&&!timer.running)timer.remaining=timer.workMin*60; } else { timer.breakMin=Math.max(1,Math.min(30,timer.breakMin+d)); localStorage.setItem("eggie-break",timer.breakMin); if(timer.mode==="break"&&!timer.running)timer.remaining=timer.breakMin*60; } paintTimer(); }
function ftChime(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(),g=a.createGain(); o.connect(g);g.connect(a.destination); o.type="sine"; o.frequency.value=680; g.gain.setValueAtTime(.0001,a.currentTime); g.gain.exponentialRampToValueAtTime(.18,a.currentTime+.05); g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+1.1); o.start(); o.stop(a.currentTime+1.15);}catch{} }
function tickTimer(){ const d=actDoc(); const t=d.getElementById("ftTime"); if(t)t.textContent=ftFmt(timer.remaining); const mp=d.getElementById("ftMinTime"); if(mp)mp.textContent=ftFmt(timer.remaining); const arc=d.getElementById("ftArc"); if(arc){ const R=46,C=2*Math.PI*R,total=(timer.mode==="work"?timer.workMin:timer.breakMin)*60; arc.setAttribute("stroke-dashoffset", C*(1-Math.max(0,timer.remaining)/total)); } }
function timerInner(){
  const R=46,C=2*Math.PI*R,total=(timer.mode==="work"?timer.workMin:timer.breakMin)*60,off=C*(1-Math.max(0,timer.remaining)/total);
  return `<div class="ft-ring ${timer.running?'running':''}"><svg width="118" height="118" viewBox="0 0 118 118"><circle cx="59" cy="59" r="${R}" fill="none" stroke="#f0e6f2" stroke-width="8"/><circle id="ftArc" cx="59" cy="59" r="${R}" fill="none" stroke="url(#ftg)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 59 59)" style="transition:stroke-dashoffset .9s linear"/><defs><linearGradient id="ftg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ec7faf"/><stop offset="1" stop-color="#a98fe0"/></linearGradient></defs></svg><div class="ft-time mono" id="ftTime">${ftFmt(timer.remaining)}</div></div>
    <input class="inp" id="focusTask" placeholder="focusing on…" value="${esc(timer.task||"")}" style="margin:2px 0 8px;font-size:12px"/>
    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:8px"><button class="btn btn-pink" data-act="timerStartPause">${timer.running?"⏸ pause":"▶ start"}</button><button class="btn" data-act="timerReset">↺</button></div>
    <div style="display:flex;gap:12px;justify-content:center;font-size:11px" class="soft"><span>work <button class="ft-ic" data-act="timerWorkDown">–</button>${timer.workMin}<button class="ft-ic" data-act="timerWorkUp">+</button></span><span>break <button class="ft-ic" data-act="timerBreakDown">–</button>${timer.breakMin}<button class="ft-ic" data-act="timerBreakUp">+</button></span></div>`;
}
function renderTimer(){
  const w=document.getElementById("focusWidget"); if(!w||w.classList.contains("hidden"))return;
  if(timer.min){ w.classList.add("min"); w.innerHTML=`<div class="ft-head" data-act="dragTimer"><span class="label">${timer.mode==="work"?"🎯":"🌸"} <span id="ftMinTime" class="mono">${ftFmt(timer.remaining)}</span></span><div><button class="ft-ic" data-act="timerStartPause">${timer.running?"⏸":"▶"}</button><button class="ft-ic" data-act="timerMin" title="expand">▢</button></div></div>`; return; }
  w.classList.remove("min");
  w.innerHTML=`<div class="ft-head" data-act="dragTimer"><span class="label">${timer.mode==="work"?"🎯 Focus":"🌸 Break"} · 🍅 ${timer.pomos}</span><div><button class="ft-ic" data-act="popOutTimer" title="pop out — floats on top of everything">⤢</button><button class="ft-ic" data-act="timerMin" title="minimize">–</button><button class="ft-ic" data-act="timerClose" title="close">×</button></div></div>${timerInner()}`;
}

async function popOutTimer(){
  if(!window.documentPictureInPicture){ toast("Pop-out needs Chrome, Edge, or Firefox 151+ 🌸"); return; }
  try{
    PIP=await documentPictureInPicture.requestWindow({width:256,height:540});

    document.getElementById("focusWidget").classList.add("hidden");

function handleTimerAct(a){ if(a==="timerStartPause")startPause(); else if(a==="timerReset")resetTimer(); else if(a==="timerMin"){timer.min=!timer.min;renderTimer();} else if(a==="timerClose")toggleTimer(); else if(a==="timerWorkUp")setLen("work",1); else if(a==="timerWorkDown")setLen("work",-1); else if(a==="timerBreakUp")setLen("break",1); else if(a==="timerBreakDown")setLen("break",-1); else if(a==="popOutTimer")popOutTimer(); else if(a==="toggleTimer")toggleTimer(); }

/* ===== touch drag-and-drop (iPad/phone): HTML5 DnD doesn't fire on touch, so for touch
   pointers we run a ghost + elementFromPoint drop. Desktop mouse keeps native DnD. ===== */
(function(){
  let TD=null, swallowClick=false;
  function pick(t){
    let e=t.closest&&t.closest(".cal-ev"); if(e&&e.dataset.eid)return {kind:"event",id:e.dataset.eid,el:e};
    let c=t.closest&&t.closest('[data-act="dragContent"]'); if(c)return {kind:"content",id:c.dataset.id,el:c};
    let s=t.closest&&t.closest('[data-act="dragSponsor"]'); if(s)return {kind:"sponsor",id:s.dataset.id,el:s};
    let k=t.closest&&t.closest('[data-act="dragTask"]'); if(k)return {kind:"task",id:k.dataset.id,el:k};
    return null;
  }
  function targetAt(x,y,kind){
    const el=document.elementFromPoint(x,y); if(!el)return null;
    if(kind==="event"){ const c=el.closest(".cal-cell[data-date]"); return c?{type:"calcell",el:c,date:c.dataset.date}:null; }
    if(kind==="content"){ let t=el.closest('[data-act="dropStage"]'); if(t)return{type:"stage",el:t,stage:t.dataset.stage}; t=el.closest('[data-act="ccDrop"]'); if(t)return{type:"ccdate",el:t,date:t.dataset.date}; t=el.closest('[data-act="ccUnschedule"]'); if(t)return{type:"ccun",el:t}; return null; }
    if(kind==="sponsor"){ const t=el.closest('[data-act="dropSponsor"]'); return t?{type:"sponsor",el:t,stage:t.dataset.stage}:null; }
    if(kind==="task"){ const t=el.closest('[data-act="dropTaskStatus"]'); return t?{type:"taskstatus",el:t,status:t.dataset.status}:null; }
    return null;
  }
  async function applyDrop(d,tg){
    if(d.kind==="event"&&tg.type==="calcell"){ await DB.saveDaily(SENTINEL,n=>{const evs=(n.calendarEvents||[]).slice();const t=evs.find(x=>x.id===d.id);if(t){if(t.endDate&&t.endDate>t.date){const dur=calDiff(t.date,t.endDate);t.date=tg.date;t.endDate=calAdd(tg.date,dur);}else t.date=tg.date;}return{...n,calendarEvents:evs};}); render(); return; }
    if(d.kind==="content"){ if(tg.type==="stage"){const patch={stage:tg.stage};if(tg.stage==="published")patch.published_at=new Date().toISOString();await DB.updateContent(d.id,patch);}else if(tg.type==="ccdate"){await DB.updateContent(d.id,{scheduled_for:tg.date});}else if(tg.type==="ccun"){await DB.updateContent(d.id,{scheduled_for:null});} render(); return; }
    if(d.kind==="sponsor"&&tg.type==="sponsor"){ await DB.updateSponsor(d.id,{stage:tg.stage}); render(); return; }
    if(d.kind==="task"&&tg.type==="taskstatus"){ await setTaskStatus(d.id,tg.status); render(); return; }
  }
  document.addEventListener("pointerdown",e=>{ if(e.pointerType==="mouse"||RO)return; const d=pick(e.target); if(!d)return; TD={...d,sx:e.clientX,sy:e.clientY,moved:false,ghost:null}; },true);
  document.addEventListener("pointermove",e=>{ if(!TD||e.pointerType==="mouse")return; const dx=e.clientX-TD.sx,dy=e.clientY-TD.sy; if(!TD.moved){ if(Math.abs(dx)+Math.abs(dy)<8)return; TD.moved=true; const r=TD.el.getBoundingClientRect(); const g=TD.el.cloneNode(true); g.classList.add("drag-ghost"); g.style.cssText="position:fixed;left:0;top:0;z-index:9998;pointer-events:none;opacity:.85;box-shadow:0 8px 22px rgba(80,70,110,.35);width:"+r.width+"px;"; TD.ox=e.clientX-r.left; TD.oy=e.clientY-r.top; document.body.appendChild(g); TD.ghost=g; try{TD.el.setPointerCapture(e.pointerId);}catch(er){} } e.preventDefault(); TD.ghost.style.transform="translate("+(e.clientX-TD.ox)+"px,"+(e.clientY-TD.oy)+"px)"; document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); const tg=targetAt(e.clientX,e.clientY,TD.kind); if(tg&&tg.el)tg.el.classList.add("drop-hot"); },true);
  document.addEventListener("pointerup",async e=>{ if(!TD||e.pointerType==="mouse")return; const d=TD; TD=null; if(d.ghost)d.ghost.remove(); document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); if(!d.moved)return; swallowClick=true; setTimeout(()=>swallowClick=false,350); const tg=targetAt(e.clientX,e.clientY,d.kind); if(tg)try{await applyDrop(d,tg);}catch(er){console.error(er);} },true);
  document.addEventListener("pointercancel",()=>{ if(!TD)return; if(TD.ghost)TD.ghost.remove(); document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); TD=null; },true);
  document.addEventListener("click",e=>{ if(swallowClick){ e.stopPropagation(); e.preventDefault(); swallowClick=false; } },true);
})();

/* breathing bubble — JS-paced so the label always matches the bubble (reduce-motion just snaps) */
let breathTimer=null;
function toggleBreath(){
  const bub=document.getElementById("breathBubble"), lab=document.getElementById("breathLabel"), btn=document.getElementById("breathBtn");
  if(!bub||!lab)return;
  if(breathTimer){ clearTimeout(breathTimer); breathTimer=null; bub.style.transition="transform 1.2s ease"; bub.style.transform="scale(1)"; lab.textContent="tap start"; if(btn)btn.textContent="▶ start"; return; }
  if(btn)btn.textContent="⏸ stop";
  const phases=[["Breathe in…",4000,1.7],["Hold",2000,1.7],["Breathe out…",6000,1.0]]; let i=0;
  (function step(){ const b=document.getElementById("breathBubble"), l=document.getElementById("breathLabel"); if(!b||!l){breathTimer=null;return;} const [label,dur,to]=phases[i]; l.textContent=label; b.style.transition=`transform ${dur}ms ease-in-out`; b.style.transform=`scale(${to})`; i=(i+1)%phases.length; breathTimer=setTimeout(step,dur); })();

(function(){

/* ===== ambient bubble field — canvas, behind the boxes, plentiful + mouse-interactive 🐙 ===== */
(function(){
  const reduce=()=>{ try{ return document.body.classList.contains("calm")||matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return false; } };
  const cv=document.createElement("canvas"); cv.id="bubbleCanvas";
  cv.style.cssText="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;";
  document.body.appendChild(cv);
  const ctx=cv.getContext("2d");
  let DPR=Math.min(2,window.devicePixelRatio||1), W=0, H=0;
  function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=cv.width=Math.floor(innerWidth*DPR); H=cv.height=Math.floor(innerHeight*DPR); }
  resize(); addEventListener("resize",resize);
  /* pre-rendered bubble sprite (fast to stamp many times) */
  const SS=72, spr=document.createElement("canvas"); spr.width=spr.height=SS; const s=spr.getContext("2d");
  const g=s.createRadialGradient(SS*0.4,SS*0.37,SS*0.04,SS*0.5,SS*0.5,SS*0.5);
  g.addColorStop(0,"rgba(255,255,255,.95)"); g.addColorStop(.45,"rgba(200,228,255,.42)"); g.addColorStop(.82,"rgba(168,205,242,.12)"); g.addColorStop(1,"rgba(168,205,242,0)");
  s.fillStyle=g; s.beginPath(); s.arc(SS/2,SS/2,SS/2,0,6.2832); s.fill();
  s.lineWidth=1.6; s.strokeStyle="rgba(255,255,255,.5)"; s.beginPath(); s.arc(SS/2,SS/2,SS/2-1.6,0,6.2832); s.stroke();
  s.fillStyle="rgba(255,255,255,.92)"; s.beginPath(); s.arc(SS*0.36,SS*0.34,SS*0.09,0,6.2832); s.fill();
  let mx=-9999,my=-9999;
  addEventListener("pointermove",e=>{ mx=e.clientX*DPR; my=e.clientY*DPR; });
  addEventListener("pointerleave",()=>{ mx=my=-9999; });
  const COUNT=90, bub=[];
  function mk(seed){ const r=(7+Math.random()*22)*DPR; return { x:Math.random()*W, y: seed? Math.random()*H : H+r+Math.random()*60*DPR, r, sp:(0.35+Math.random()*0.95)*DPR, wob:Math.random()*6.28, wobsp:0.008+Math.random()*0.02, amp:(0.3+Math.random()*0.7)*DPR, o:0.2+Math.random()*0.4 }; }
  for(let i=0;i<COUNT;i++)bub.push(mk(true));

    ctx.clearRect(0,0,W,H);

    const Rd=R*DPR;
    for(let i=0;i<COUNT;i++){ const b=bub[i];
      b.wob+=b.wobsp; b.y-=b.sp; b.x+=Math.sin(b.wob)*b.amp;
      const dx=b.x-mx, dy=b.y-my, d2=dx*dx+dy*dy;

(function(){

  function commitTabs(order){ try{ localStorage.setItem("tab-order",JSON.stringify(order)); }catch(e){} }
  function gtab(el){ const g=el&&el.closest&&el.closest(".grid-modular"); return g?g.dataset.tab:"home"; }
  function commitWidgetOrder(c,order){ setLayout(c.dataset.tab||"home",L=>{L.order=order;}).catch(()=>{}); }
  function commitWidgetSize(item,key,val){ setLayout(gtab(item),L=>{L.size=Object.assign({},L.size,{[key]:val});}).catch(()=>{}); }

  },true);
  document.addEventListener("pointermove",e=>{

    if(!d.moved){ if(Math.abs(e.clientX-d.sx)+Math.abs(e.clientY-d.sy)<6)return; d.moved=true;

  /* Eugene speaks in plain text + emojis only — strip any markdown/asterisks/symbols a model might add */
  function plainText(s){ return String(s==null?"":s)
    .replace(/```[\s\S]*?```/g,"")        // code fences
    .replace(/`([^`]*)`/g,"$1")            // inline code
    .replace(/\*\*([^*]+)\*\*/g,"$1")      // **bold**
    .replace(/(^|[^*])\*([^*\n]+)\*/g,"$1$2") // *italic*
    .replace(/__([^_]+)__/g,"$1").replace(/(^|[^_])_([^_\n]+)_/g,"$1$2") // _underline_
    .replace(/~~([^~]+)~~/g,"$1")          // ~~strike~~
    .replace(/^\s{0,3}#{1,6}\s*/gm,"")     // # headings
    .replace(/^\s*[-*•]\s+/gm,"")          // bullet markers
    .replace(/[*_`#>~|]/g,"")              // any stray md symbols
    .replace(/\n{3,}/g,"\n\n")
    .trim(); }

    }catch(e){}

    var hist=window.EUGENE_HIST.slice(-10);
    var r = await aiCall("agent",{question:q,today:TODAY,tz:CAL_TZ_TARGET,history:hist});
    if(r && r._needsBackend) return "I can actually run things once the analyze function is deployed + demo mode is off 🐙 — redeploy and I'll be your hands! 🌸";
    if(r && r.error) throw new Error(r.error);
    var acts = Array.isArray(r.actions)? r.actions : [];
    var did=[];
    for(var i=0;i<acts.length;i++){ try{ var m=await execAgentAction(acts[i]); if(m) did.push(m); }catch(e){ console.error("agent action failed",acts[i],e); } }
    if(did.length){ try{ render(); }catch(e){} }
    var reply = plainText(r.reply) || (did.length? "done!" : "okay!");
    if(did.length) reply += "\n\n"+did.join("\n");
    window.EUGENE_HIST.push({role:"me",text:q},{role:"pet",text:reply});
    if(window.EUGENE_HIST.length>24) window.EUGENE_HIST=window.EUGENE_HIST.slice(-24);
    try{ localStorage.setItem("eugene-hist",JSON.stringify(window.EUGENE_HIST)); }catch(e){}
    eugeneSpeak(reply);
    return reply;
  }
  window.eugeneAsk = function(q){ return runAgent(q); };   // lets the 🐙 Ask Eugene tab share the same brain
  var W=96,H=96, row=function(r){ return [0,1,2,3,4,5,6].map(function(i){return {x:i*W,y:r*H,w:W,h:H};}); };
  window.PET = PetWidget.init({
    sheet:"pet-widget/Sprite Sheet.png", sheetW:672, sheetH:480,
    walk: row(1),                 // row 1 = walk (7 frames)
    sit:  {x:0,y:0,w:W,h:H},      // row 0, first frame = idle/sit
    scale:1.1, faces:"right", speed:42, frameMs:130,
    leftClear:86, rightClear:96,  // keep clear of the 🗒️+ (bottom-left) and focus timer (bottom-right)
    avatar:"pet-widget/Screenshot 2026-06-02 202234.png",   // round chat-header icon (the pet's face close-up)
    title:"Eugene", subtitle:"your octopus helper — ask or search the web 🐙",
    accentFrom:"#ec7faf", accentTo:"#a98fe0",
    font:"inherit",
    greetings:["pspsps… try \"add stream Friday 4pm\" 🐙","ask me to look something up on the web 🌐","tell me to add a task or event 🌸","need a hand? just tap me ✨","rest is productive too, you know 💜"],
    suggestions:[
      "What's trending for VTuber shorts right now?",
      "Look up when Path of Exile 2 fully releases",
      "How much money did I make this month?",
      "How has my energy been the last 2 weeks?",
      "Give me 3 cozy short ideas for this week",
      "Add a stream this Friday at 4pm",
      "What's on my calendar coming up?"
    ],
    reduceMotion:function(){ try{ return document.body.classList.contains("calm") || matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return false; } },
    ask: async function(q){
      try{ return await runAgent(q); }
      catch(e){ throw new Error(e.message||"couldn't reach the OS brain"); }
    }
  });
  /* ---- Eugene's once-a-day check-in: a bubble with today's shape, built from her own data ---- */
  function showPetBubble(text,ms){ var b=document.getElementById("petBubble"); if(!b)return; b.textContent=text; b.classList.remove("pet-hidden"); clearTimeout(b._h); b._h=setTimeout(function(){ b.classList.add("pet-hidden"); },ms||9000); }
  window.showPetBubble=showPetBubble;
  async function eugeneDailyBrief(){
    try{
      var key="eugene-brief"; if(localStorage.getItem(key)===TODAY) return;
      var sent=await DB.daily(SENTINEL);
      var wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];
      var evs=(sent.calendarEvents||[]).filter(function(e){ return e.date===TODAY||(e.endDate&&e.date<=TODAY&&e.endDate>=TODAY); });
      var slot=(sent.schedule||[]).find(function(s){ return (s.day||"").slice(0,3)===wd; });
      var openT=(sent.tasks||[]).filter(function(t){ return !t.done; }).length;
      var ch=sent.artChallenge||{};
      var bits=[];
      if(slot) bits.push("stream day 🔴 "+(slot.time||""));
      if(evs.length) bits.push(evs.map(function(e){return e.title;}).slice(0,2).join(" + ")+(evs.length>2?" +"+(evs.length-2):""));
      if(openT) bits.push(openT+" open task"+(openT>1?"s":""));
      if(ch.dayText&&!ch.dayDone) bits.push("art: "+ch.dayText);
      showPetBubble("hi! 🐙 today: "+(bits.length?bits.join(" · "):"a clear slate — spend a spoon on something fun 🌸"),15000);
      localStorage.setItem(key,TODAY);
    }catch(e){}
  }
  setTimeout(eugeneDailyBrief, 6500);
  /* ---- reminder watcher: while the OS is open, ping due reminders (browser notification + bubble + toast).
     Email delivery for closed-tab times is handled by the "reminders" Edge Function on a cron. ---- */
  async function checkReminders(){
    try{
      if(RO) return;
      var sent=await DB.daily(SENTINEL); var rems=sent.reminders||[];
      var now=new Date(); var hm=("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2);
      var due=rems.filter(function(r){ return !r.done&&!r.notified&&(r.date<TODAY||(r.date===TODAY&&(r.time||"09:00")<=hm)); });
      if(!due.length) return;
      due.forEach(function(r){
        try{ if(window.Notification&&Notification.permission==="granted") new Notification("⏰ Eugene reminder",{body:r.text,icon:"pet-widget/Screenshot 2026-06-02 202234.png"}); }catch(e){}
        toast("⏰ "+r.text);
      });
      showPetBubble("⏰ psst — "+due.map(function(r){return r.text;}).join(" · "),20000);
      await DB.saveDaily(SENTINEL,function(n){ return Object.assign({},n,{reminders:(n.reminders||[]).map(function(r){ return due.some(function(d){return d.id===r.id;})?Object.assign({},r,{notified:true}):r; })}); });
    }catch(e){}
  }
  setTimeout(checkReminders, 5000); setInterval(checkReminders, 30000);
})();
</script>
