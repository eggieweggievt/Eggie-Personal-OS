<!-- =========================================================================
  Eggie OS — a gentle VTuber content operating system, for Eggie 🐙
  Content pipeline (by format + pillar) · editable spoon-theory habits ·
  income + tax set-aside + sponsors · weekly review · ask.

  CONFIGURE: paste your Supabase URL + anon key in CONFIG below, then run
  supabase/eggie-os-setup.sql. Leave blank to run in demo mode.
  Everything (habits, goals, briefs, income) is editable right in the page.
========================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#fbf3f9; --bg2:#f3ecfb; --panel:#fff; --panel-soft:#fef7fc;
    --line:#f0dcec; --line-2:#ecd7ef; --ink:#4a3a4d; --ink-soft:#7c6a80; --muted:#ab9bb0;
    --pink:#ec7faf; --pink-deep:#db5e98; --lav:#a98fe0; --lav-deep:#8d6fd1;
    --mint:#5cc6a3; --peach:#f3a978; --rose:#ef7a85;
    --shadow:0 6px 22px rgba(180,120,170,.12); --shadow-sm:0 2px 8px rgba(180,120,170,.10);
    --r:18px; --sans:"Quicksand",ui-rounded,"SF Pro Rounded",system-ui,sans-serif; --display:"Fredoka",var(--sans);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  /* never let a stray wide element widen the page — keeps `main` truly centered (iPad portrait fix) */
  html,body{width:100%;max-width:100%;}      /* NO overflow-x here — it silently locks vertical scroll in standalone/PWA */
  main{overflow-x:clip;}                        /* clip horizontal overflow on the content wrapper only; page scrolls normally */
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:url("eggiebackground.png") center top/cover no-repeat fixed;opacity:.22;}
  body{background:var(--bg);background-image:radial-gradient(80% 50% at 100% 0%,#f7e0f0 0%,transparent 60%),radial-gradient(70% 50% at 0% 0%,#e9e0fb 0%,transparent 55%);background-attachment:fixed;color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;font-weight:500;-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:var(--display);font-weight:600;margin:0;}
  .muted{color:var(--muted);} .soft{color:var(--ink-soft);} .pink{color:var(--pink-deep);} .lav{color:var(--lav-deep);} .mint{color:var(--mint);}
  .num{font-variant-numeric:tabular-nums;} a{color:var(--lav-deep);}
  .mono{font-variant-numeric:tabular-nums;letter-spacing:.01em;} textarea.mono{font-family:ui-monospace,"Cascadia Mono",Consolas,monospace;}
  button{font-family:inherit;cursor:pointer;font-weight:600;} input,textarea,select{font-family:inherit;font-weight:500;}
  .label{font-size:10.5px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px;}
  .inp{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px 12px;color:var(--ink);font-size:13px;width:100%;outline:none;}
  .inp:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(236,127,175,.12);}
  textarea.inp{resize:vertical;}
  .btn{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;color:var(--ink-soft);font-size:12px;padding:7px 14px;transition:.15s;}
  .btn:hover{border-color:var(--pink);color:var(--pink-deep);}
  .btn-pink{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff;border:none;box-shadow:var(--shadow-sm);}
  .btn-pink:hover{filter:brightness(1.05);color:#fff;}
  .pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;letter-spacing:.03em;}
  .pill-pink{background:#fde4ef;color:var(--pink-deep);} .pill-lav{background:#ece2fb;color:var(--lav-deep);}
  .pill-mint{background:#ddf4ec;color:#2f9d79;} .pill-peach{background:#fdeadb;color:#cc7a3e;} .pill-gray{background:#f2ebf2;color:var(--muted);}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#ecd7ef;border-radius:9px;}
  #rail{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.78);backdrop-filter:blur(12px);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,#5cc6a3,#8fb8f0,#a98fe0,#ec7faf) 1;}
  .brand{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px;}
  .brand-logo-img{height:26px;width:auto;display:block;flex:0 0 auto;filter:drop-shadow(0 1px 3px rgba(141,111,209,.3));transition:filter .4s,transform .4s;}
  /* dual-mode: tapping the logo flips Creator ↔ Health. health mode = a softer, rosier shell */
  .brand:active .brand-logo-img{transform:scale(.92) rotate(-6deg);}
  body[data-osmode="health"] .brand-logo-img{filter:drop-shadow(0 1px 5px rgba(236,127,175,.6));}
  body[data-osmode="health"] #rail{background:linear-gradient(135deg,#fff0f7ee,#f4ecfbee);}
  @keyframes modeSwap{0%{opacity:0;transform:scale(.985) translateY(6px);}100%{opacity:1;transform:none;}}
  .mode-swap{animation:modeSwap .45s cubic-bezier(.2,.7,.3,1);}
  @media (prefers-reduced-motion:reduce){.mode-swap{animation:none;}.brand:active .brand-logo-img{transform:none;}}
  body[data-osmode="sakura"] #rail{background:linear-gradient(135deg,#fff1f6ee,#ffe9f3ee);}
  body[data-osmode="sakura"] .brand-logo-img{filter:drop-shadow(0 1px 5px rgba(236,127,175,.75));}
  body.mgr #pet,body.mgr #petChat,body.mgr #petBubble{display:none!important;}   /* the pet is Eggie's personal assistant — managers don't get him */
  .ccal .cal-cell{min-height:56px;padding:3px 4px;}   /* the aggregate calendar packs denser than the per-client minis */
  .ccal .cal-daynum{font-size:10px;}
  body[data-osmode="sakura"] #ocChip{display:none;}   /* OCs are personal — they don't exist in the team space */
  .brand-name{background:linear-gradient(120deg,#5cc6a3,#8d6fd1 45%,#db5e98);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;letter-spacing:.02em;font-size:17px;}
  nav{display:flex;gap:4px;flex-wrap:wrap;}
  .tab{font-size:13px;padding:6px 13px;border-radius:999px;color:var(--ink-soft);border:none;background:none;}
  .tab.active{background:linear-gradient(135deg,#fde4ef,#ece2fb);color:var(--pink-deep);} .tab:hover{color:var(--pink-deep);}
  .more-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:30;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 38px rgba(120,90,140,.24);padding:6px;min-width:170px;display:flex;flex-direction:column;}
  .more-menu .tab{text-align:left;border-radius:10px;}
  #rail .right{display:flex;align-items:center;gap:10px;}
  .chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1.5px solid var(--line-2);color:var(--muted);background:#fff;}
  .chip.on{color:var(--mint);border-color:#bfe9d8;background:#f0fbf6;} .chip.demo{color:var(--lav-deep);border-color:#ddcdf6;background:#f6f0ff;}
  .avatar{width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,var(--pink),var(--lav));display:grid;place-items:center;color:#fff;font-weight:700;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  main{padding:18px;max-width:1380px;margin:0 auto;}
  .grid-home{display:grid;grid-template-columns:320px minmax(0,1fr) 320px;gap:16px;}
  /* ---- modular dashboard ---- */
  .grid-modular{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));grid-auto-rows:8px;grid-auto-flow:row dense;gap:0 16px;}
  .home-widget{position:relative;transition:transform .24s cubic-bezier(.2,.8,.25,1);}
  .home-widget.resizing{transition:none;}
  #nav .tab{transition:transform .2s cubic-bezier(.2,.8,.25,1);}
  .drag-clone{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;border-radius:18px;box-shadow:0 16px 38px rgba(120,80,120,.34);opacity:.97;}
  .home-widget.dragsrc,#nav .tab.dragsrc{visibility:hidden;}
  .home-widget.reordering{outline:2px dashed var(--lav);outline-offset:3px;border-radius:18px;}
  .home-widget.resizing{outline:2px dashed var(--pink);outline-offset:3px;border-radius:18px;}
  .home-widget.min .panel,.home-widget.min section{max-height:50px;overflow:hidden;}
  .home-tools{position:absolute;top:9px;right:9px;z-index:6;display:flex;gap:3px;}
  .home-tools button{border:none;background:rgba(255,255,255,.6);border-radius:7px;font-size:11px;line-height:1;color:#9b8fae;cursor:pointer;padding:4px 6px;opacity:.4;touch-action:none;user-select:none;}
  .home-tools .home-grip{cursor:grab;}
  .home-widget:hover .home-tools button,.home-tools button:hover{opacity:.95;}
  .home-resize{position:absolute;right:3px;bottom:3px;z-index:6;border:none;background:rgba(255,255,255,.6);border-radius:7px;font-size:12px;line-height:1;color:#9b8fae;cursor:nwse-resize;padding:2px 5px;opacity:.4;touch-action:none;user-select:none;}
  .home-widget:hover .home-resize,.home-resize:hover{opacity:.95;}
  .home-add{border:2px dashed var(--line);border-radius:16px;background:rgba(255,255,255,.4);color:var(--lav-deep);font-size:13px;cursor:pointer;min-height:44px;max-height:48px;grid-column:1/-1;grid-row:span 8;margin-top:2px;}
  body.locked .home-tools,body.locked .home-resize,body.locked .home-add{display:none!important;}
  #nav .tab{touch-action:none;user-select:none;-webkit-user-select:none;}
  #nav .tab.reordering{opacity:.55;}
  .col{display:flex;flex-direction:column;gap:16px;}
  @media(max-width:1040px){.grid-home{grid-template-columns:1fr;}}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .soft-card{background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;padding:12px;}
  .seg{display:inline-flex;background:#f6eef6;border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap;}
  .seg button{border:none;background:none;border-radius:999px;padding:5px 11px;font-size:12px;color:var(--ink-soft);}
  .seg button.on{background:#fff;color:var(--pink-deep);box-shadow:var(--shadow-sm);}
  .hbtn{text-align:left;border:1.5px solid var(--line-2);border-radius:13px;padding:9px 11px;background:#fff;transition:.15s;}
  .hbtn.done{border-color:#bfe9d8;background:#f1fbf6;} .hbtn:hover{border-color:var(--pink);}
  .check{width:18px;height:18px;border-radius:7px;border:2px solid var(--line-2);background:#fff;flex:none;} .check.on{background:var(--mint);border-color:var(--mint);}
  .kanban{display:grid;grid-template-columns:repeat(7,minmax(150px,1fr));gap:10px;overflow-x:auto;padding-bottom:6px;}
  /* drag the bottom-right corner to make the sponsor board taller; height is remembered */
  .sponsor-board{resize:vertical;overflow:auto;min-height:200px;border:1px solid var(--line);border-radius:14px;padding:10px;background:var(--panel-soft);}
  .sponsor-board .kanban{overflow-x:visible;}
  @media(max-width:1100px){.kanban{grid-template-columns:repeat(7,180px);}}
  .kcol{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:120px;}
  .citem{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px;transition:.15s;cursor:grab;box-shadow:var(--shadow-sm);}
  .citem:hover{border-color:var(--pink);} .citem.dim{opacity:.35;} .citem.hit{border-color:var(--lav);}
  .bar{height:6px;border-radius:999px;background:#f0e6f2;overflow:hidden;} .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--lav));}
  .modal-bg{position:fixed;inset:0;background:rgba(90,60,90,.32);z-index:50;display:flex;align-items:center;justify-content:center;padding:14px;}
  /* modal safety net (iPad/phone): rows always wrap instead of poking past the panel edge,
     and iOS date/time inputs (which refuse to shrink below their intrinsic width) get tamed */
  .modal-bg .panel{width:100%;max-width:min(92vw,560px);}
  .modal-bg .panel div[style*="display:flex"]{flex-wrap:wrap;}
  input[type="date"],input[type="time"]{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%;background:#fff;}  /* iOS date/time controls have a native min-width that ignores CSS — stripping appearance makes them obey */
  select.inp{max-width:100%;}
  .modal-bg .inp{min-width:0;}
  .seg{flex-wrap:wrap;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;}
  th{text-align:left;padding:8px 6px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:700;}
  td{padding:8px 6px;font-size:13px;border-bottom:1px solid var(--line);}
  .hidden{display:none!important;} .grow{flex:1;}
  .meter{position:relative;height:10px;border-radius:999px;background:#f0e6f2;overflow:hidden;}
  .meter>i{position:absolute;top:0;bottom:0;background:rgba(141,111,209,.18);} /* target band */
  .meter>b{position:absolute;top:0;bottom:0;left:0;border-radius:999px;background:linear-gradient(90deg,var(--pink),var(--lav));}
  .meter.ok>b{background:linear-gradient(90deg,#7ed0b0,var(--mint));}
  /* ---- gentle page transition (auto-off in calm / reduce-motion via the rules below) ---- */
  /* Tab switches are INSTANT — no entrance animation. The fade-from-blank made every switch read
     as "the page loaded twice" (old page lingers → blinks out → fades back in). Her OC-Hub switches
     instantly and that's the correct feel. (.view-enter intentionally does nothing now.) */
  @keyframes viewIn{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;} }
  @keyframes panelIn{ from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:none;} }
  /* ---- calendar ---- */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:11px;text-align:center;color:var(--lav-deep);font-weight:600;padding:2px 0;}
  .cal-cell{min-height:94px;border:1px solid var(--line);border-radius:12px;padding:5px 6px;background:rgba(255,255,255,.5);display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s;}
  .cal-cell:hover{border-color:var(--lav);}
  .cal-cell.other{opacity:.4;}
  .cal-cell.today{border-color:var(--pink);box-shadow:inset 0 0 0 2px rgba(236,127,175,.25);}
  .cal-cell.past{opacity:.38;}                    /* C5: yesterday fades so NOW pops */
  .cal-cell.past.today{opacity:1;}
  .cal-cell.drag-over{background:rgba(169,143,224,.18);border-color:var(--lav-deep);transform:scale(1.03);}
  .cal-daynum{font-size:11.5px;color:#8a7d92;align-self:flex-end;line-height:1;}
  .cal-cell.today .cal-daynum{color:var(--pink-deep);font-weight:700;}
  .mini-cal .cal-grid{gap:4px;}
  .mini-cal .cal-cell{min-height:58px;padding:3px 4px;gap:3px;}
  .mini-cal .cal-daynum{font-size:10.5px;}
  .mini-cal .cal-ev{font-size:9.5px;padding:2px 5px;line-height:1.2;}
  .cal-ev{font-size:11px;line-height:1.3;padding:3px 7px;border-radius:8px;color:#5a3b52;cursor:grab;user-select:none;white-space:normal;overflow-wrap:anywhere;word-break:break-word;transition:transform .12s,opacity .12s,box-shadow .12s;}
  .cal-ev:hover{box-shadow:0 2px 8px rgba(150,110,150,.28);}
  .cal-ev:active{cursor:grabbing;}
  .cal-ev.dragging{opacity:.45;transform:scale(.95);}
  .cal-ev.span{font-weight:500;}
  .cal-ev.span-start{border-top-right-radius:3px;border-bottom-right-radius:3px;}
  .cal-ev.span-mid{border-radius:3px;opacity:.9;}
  .cal-ev.span-end{border-top-left-radius:3px;border-bottom-left-radius:3px;opacity:.95;}
  .cal-stream{font-size:10.5px;line-height:1.25;padding:3px 7px;border-radius:8px;background:rgba(236,127,175,.16);color:var(--pink-deep);border-left:3px solid var(--pink);cursor:pointer;white-space:normal;overflow-wrap:anywhere;transition:background .12s;}
  .cal-stream:hover{background:rgba(236,127,175,.28);}
  .cal-game{font-size:10.5px;line-height:1.25;padding:3px 7px;border-radius:8px;background:rgba(117,138,198,.16);color:#46508a;border-left:3px solid #758ac6;cursor:pointer;white-space:normal;overflow-wrap:anywhere;transition:background .12s;}
  .cal-game:hover{background:rgba(117,138,198,.3);}
  .cal-content,.cc-chip{font-size:10.5px;line-height:1.25;padding:3px 7px;border-radius:8px;background:rgba(124,189,164,.2);color:#2f6a55;border-left:3px solid #5cc6a3;cursor:grab;white-space:normal;overflow-wrap:anywhere;transition:background .12s;}
  .cal-content{cursor:pointer;}
  .cal-content:hover,.cc-chip:hover{background:rgba(124,189,164,.34);}
  .cc-cell.drag-over{background:rgba(124,189,164,.18);border-color:#5cc6a3;}
  .cal-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;}
  /* ---- touch / iPad ---- */
  html{-webkit-text-size-adjust:100%;}
  .drop-hot{outline:2px dashed var(--lav-deep);outline-offset:-2px;}
  .drag-ghost{border-radius:8px;}
  /* ---- cursor petal trail ---- */
  .petal{position:fixed;pointer-events:none;z-index:9000;border-radius:150% 0 150% 0;will-change:transform,opacity;opacity:0;}
  @keyframes petalFloat{ 0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(.55);} 18%{opacity:var(--o,.7);} 100%{opacity:0;transform:translate(var(--dx,12px),var(--dy,60px)) rotate(var(--dr,200deg)) scale(1);} }
  /* ambient bubble field is a canvas (#bubbleCanvas) injected at boot — see the bubble IIFE */
  .kanban{-webkit-overflow-scrolling:touch;}
  .cal-ev,.cc-chip,.citem,[data-act="dragSponsor"],.sticky-head,.sticky-resize{touch-action:none;}
  @media (hover:none){
    .inp,input,textarea,select{font-size:16px;}   /* ≥16px stops iOS zoom-on-focus */
    .tab{padding:7px 13px;}
    .seg button{padding:7px 11px;}
    .check{min-width:20px;min-height:20px;}
    .hbtn,.chiptog,.btn{min-height:34px;}
    *{-webkit-tap-highlight-color:transparent;}
  }
  /* ---- accessibility ---- */
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
  body.calm *{animation:none!important;transition:none!important;}
  body.calm{background-image:none;background:#f6f2f6;--pink:#c79ab6;--pink-deep:#a87f9b;--lav:#aea0d2;--lav-deep:#8b7cb8;--mint:#7cbda4;--rose:#cf9aa0;--peach:#d8b291;}
  body.text-lg{font-size:16px;} body.text-lg .label{font-size:11.5px;} body.text-lg .citem,body.text-lg .pill{font-size:13px;}
  .scale{display:flex;gap:4px;flex-wrap:wrap;}
  .scale button{min-width:32px;height:32px;border:1.5px solid var(--line-2);border-radius:9px;background:#fff;color:var(--ink-soft);font-size:12px;}
  .scale button.on{background:linear-gradient(135deg,var(--pink),var(--lav));border-color:var(--pink);color:#fff;}
  .chiptog{border:1.5px solid var(--line-2);border-radius:999px;padding:7px 14px;background:#fff;color:var(--ink-soft);font-size:13px;display:inline-flex;align-items:center;gap:8px;}
  .chiptog.on{background:#fde4ef;border-color:var(--pink);color:var(--pink-deep);}
  .spark{display:flex;align-items:flex-end;gap:2px;height:34px;}
  .spark span{flex:1;background:linear-gradient(180deg,var(--pink),var(--lav));border-radius:3px 3px 0 0;min-height:2px;opacity:.85;}
  /* brain-dump note chips */
  .note{display:inline-block;background:var(--panel-soft);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:12px;color:var(--ink);cursor:pointer;max-width:100%;transition:.15s;}
  .note:hover{border-color:var(--pink);}
  /* floating sticky notes */
  #stickyLayer{position:fixed;inset:0;z-index:80;pointer-events:none;}
  .sticky{position:absolute;width:184px;height:150px;min-width:140px;min-height:108px;border-radius:12px;overflow:hidden;box-shadow:0 8px 22px rgba(120,80,120,.22);pointer-events:auto;display:flex;flex-direction:column;transform:rotate(-1deg);}
  .sticky-head{height:22px;display:flex;align-items:center;justify-content:space-between;padding:0 6px;cursor:grab;border-radius:12px 12px 0 0;flex:0 0 auto;}
  .sticky-head:active{cursor:grabbing;}
  .sticky-dot{width:13px;height:13px;border-radius:999px;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.5);cursor:pointer;}
  .sticky-x{border:none;background:none;font-size:15px;line-height:1;color:rgba(74,58,77,.55);cursor:pointer;}
  .sticky-tools{display:flex;gap:1px;flex-wrap:wrap;padding:1px 5px 2px;flex:0 0 auto;}

  async saveDaily(date,merge){
    if(DEMO){ const cur=await DB.daily(date); const next=merge({...cur}); demo.daily[date]=next; return next; }
    // Re-read the LIVE row for EVERY date right before writing (not just the sentinel). The
    // sentinel is written by the server (inbox, client reminders, snapshots), and TODAY's row
    // can be written from two devices at once (desktop + iPad logging health on the same day).

    let base={};

      if(error){ toast("⚠️ NOT saved — couldn't read your live data first ("+(error.message||"network")+") 🌸"); throw new Error("pre-save read failed: "+(error.message||"unknown")); }
      if(data&&data.notes){try{base=JSON.parse(data.notes);}catch{}} }
    // 🛟 wipe tripwire: this device has seen a full config row before, but the live read came back
    // (near-)empty and we're about to write a merge built on emptiness. That's a lockout/RLS state,
    // not a fresh start — writing now would wipe the row for real. Refuse, loudly. (Restore uses
    // DB._force=true to bypass, since rebuilding an actually-empty row is its whole job.)
    if(date===SENTINEL && !DB._force && Object.keys(base).length<2 && localStorage.getItem("eggie-had-data")==="1"){

      throw new Error("sentinel wipe-guard tripped: live row read back empty on a device that has seen data");

    // 🌸 sentinel writes split: once migrated, the Sakura keys (clients/inbox/…) route to the
    // shared team row and are stripped from Eggie's row; everything else stays hers. Managers
    // (whose RLS can't touch her row) only ever produce Sakura writes.
    let sakMig=false;
    if(date===SENTINEL && !DEMO){ const sak=await this.sakRow(); sakMig=!!sak._sakMigrated;
      if(sakMig) SAK_KEYS.forEach(k=>{ const live=this._c.sak[k]; if(live!=null && base[k]==null) base[k]=live; });   // merged base sees team data
    }

    if(date===SENTINEL && sakMig){
      let sakChanged=false; const sakPatch={};
      SAK_KEYS.forEach(k=>{ if(JSON.stringify(next[k])!==JSON.stringify(this._c.sak[k])) sakChanged=true; sakPatch[k]=next[k]; delete next[k]; });
      delete next._sakMigrated;
      if(sakChanged) await this.saveSak(s=>{ const out={...s,_sakMigrated:true}; SAK_KEYS.forEach(k=>{ if(sakPatch[k]==null)delete out[k]; else out[k]=sakPatch[k]; }); return out; });
      if(IS_MGR){ const merged={...next,_sakMigrated:true}; SAK_KEYS.forEach(k=>{ merged[k]=this._c.sak[k]; }); this._c.daily[date]=merged; return merged; }   // managers never write Eggie's row
    }
    if(IS_MGR){ this._c.daily[date]=next; return next; }       // managers never write Eggie's rows — RLS would refuse anyway; keep their tweaks session-local
    const {error:werr}=await SB.from("daily_logs").upsert({user_id:UID,log_date:date,notes:JSON.stringify(next),updated_at:new Date().toISOString()},{onConflict:"user_id,log_date"});
    if(werr){ toast("⚠️ NOT saved — "+(werr.message||"write blocked")+" (sign in?) 🌸"); throw new Error("save failed: "+(werr.message||"unknown")); }
    if(date===SENTINEL && sakMig){ const merged={...next,_sakMigrated:true}; SAK_KEYS.forEach(k=>{ merged[k]=this._c.sak[k]; }); this._c.daily[date]=merged; }
    else this._c.daily[date]=next;                             // cache only AFTER a confirmed write — no more "looked saved, gone on reload"
    if(date===SENTINEL){ DB.localBackup(next); if(Object.keys(next).length>2){ try{ localStorage.setItem("eggie-had-data","1"); }catch(e){} } }
    if(date!==SENTINEL){ Object.keys(this._c.range).forEach(k=>{ const arr=this._c.range[k]; if(!arr)return; const i=arr.findIndex(r=>r.date===date); if(i>=0)arr[i]={date,notes:next}; else arr.push({date,notes:next}); }); }
    return next;
  },
  // On every config-row save, stash a timestamped copy on THIS device. Survives refreshes,
  // so even if another device clobbers the server, the device that made the edits still has them.
  // Keeps the most recent ~20 restore points (and a couple of older daily ones for depth).
  localBackup(notes){
    try{
      const key="eggie-restore"; let list=[]; try{ list=JSON.parse(localStorage.getItem(key)||"[]"); }catch{}
      // store ONLY what restore actually uses (clients/inbox/invoices) — the full sentinel row can
      // carry mood-board images + avatars as data-URLs, and 30 full copies blows the ~5MB
      // localStorage quota, which silently stopped restore points from saving at all.
      const snap={ t:Date.now(), clients:(notes.clients||[]).length, inbox:(notes.inbox||[]).length, invoices:(notes.invoices||[]).length, data:{ clients:notes.clients||[], inbox:notes.inbox||[], invoices:notes.invoices||[] } };
      // skip if identical client/inbox/invoice counts AND <90s since last, to avoid spamming tiny edits
      const prev=list[0];
      if(prev && prev.clients===snap.clients && prev.inbox===snap.inbox && prev.invoices===snap.invoices && (snap.t-prev.t)<90000){ list[0]=snap; }
      else list.unshift(snap);
      // keep last 20, plus thin older ones to ~30 total
      if(list.length>30) list=list.slice(0,30);
      localStorage.setItem(key, JSON.stringify(list));
    }catch(e){ /* quota or serialize issues never block a save */ }
  },
  listBackups(){ try{ return JSON.parse(localStorage.getItem("eggie-restore")||"[]"); }catch{ return []; } },
  async dailyRange(days){ if(DEMO){ return Object.entries(demo.daily).filter(([d])=>d!==SENTINEL).map(([date,notes])=>({date,notes})); } if(this._c.range[days])return this._c.range[days]; const since=dayAgo(-days); const {data}=await SB.from("daily_logs").select("log_date,notes").eq("user_id",UID).gte("log_date",since).order("log_date",{ascending:false}).limit(100000); return this._c.range[days]=(data||[]).map(r=>{let n={};try{n=JSON.parse(r.notes||"{}");}catch{} return {date:r.log_date,notes:n};}); },

/* ===================== IMAGE STORAGE (Supabase Storage bucket "eggie-os") =====================
   Mood-board photos + client avatars used to live as base64 data-URLs INSIDE the sentinel JSON,
   which made that row megabytes heavy (slow cold loads, heavy Egg Jean context, fat backups).
   New uploads now go to Storage and only the URL is saved. Falls back to the data URL when
   storage isn't available (demo mode / signed out / bucket not created) so nothing ever breaks. */
function dataURLtoBlob(d){ const m=String(d||"").match(/^data:([^;]+);base64,(.*)$/); if(!m)return null; const bin=atob(m[2]); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return new Blob([u],{type:m[1]}); }
async function storeImage(dataURL,folder){
  if(DEMO||!SB) return dataURL;
  try{
    const blob=dataURLtoBlob(dataURL); if(!blob) return dataURL;
    const ext=blob.type==="image/png"?"png":"jpg";
    const path=(folder||"img")+"/"+Date.now().toString(36)+"-"+uid().slice(0,6)+"."+ext;
    const {error}=await SB.storage.from("eggie-os").upload(path,blob,{contentType:blob.type,upsert:false});
    if(error) return dataURL;
    const {data}=SB.storage.from("eggie-os").getPublicUrl(path);
    return (data&&data.publicUrl)||dataURL;
  }catch(e){ return dataURL; }
}

async function authBoot(){
  if(DEMO||!SB) return true;                                   // demo mode needs no login
  try{ const {data}=await SB.auth.getSession(); SESSION=(data&&data.session)||null; }catch(e){ SESSION=null; }
  if(SESSION){
    const em=String((SESSION.user||{}).email||"").toLowerCase();
    const meta=(SESSION.user||{}).user_metadata||{};
    const isOwner=em===OWNER_EMAIL;
    if(!isOwner){
      // 🌸 first sign-in after a talent signup: the metadata carries which talent they picked → create their row
      if(meta.role==="client" || meta.client_id){ try{ await SB.from("client_accounts").upsert({email:em,client_id:meta.client_id||null,talent_name:meta.talent_name||null},{onConflict:"email",ignoreDuplicates:true}); }catch(e){} }
      // AUTHORITATIVE role check: a row in client_accounts = a CLIENT (view-only, their own page ONLY).
      // This never depends on fragile metadata once the row exists — a client can NEVER fall into the manager path.
      let crow=null; try{ const r=await SB.from("client_accounts").select("approved").eq("email",em).maybeSingle(); crow=r&&r.data; }catch(e){}
      if(crow){
        IS_CLIENT=true; IS_MGR=false;
        if(!crow.approved){ showPending(em,"client"); return false; }
        const ok=await loadClientView();             // JWT-checked fetch of THEIR record only
        if(!ok){ showPending(em,"client"); return false; }
        return true;
      }
      // otherwise = a Sakura MANAGER (team hub, pending until approved)
      IS_MGR=true; setOsMode("sakura"); state.tab="clients";
      try{
        try{ await SB.from("managers").upsert({email:em},{onConflict:"email",ignoreDuplicates:true}); }catch(e){}
        const {data:mrow}=await SB.from("managers").select("approved").eq("email",em).maybeSingle();
        if(!mrow||!mrow.approved){ showPending(em); return false; }
      }catch(e){ showPending(""); return false; }
    }
    return true;
  }
  // pre-lockdown grace: if anonymous reads still RETURN ROWS, the project isn't locked yet — carry on.
  // ⚠️ post-lockdown, RLS hides rows WITHOUT an error ({data:[], error:null}) — an "error-only" check
  // here waved signed-out devices straight into an empty-looking app that couldn't save anything
  // (every tab blank = "all my data is deleted!"). Rows must actually come back to skip the login.
  try{ const {data,error}=await SB.from("daily_logs").select("log_date").limit(1); if(!error && data && data.length) return true; }catch(e){}
  showLogin(); return false;
}

   a window/estimate, not officially confirmed. Last refreshed: 2026-06-09. */

/* C3: the five colours carry meaning now — shown as labels in the event modal's picker */
const CAL_COLOR_NAMES={"#f6b8d4":"🔴 stream","#c9b8f0":"💜 collab","#a9e0cb":"🩺 appt","#f6cba9":"⏰ deadline","#b8d4f0":"🌸 fun"};
/* C2: tiny natural-language event parser — "thu 4pm collab with momo", "tomorrow 13:30 dentist".
   Understands weekday names / today / tomorrow + an optional time; the rest becomes the title.
   Anything it can't read just opens the normal form pre-filled, so nothing is ever lost. */
function calQuickParse(raw){
  let s=" "+String(raw||"").trim()+" "; if(!s.trim())return null;
  const DAYS3={sun:0,mon:1,tue:2,tues:2,wed:3,thu:4,thur:4,thurs:4,fri:5,sat:6};
  let date=null;
  s=s.replace(/\s(today)\s/i,()=>{date=TODAY;return " ";});
  if(!date) s=s.replace(/\s(tomorrow|tmr)\s/i,()=>{const d=new Date(TODAY+"T00:00");d.setDate(d.getDate()+1);date=d.toLocaleDateString("en-CA");return " ";});
  if(!date) s=s.replace(/\s(next\s+)?(sun|mon|tue|tues|wed|thu|thur|thurs|fri|sat)(day|sday|nesday|rsday|urday|urs)?\s/i,(m,nx,d3)=>{ const want=DAYS3[d3.toLowerCase()]; const t=new Date(TODAY+"T00:00"); let add=(want-t.getDay()+7)%7; if(add===0)add=7; if(nx&&add<7)add+=0; t.setDate(t.getDate()+add); date=t.toLocaleDateString("en-CA"); return " "; });
  let time="";
  s=s.replace(/\s(\d{1,2})(?::(\d{2}))?\s*(am|pm)\s/i,(m,h,mm,ap)=>{ let H=parseInt(h)%12; if(ap.toLowerCase()==="pm")H+=12; time=("0"+H).slice(-2)+":"+(mm||"00"); return " "; });
  if(!time) s=s.replace(/\s(\d{1,2}):(\d{2})\s/,(m,h,mm)=>{ time=("0"+parseInt(h)).slice(-2)+":"+mm; return " "; });
  const title=s.replace(/\s+/g," ").trim();
  if(!date||!title) return {title:title||String(raw).trim(),date:null,time};
  return {title,date,time};
}
async function renderCalendar(){
  const sent=await DB.daily(SENTINEL);
  const events=sent.calendarEvents||[];
  const schedule=sent.schedule||[];
  const games=GAME_RELEASES.concat(sent.gameEvents||[]);
  const showStream=localStorage.getItem("cal-hide-stream")!=="1", showGame=localStorage.getItem("cal-hide-game")!=="1", showEvent=localStorage.getItem("cal-hide-event")!=="1", showContent=localStorage.getItem("cal-hide-content")!=="1";
  const content = showContent ? await DB.content() : [];
  if(!state.calRef){ const t=new Date(); state.calRef=new Date(t.getFullYear(),t.getMonth(),1); }
  const ref=state.calRef, y=ref.getFullYear(), m=ref.getMonth();
  const startDow=new Date(y,m,1).getDay();
  const gridStart=new Date(y,m,1-startDow);
  const monthName=ref.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(gridStart); d.setDate(gridStart.getDate()+i);
    const ds=d.toLocaleDateString("en-CA");
    const inMonth=d.getMonth()===m, isToday=ds===TODAY;
    const dayShort=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    const streamChips=showStream?slotsForDate(sent,ds).filter(s=>s.day===dayShort).map(s=>`<div class="cal-stream" data-act="editSchedule" title="Stream day — tap to edit your schedule">🔴 ${s.time?esc(s.time)+" · ":""}${esc(s.title||"Stream")}</div>`).join(""):"";
    const gameChips=showGame?games.filter(g=>g.date===ds).map(g=>`<div class="cal-game" ${g.url?`data-act="gameLink" data-url="${esc(g.url)}"`:""} title="${esc(g.title)}${g.approx?" — date is a window/estimate, not officially confirmed":""}">🎮 ${esc(g.title)}${g.approx?" ~":""}</div>`).join(""):"";
    const contentChips=showContent?content.filter(c=>!c.parent_id&&c.scheduled_for===ds).map(c=>`<div class="cal-content" data-act="openContent" data-id="${c.id}" title="${esc(c.title)}">🎬 ${stageShort(c.stage)} ${esc(c.title)}</div>`).join(""):"";
    const dayEvents=showEvent?events.filter(ev=>ds>=ev.date && ds<=((ev.endDate&&ev.endDate>=ev.date)?ev.endDate:ev.date)):[];
    dayEvents.sort((a,b)=>{ const sa=(a.endDate&&a.endDate>a.date)?0:1, sb=(b.endDate&&b.endDate>b.date)?0:1; if(sa!==sb)return sa-sb; return (a.time||"99:99").localeCompare(b.time||"99:99"); });
    const chips=dayEvents.map(ev=>{
      const end=(ev.endDate&&ev.endDate>ev.date)?ev.endDate:null;
      const isStart=ds===ev.date, isEnd=ds===(end||ev.date);
      const et=toET(ev.date,ev.time,ev.tz);
      const tip=esc((et?et.etTime+" ET — ":"")+ev.title+(end?` (through ${end})`:"")+(ev.note?" — "+ev.note:""));
      if(end){
        const span=isStart?"span-start":(isEnd?"span-end":"span-mid");
        const body=isStart?`${et?`<b>${et.etTime}</b> `:""}${esc(ev.title)}${ev.note?" 📝":""} ›`:(isEnd?`‹ ${esc(ev.title)}`:`‹ ${esc(ev.title)} ›`);

      }

      return `<div class="cal-ev" draggable="true" data-eid="${ev.id}" data-act="calEvent" style="background:${ev.color||CAL_COLORS[0]}" title="${tip}">${tlabel}${esc(ev.title)}${ev.note?" 📝":""}</div>`;
    }).join("");
    cells+=`<div class="cal-cell ${inMonth?"":"other"} ${isToday?"today":""} ${ds<TODAY?"past":""}" data-date="${ds}" data-act="calAdd"><span class="cal-daynum">${d.getDate()}</span>${streamChips}${gameChips}${contentChips}${chips}</div>`;
  }
  /* C1: week-agenda view — today + the next 6 days as a calm vertical list (month grid one tap away) */
  const view=localStorage.getItem("eggie-cal-view")||"week";
  let agenda="";
  if(view==="week"){
    const rows=[];
    for(let i=0;i<7;i++){
      const d=new Date(TODAY+"T00:00"); d.setDate(d.getDate()+i);
      const ds=d.toLocaleDateString("en-CA");
      const dayShort=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];

      if(showEvent)events.filter(ev=>ds>=ev.date&&ds<=((ev.endDate&&ev.endDate>=ev.date)?ev.endDate:ev.date)).sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99")).forEach(ev=>{ const et=toET(ev.date,ev.time,ev.tz); bits.push(`<div class="cal-ev" data-eid="${ev.id}" data-act="calEvent" style="background:${ev.color||CAL_COLORS[0]};cursor:pointer">${et?`<b>${et.etTime}</b> `:""}${esc(ev.title)}${(ev.endDate&&ev.endDate>ev.date)?" ›":""}${ev.note?" 📝":""}</div>`); });
      rows.push(`<div class="soft-card" style="display:flex;gap:12px;align-items:flex-start;${i===0?"border-color:var(--pink);box-shadow:inset 0 0 0 1px rgba(236,127,175,.25);":""}">
        <div style="width:86px;flex:0 0 auto"><div style="font-family:var(--display);font-size:14px;${i===0?"color:var(--pink-deep)":""}">${label}</div><div class="label">${sub}</div></div>
        <div class="grow" style="display:flex;flex-direction:column;gap:4px;min-width:0">${bits.join("")||`<span class="soft" style="font-size:12px">nothing planned 🌙</span>`}</div>
        <button class="ft-ic" data-act="calAdd" data-date="${ds}" title="add something on ${label}">＋</button>
      </div>`);
    }
    agenda=`<div style="display:flex;flex-direction:column;gap:8px">${rows.join("")}</div>`;
  }
  return `<div class="panel" style="max-width:900px;margin:0 auto">
    <div class="card-head"><div><h2 style="font-size:18px">📅 ${view==="week"?"Your week":monthName}</h2><div class="label" style="margin-top:2px">${view==="week"?"the next 7 days, gently":"tap a day to add · drag to move"} · 🔴 streams · 🎮 games · 📹 content 🐙</div></div>
      <div style="display:flex;gap:6px;align-items:center"><div class="seg"><button data-act="calView" data-v="week" class="${view==="week"?"on":""}">📋 Week</button><button data-act="calView" data-v="month" class="${view==="month"?"on":""}">🗓 Month</button></div>${view==="month"?`<button class="btn" data-act="calPrev" title="previous month">‹</button><button class="btn" data-act="calToday">today</button><button class="btn" data-act="calNext" title="next month">›</button>`:""}</div></div>
    <div style="display:flex;gap:8px;margin:2px 0 10px"><input class="inp" id="calQuick" placeholder='quick add — try "thu 4pm collab with momo" ✨' ${RO?"disabled":""}/><button class="btn btn-pink" data-act="calQuickAdd" ${RO?"disabled":""}>＋ add</button></div>
    <div style="margin:0 0 12px"><span class="label" style="margin-right:8px">show</span><div class="seg" style="display:inline-flex">
      <button data-act="calToggle" data-layer="stream" class="${showStream?"on":""}">🔴 Streams</button>
      <button data-act="calToggle" data-layer="game" class="${showGame?"on":""}">🎮 Games</button>
      <button data-act="calToggle" data-layer="event" class="${showEvent?"on":""}">🗓️ Events</button>
      <button data-act="calToggle" data-layer="content" class="${showContent?"on":""}">📹 Content</button>
    </div></div>
    ${view==="week"?agenda:`<div class="cal-grid" style="margin-bottom:6px">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join("")}</div>
    <div class="cal-grid">${cells}</div>`}
    <p class="soft" style="font-size:11.5px;margin-top:12px">Nothing here is set in stone — ${view==="week"?"tap anything to tweak it":"drag things around"} whenever your week shifts. 💗</p>
  </div>`;

/* drag-to-move wiring — re-attached each render via postRender when the calendar is open */
function wireCalDnD(){
  let dragEid=null;
  document.querySelectorAll(".cal-ev").forEach(ev=>{
    ev.addEventListener("dragstart",e=>{ dragEid=ev.dataset.eid; ev.classList.add("dragging"); if(e.dataTransfer){e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",dragEid);}catch{}} });
    ev.addEventListener("dragend",()=>{ ev.classList.remove("dragging"); document.querySelectorAll(".cal-cell.drag-over").forEach(c=>c.classList.remove("drag-over")); });
  });
  document.querySelectorAll(".cal-cell").forEach(cell=>{
    cell.addEventListener("dragover",e=>{ e.preventDefault(); if(e.dataTransfer)e.dataTransfer.dropEffect="move"; cell.classList.add("drag-over"); });
    cell.addEventListener("dragleave",()=>cell.classList.remove("drag-over"));
    cell.addEventListener("drop",async e=>{
      e.preventDefault(); cell.classList.remove("drag-over");
      const eid=dragEid||(e.dataTransfer&&e.dataTransfer.getData("text/plain"));
      const date=cell.dataset.date;
      if(!eid||!date)return;
      if(RO){ toast("Read-only mode 🌸"); return; }
      await DB.saveDaily(SENTINEL,n=>{ const evs=(n.calendarEvents||[]).slice(); const t=evs.find(x=>x.id===eid); if(t){ if(t.endDate&&t.endDate>t.date){ const dur=calDiff(t.date,t.endDate); t.date=date; t.endDate=calAdd(date,dur); } else { t.date=date; } } return {...n,calendarEvents:evs}; });
      render();
    });
  });
}

/* quiet daily engines — run once per session, only against a healthy (non-empty) config row:
   M4: ↻ recurring monthly expenses auto-log on the first open of each month.
   CL4: clients' recurring deliverables ("2 thumbnails/wk") become fresh needs on the first open of each week. */
async function runDailyEngines(sent){
  try{
    const rec=sent.recurring||[];
    if(rec.length && sent.recurringLast!==monthKey()){
      await DB.saveDaily(SENTINEL,n=>({...n,recurringLast:monthKey()}));   // claim the month first — no double-logging across tabs
      for(const r of rec){ await DB.addIncome({kind:"out",source:r.source,category:r.source,amount:Number(r.amount)||0,note:(r.note?r.note+" · ":"")+"↻ auto"}); }
      DB._c.income=null; toast("↻ logged "+rec.length+" monthly expense"+(rec.length===1?"":"s")+" — one less thing to remember 💗");
    }
    const wk=mondayOf(TODAY);
    if(sent.autoNeedsWk!==wk && (sent.clients||[]).some(c=>(c.status==="active"||c.status==="onboarding")&&String(c.deliverables||"").trim())){
      let made=0;
      await DB.saveDaily(SENTINEL,n=>{
        const clients=(n.clients||[]).map(c=>{
          if(!(c.status==="active"||c.status==="onboarding"))return c;
          const items=String(c.deliverables||"").split(/\n|·|;/).map(s=>s.trim()).filter(s=>s&&/\/\s*wk|\/\s*week|weekly|per week|every week/i.test(s));
          if(!items.length)return c;
          const tasks=(c.tasks||[]).slice();
          items.forEach(it=>{ const text=it.replace(/\s*(\/\s*wk|\/\s*week|per week|every week|weekly)\s*/i," ").replace(/\s+/g," ").trim()+" (this week)";
            if(!tasks.some(t=>!t.done&&(t.status||"needs")!=="done"&&t.text===text)){ tasks.push({id:uid(),text,status:"needs",due:"",done:false,auto:true}); made++; } });
          return {...c,tasks};
        });
        return {...n,clients,autoNeedsWk:wk};
      });
      if(made) toast("🌸 queued "+made+" weekly deliverable"+(made===1?"":"s")+" onto the client boards");
      if(made) try{render();}catch(e){}
    }
  }catch(e){ console.error("daily engines",e); }
}
/* render() coalesces concurrent calls — two near-simultaneous renders used to double-run the
   entrance animation ("the page refreshes twice"). One runs; extras fold into a single follow-up. */
async function render(){
  try{ render._caller=new Error().stack||""; }catch(e){ render._caller=""; }
  if(render._busy){ render._again=true; return; }
  render._busy=true;
  try{ await renderCore(); }
  finally{ render._busy=false;
    if(render._again){ render._again=false;
      // loop-proof: at most ONE chained follow-up per 400ms. If some bug ever made every render
      // queue another, the old code would spiral until the tab crashed (and Chrome silently
      // reloads a crashed tab — which looks exactly like "the page refreshed itself").
      const _now=Date.now();
      if(_now-(render._chainT||0)>400){ render._chainT=_now; render(); }
    }
  }
}

/* JS masonry: pack each widget's row-span to its content (or its set/min height) so there are no gaps */
function layoutHome(){
  const grid=document.querySelector(".grid-modular"); if(!grid)return;
  const rowH=8, gap=16;
  /* responsive spans: clamp each card to the columns that actually exist on THIS screen;
     a card too wide to share a row goes full-width — no more left-hugging rows on iPad portrait */
  const colCount=(((getComputedStyle(grid).gridTemplateColumns)||"").match(/\S+/g)||[]).length||1;
  grid.querySelectorAll(".home-widget").forEach(w=>{
    if(w.classList.contains("resizing"))return;            // don't fight a live resize drag
    const want=parseInt(w.dataset.c||"0")||colCount;
    let span=Math.max(1,Math.min(want,colCount));
    if(colCount<=9 && span>colCount/2) span=colCount;      // narrow screens only (iPad portrait ≈8 cols) — desktop keeps her exact sizes
    const cur=/span (\d+)/.exec(w.style.gridColumn||"");
    if(!cur||+cur[1]!==span) w.style.gridColumn="span "+span;
  });
  grid.querySelectorAll(".home-widget").forEach(w=>{ const panel=w.querySelector(".panel,section")||w.lastElementChild; if(!panel)return;
    let h;
    if(w.classList.contains("min")){ h=50; }
    else { const sh=parseFloat(w.dataset.h||"0")||0; panel.style.minHeight=sh?sh+"px":""; h=panel.getBoundingClientRect().height; }
    if(h>0)w.style.gridRowEnd="span "+Math.max(2,Math.ceil((h+gap)/rowH));   // row-gap is 0 — the 16px breathing room lives inside the span, so snapping error is ≤8px and gaps look uniform
  });
}

/* ---- Kanban board view (To do / Doing / Done) — same tasks as the list, just a different lens ---- */
const TASK_STATUSES=[["todo","🌱 To do"],["doing","🔆 Doing"],["done","✅ Done"]];
function taskStatus(t){ return t.status || (t.done?"done":"todo"); }
/* sort lens for board columns + within list groups: custom (her order) · bucket · due · spoons */
function sortTasks(arr){
  const m=state.boardSort||"custom"; if(m==="custom")return arr;
  const bIdx=k=>{ const i=TASK_BUCKETS.findIndex(b=>b[0]===k); return i<0?99:i; };
  const sIdx={low:0,some:1,full:2};
  return arr.slice().sort((a,b)=>{
    if(m==="bucket"){ const d=bIdx(a.bucket)-bIdx(b.bucket); if(d)return d; return String(a.due||"9999").localeCompare(String(b.due||"9999")); }
    if(m==="due") return String(a.due||"9999-99").localeCompare(String(b.due||"9999-99"));
    if(m==="spoon"){ const d=((sIdx[a.spoon]??1)-(sIdx[b.spoon]??1)); if(d)return d; return String(a.due||"9999").localeCompare(String(b.due||"9999")); }
    return 0;
  });
}
function duePill(t){
  if(!t.due)return "";
  const diff=Math.ceil((new Date(t.due+"T00:00")-new Date(TODAY+"T00:00"))/86400000);
  if(t.done)return `<span class="pill pill-gray">📅 ${esc(t.due.slice(5))}</span>`;
  if(diff<0)return `<span class="pill" style="background:#fde4e4;color:#c0566a">📅 ${-diff}d late</span>`;
  if(diff===0)return `<span class="pill pill-peach">📅 today</span>`;
  if(diff<=3)return `<span class="pill pill-peach">📅 ${diff===1?"tomorrow":"in "+diff+"d"}</span>`;
  return `<span class="pill pill-gray">📅 ${esc(t.due.slice(5))}</span>`;
}

function careMoodChart(rows,days){
  const sorted=rows.slice().sort((a,b)=>a.date.localeCompare(b.date)).slice(-days);
  const W=680,H=170,padL=30,padR=12,padT=14,padB=22,n=sorted.length,innerW=W-padL-padR,innerH=H-padT-padB;
  const X=i=>padL+(n<=1?innerW/2:i*innerW/(n-1)), Y=v=>padT+innerH*(1-Math.max(0,Math.min(1,(v+4)/8)));   // −4..+4
  let grid=""; [[-4,"−4"],[0,"0"],[4,"+4"]].forEach(([v,l])=>{ const yy=Y(v); grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="${v===0?"#dcc8ef":"#efe6f2"}" stroke-width="${v===0?1.6:1}"/><text x="${padL-5}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#b3a6c0">${l}</text>`; });
  let line="",dots="",irr="",seg=[];
  const flush=()=>{ if(seg.length>1){ line+=`<path d="${seg.map((p,i)=>(i?"L":"M")+X(p.i).toFixed(1)+" "+Y(p.v).toFixed(1)).join(" ")}" fill="none" stroke="#a98fe0" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`; } seg=[]; };
  sorted.forEach((r,i)=>{ const b=(r.notes&&r.notes.care&&r.notes.care.bip)||{}; const e=b.elev;
    if(e==null||e===""){flush();return;} seg.push({i,v:Number(e)});
    dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(Number(e)).toFixed(1)}" r="3" fill="#fff" stroke="#a98fe0" stroke-width="1.8"><title>${r.date} · elevation ${e>0?"+"+e:e}${b.irrit?` · irritability ${b.irrit}`:""}${b.note?` — ${esc(b.note)}`:""}</title></circle>`;
    if(b.irrit)irr+=`<rect x="${(X(i)-3).toFixed(1)}" y="${(H-padB-Number(b.irrit)*9).toFixed(1)}" width="6" height="${Number(b.irrit)*9}" rx="2" fill="#f3a978" opacity=".7"><title>${r.date} · irritability ${b.irrit}/3</title></rect>`; });
  flush();
  const dl=ds=>{const p=ds.split("-");return p[1]+"/"+p[2];};
  const xl=n?`<text x="${X(0).toFixed(1)}" y="${H-6}" font-size="9" fill="#b3a6c0">${dl(sorted[0].date)}</text><text x="${(W-padR).toFixed(1)}" y="${H-6}" text-anchor="end" font-size="9" fill="#b3a6c0">${dl(sorted[n-1].date)}</text>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:100%;height:auto;display:block">${grid}${irr}${line}${dots}${xl}</svg>
    <div class="label" style="text-align:center;margin-top:4px"><span style="color:#8d6fd1">― elevation (−4 deep low · +4 very high)</span> · <span style="color:#cc7a3e">▮ irritability</span></div>`;
}

/* gentle, non-punitive pattern spotter for the Care center (emotion + executive function) */
function carePatterns(rows){
  const recs=rows.map(r=>(r.notes&&r.notes.care)||{}).filter(c=>Object.keys(c).length);
  const days=recs.length, out=[];
  const mean=a=>a.length?a.reduce((x,y)=>x+Number(y),0)/a.length:null;
  function cmp(cond,val){ const t=[],f=[]; recs.forEach(c=>{const o=val(c); if(o==null||o==="")return; (cond(c)?t:f).push(Number(o));}); return (t.length>=3&&f.length>=3)?{t:mean(t),f:mean(f)}:null; }
  const usedSkill=c=>(c.emoSkills&&c.emoSkills.length)||c.skill;
  const usedSupport=c=>(c.efSupports&&c.efSupports.length);
  { const cc=cmp(usedSkill,c=>c.mood); if(cc&&cc.t-cc.f>=0.6) out.push("🩷 On days you <b>used a regulation skill</b>, your mood tended to read a little brighter."); }
  { const cc=cmp(usedSupport,c=>c.efInit); if(cc&&cc.f-cc.t>=0.6) out.push("🪜 When you <b>broke things down or body-doubled</b>, starting felt easier (lower stuck-ness)."); }
  { const cc=cmp(c=>Number(c.efOverwhelm)>=3,c=>c.efInit); if(cc&&cc.t-cc.f>=0.6) out.push("🌪️ Higher-overwhelm days were harder to start on — those days, shrinking the first step may help most."); }
  { const cc=cmp(c=>!!c.joy,c=>c.mood); if(cc&&cc.t-cc.f>=0.5) out.push("💗 Days you <b>did something just for you</b> leaned brighter. Joy counts."); }
  const namedN=recs.filter(c=>c.feelings&&c.feelings.length).length;
  if(days>=5&&namedN>=3) out.push(`🔖 You named what you felt on ${namedN} of the last ${days} check-ins — that naming is regulation in action.`);
  { const cc=cmp(c=>!!(c.va&&c.va.done),c=>c.mood); if(cc&&cc.t-cc.f>=0.5) out.push("✨ Days you did <b>one valued thing</b> read brighter — doing → feeling, working as advertised."); }
  const rhyN=recs.filter(c=>c.rhythm&&Object.keys(c.rhythm).length>=2).length;
  if(days>=7&&rhyN>=4) out.push(`🕰️ You anchored your rhythm on ${rhyN} of the last ${days} days — that steadiness is quiet mood medicine.`);
  return { days, items: out.slice(0,6) };
}

/* ---- robust sponsor pipeline: rich cards, follow-up pills, per-column totals — shared by Money + Pitch ---- */
function followPill(s){
  if(!s.follow_up||s.stage==="passed")return "";
  const diff=Math.ceil((new Date(s.follow_up+"T00:00")-new Date(TODAY+"T00:00"))/86400000);
  if(diff<0)return `<span class="pill" style="background:#fde4e4;color:#c0566a">💬 ${-diff}d overdue</span>`;
  if(diff===0)return `<span class="pill pill-peach">💬 follow up today</span>`;
  if(diff<=3)return `<span class="pill pill-peach">💬 in ${diff}d</span>`;
  return `<span class="pill pill-gray">💬 ${esc(s.follow_up.slice(5))}</span>`;
}
function sponsorPipeline(sponsors){
  const showPassed=localStorage.getItem("eggie-show-passed")!=="0";
  const stages=SPONSOR_STAGES.filter(([k])=>showPassed||k!=="passed");
  return `<div class="kanban" style="grid-template-columns:repeat(${stages.length},minmax(175px,1fr))">${stages.map(([key,lbl])=>{
    const col=sponsors.filter(s=>s.stage===key).slice().sort((a,b)=>String(a.follow_up||"9999").localeCompare(String(b.follow_up||"9999"))||((Number(b.value)||0)-(Number(a.value)||0)));
    const tot=col.reduce((a,s)=>a+(Number(s.value)||0),0);
    return `<div class="kcol" data-act="dropSponsor" data-stage="${key}" ondragover="event.preventDefault()">
      <div class="label" style="display:flex;justify-content:space-between;padding:2px 4px"><span>${lbl}</span><span>${col.length}${tot?` · $${tot.toLocaleString()}`:""}</span></div>
      ${col.map(s=>`<div class="citem" draggable="true" data-act="dragSponsor" data-id="${s.id}">
        <div data-act="editSponsor" data-id="${s.id}" style="cursor:pointer" title="tap to edit">
          <div style="font-size:12.5px;font-weight:700">${esc(s.brand)}</div>
          <div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">${s.deal_type?`<span class="pill pill-lav">${esc(s.deal_type)}</span>`:""}${s.value?`<span class="pill pill-mint">$${Number(s.value).toLocaleString()}</span>`:""}${followPill(s)}</div>
          ${s.contact?`<div class="soft" style="font-size:11px;margin-top:4px">👤 ${esc(s.contact)}</div>`:""}
          ${s.note?`<div class="soft" style="font-size:11px;margin-top:4px;max-height:42px;overflow:hidden">${esc(s.note)}</div>`:""}
        </div>
      </div>`).join("")||`<div class="label" style="padding:6px;opacity:.6">—</div>`}

/* Notion-style table of every sponsor — the "view all" lens */

  return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;border-collapse:collapse;font-size:12.5px;min-width:640px">

function healthPatterns(rows){

  function cmp(cond,outF){ const t=[],f=[]; recs.forEach(r=>{const o=r.h[outF]; if(o==null||o==="")return; (cond(r.h)?t:f).push(Number(o));}); return (t.length>=3&&f.length>=3)?{t:mean(t),f:mean(f)}:null; }

  { const c=cmp(h=>!!h.compression,"lighthead"); if(c&&c.f-c.t>=0.7) out.push("🧦 Lightheadedness ran <b>lower on days you wore compression</b>."); }
  let ms=median(vals("salt"));

  { const c=cmp(h=>Number(h.sleepH)>=7,"fog"); if(c&&c.f-c.t>=0.7) out.push("😴 Brain fog was <b>gentler after 7+ hours of sleep</b>."); }
  { const c=cmp(h=>Number(h.sleepH)>=7,"pain"); if(c&&c.f-c.t>=0.7) out.push("🌙 Pain tended to be <b>lower after a longer sleep</b>."); }
  { const c=cmp(h=>!!h.paced,"fatigue"); if(c&&c.f-c.t>=0.7) out.push("🐢 On days you <b>paced yourself</b>, fatigue ran lower — pacing seems to pay off for you."); }
  { const c=cmp(h=>!!h.movement,"pain"); if(c&&c.f-c.t>=0.7) out.push("🧘 Gentle-movement days had <b>slightly lower pain</b> on average."); }

  { const c=cmp(h=>!!h.cycle,"pain"); if(c&&c.t-c.f>=0.7) out.push("🌺 Period days carried <b>more pain</b> — pre-planning gentle days around your cycle is medicine, not weakness."); }
  { const c=cmp(h=>Number(h.anxiety)>=3,"urgeN"); if(c&&c.t-c.f>=0.8) out.push("🌊 Picking urges cluster on <b>higher-anxiety days</b> — a minute with the bubble before mirror-time may catch the wave early."); }

function healthChartSVG(rows,key,max,offset,color,days){

  const pts=sorted.map(r=>{ const hv=(r.notes&&r.notes.health)||{}; let raw=hv[key]; const has=raw!=null&&raw!==""; return {date:r.date, raw:has?Number(raw):null, v:has?Number(raw)+(offset||0):null}; });
  const W=680,H=168,padL=26,padR=12,padT=14,padB=22, n=pts.length, innerW=W-padL-padR, innerH=H-padT-padB;
  const X=i=> padL+(n<=1?innerW/2:i*innerW/(n-1)), Y=v=> padT+innerH*(1-Math.max(0,Math.min(1,v/max)));
  let grid=""; [0,0.5,1].forEach(g=>{ const yy=padT+innerH*(1-g); grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="#efe6f2" stroke-width="1"/><text x="${padL-5}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#b3a6c0">${Math.round(max*g-(offset||0))}</text>`; });

  pts.forEach((p,i)=>{ if(p.v!=null){ const last=i===n-1; dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="${last?3.8:2.6}" fill="#fff" stroke="${color}" stroke-width="${last?2.6:1.6}"><title>${p.date}: ${p.raw}</title></circle>`; } });

/* center-crop an uploaded image to a small square data URL — keeps the config row light */
function avatarToDataURL(file){ return new Promise((res,rej)=>{ const img=new Image(); const u=URL.createObjectURL(file);
  img.onload=()=>{ const S=160; const side=Math.min(img.width,img.height); const sx=(img.width-side)/2, sy=(img.height-side)/2;
    const cv=document.createElement("canvas"); cv.width=S; cv.height=S; cv.getContext("2d").drawImage(img,sx,sy,side,side,0,0,S,S); URL.revokeObjectURL(u);
    res(cv.toDataURL("image/jpeg",0.85)); };
  img.onerror=()=>{ URL.revokeObjectURL(u); rej(new Error("couldn't read image")); }; img.src=u; });
}

/* aggregate-calendar drag: the dragged chip carries BOTH the event id and its client */
function wireCCalDnD(){
  let dragEid=null, dragCid=null;
  document.querySelectorAll(".ccal .cal-ev[draggable]").forEach(ev=>{
    ev.addEventListener("dragstart",e=>{ dragEid=ev.dataset.eid; dragCid=ev.dataset.cid; ev.classList.add("dragging"); if(e.dataTransfer){e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",dragEid);}catch(_){}} });
    ev.addEventListener("dragend",()=>{ ev.classList.remove("dragging"); document.querySelectorAll(".cal-cell.drag-over").forEach(c=>c.classList.remove("drag-over")); });
  });
  document.querySelectorAll(".ccal .cal-cell").forEach(cell=>{
    cell.addEventListener("dragover",e=>{ e.preventDefault(); if(e.dataTransfer)e.dataTransfer.dropEffect="move"; cell.classList.add("drag-over"); });
    cell.addEventListener("dragleave",()=>cell.classList.remove("drag-over"));
    cell.addEventListener("drop",async e=>{
      e.preventDefault(); cell.classList.remove("drag-over");
      const date=cell.dataset.date; if(!dragEid||!dragCid||!date)return;
      if(RO){ toast("Read-only mode 🌸"); return; }
      const cid=dragCid, eid=dragEid; dragEid=dragCid=null;
      await DB.saveDaily(SENTINEL,n=>({...n,clients:(n.clients||[]).map(c=>{ if(c.id!==cid)return c; const evs=(c.events||[]).slice(); const t=evs.find(x=>x.id===eid); if(t){ if(t.endDate&&t.endDate>t.date){ const dur=calDiff(t.date,t.endDate); t.date=date; t.endDate=calAdd(date,dur); } else { t.date=date; } } return {...c,touched:TODAY,events:evs}; })}));
      render();
    });
  });
}

const CCAL_COLORS=["#f6b8d4","#c9b8f0","#9fdcc0","#ffd9a0","#a9c8f0","#f0a9c0"];
function clientCalendarHTML(c){
  if(!state.clientCalRef){ const t=new Date(); state.clientCalRef=new Date(t.getFullYear(),t.getMonth(),1); }
  if(state.clientCalView==null){ try{state.clientCalView=localStorage.getItem("eggie-client-cal-view")||"week";}catch(e){state.clientCalView="week";} }
  const view=state.clientCalView||"week";
  const ref=state.clientCalRef, y=ref.getFullYear(), m=ref.getMonth();
  const monthName=ref.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const events=c.events||[], sched=c.schedule||[];
  const dueNeeds=(c.tasks||[]).filter(t=>!t.done&&(t.status||"needs")!=="done"&&t.due);
  const wdOf=ds=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(ds+"T00:00").getDay()];
  const streamsOn=ds=>{ const wd=wdOf(ds); return sched.filter(s=>(s.day||"").slice(0,3)===wd); };
  const evsOn=ds=>events.filter(e=>ds>=e.date && ds<=((e.endDate&&e.endDate>=e.date)?e.endDate:e.date)).sort((a,b)=>String(a.time||"99:99").localeCompare(String(b.time||"99:99")));
  const streamChip=s=>`<div class="cal-stream" data-act="clientSchedEdit" data-cid="${c.id}" title="recurring stream — tap to edit the schedule">🔴 ${s.time?esc(s.time)+" · ":""}${esc(s.title||"Stream")}</div>`;
  const evChip=(ev,drag)=>{ const end=(ev.endDate&&ev.endDate>ev.date)?ev.endDate:null; return `<div class="cal-ev" ${drag?'draggable="true"':''} data-act="clientEventOpen" data-cid="${c.id}" data-eid="${ev.id}" style="background:${esc(ev.color||CCAL_COLORS[0])}" title="${esc((ev.time?ev.time+' ':'')+ev.title+(end?' (through '+end+')':'')+(ev.note?' — '+ev.note:''))}">${ev.time?`<b>${esc(ev.time)}</b> `:""}${esc(ev.title)}${end?" ›":""}${ev.note?" 📝":""}</div>`; };
  const dueChip=t=>`<div class="cal-ev" style="background:#fde4e4;color:#c0566a" title="due: ${esc(t.text)}">🔴 ${esc(t.text.slice(0,12))}</div>`;
  let bodyHTML="";
  if(view==="month"){
    const startDow=new Date(y,m,1).getDay(), gridStart=new Date(y,m,1-startDow);
    const dows=["Su","Mo","Tu","We","Th","Fr","Sa"]; let cells="";
    for(let i=0;i<42;i++){ const d=new Date(gridStart); d.setDate(gridStart.getDate()+i); const ds=d.toLocaleDateString("en-CA"); const inMonth=d.getMonth()===m, isToday=ds===TODAY;
      cells+=`<div class="cal-cell ${inMonth?'':'other'} ${isToday?'today':''}" data-act="clientCalAdd" data-cid="${c.id}" data-date="${ds}"><span class="cal-daynum">${d.getDate()}</span>${streamsOn(ds).map(streamChip).join("")}${evsOn(ds).map(e=>evChip(e,true)).join("")}${dueNeeds.filter(t=>t.due===ds).map(dueChip).join("")}</div>`;
    }
    bodyHTML=`<div class="cal-grid" style="margin-bottom:5px">${dows.map(x=>`<div class="cal-dow">${x}</div>`).join("")}</div><div class="cal-grid">${cells}</div>`;
  } else {
    const rows=[];
    for(let i=0;i<7;i++){ const d=new Date(TODAY+"T00:00"); d.setDate(d.getDate()+i); const ds=d.toLocaleDateString("en-CA"); const label=i===0?"Today":i===1?"Tomorrow":d.toLocaleDateString("en-US",{weekday:"long"}); const sub=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      const bits=[].concat(streamsOn(ds).map(streamChip), evsOn(ds).map(e=>evChip(e,false)), dueNeeds.filter(t=>t.due===ds).map(dueChip));
      rows.push(`<div class="soft-card" style="display:flex;gap:12px;align-items:flex-start;${i===0?'border-color:var(--pink);box-shadow:inset 0 0 0 1px rgba(236,127,175,.25);':''}"><div style="width:80px;flex:0 0 auto"><div style="font-family:var(--display);font-size:13.5px;${i===0?'color:var(--pink-deep)':''}">${label}</div><div class="label">${sub}</div></div><div class="grow" style="display:flex;flex-direction:column;gap:4px;min-width:0">${bits.join("")||`<span class="soft" style="font-size:12px">nothing planned 🌙</span>`}</div><button class="ft-ic" data-act="clientCalAdd" data-cid="${c.id}" data-date="${ds}" title="add on ${label}">＋</button></div>`);
    }
    bodyHTML=`<div style="display:flex;flex-direction:column;gap:7px">${rows.join("")}</div>`;
  }
  return `<div class="panel" style="margin-bottom:14px"><div class="card-head"><h2 style="font-size:17px">📅 ${esc(c.name)}'s calendar</h2><div style="display:flex;gap:6px;align-items:center"><div class="seg"><button data-act="clientCalView" data-v="week" class="${view==='week'?'on':''}">📋 Week</button><button data-act="clientCalView" data-v="month" class="${view==='month'?'on':''}">🗓 Month</button></div>${view==='month'?`<button class="btn" data-act="clientCalPrev" title="previous month">‹</button><button class="btn" data-act="clientCalToday">today</button><button class="btn" data-act="clientCalNext" title="next month">›</button>`:''}</div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:-2px 0 9px;gap:8px;flex-wrap:wrap"><span class="label">${view==='month'?esc(monthName):'next 7 days'} · 🔴 streams · 🗓️ events</span><button class="btn" data-act="clientSchedEdit" data-cid="${c.id}">🗓️ stream schedule</button></div>
    <div class="mini-cal">${bodyHTML}</div>
    <p class="soft" style="font-size:11px;margin:8px 0 0">Tap a day to add a stream/collab/deadline (time, colour, multi-day, notes). Set their recurring streams with 🗓️. 🔴 in a cell = a need is due.</p></div>`;
}

/* practice timer — global interval so it survives re-renders; updates the DOM by id */
let _artInt=null;
function artPickGesture(){ return ART_GESTURES[Math.floor(Math.random()*ART_GESTURES.length)]; }
function artTimerStart(){ const t=state.art.timer=state.art.timer||{len:60,round:0,left:60}; t.on=true; t.left=t.len; t.round=(t.round||0)+1; t.elapsed=0; t.subject=artPickGesture(); state.art.pendingLog=null; if(_artInt)clearInterval(_artInt); _artInt=setInterval(artTick,1000); render(); }
function artTimerStop(){ const t=state.art&&state.art.timer; if(t){ t.on=false; if((t.elapsed||0)>=60) state.art.pendingLog=Math.round(t.elapsed/60); t.elapsed=0; } if(_artInt){clearInterval(_artInt);_artInt=null;} render(); }   /* A2: stopping offers to log the minutes — practice counts */
function artTimerSkip(){ const t=state.art&&state.art.timer; if(!t||!t.on)return; t.left=t.len; t.round=(t.round||0)+1; t.subject=artPickGesture(); artPaint(); }
function fmtClock(s){ s=Math.max(0,s); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); }
function artPaint(){ const t=state.art&&state.art.timer; if(!t)return; const d=document.getElementById("artTimerDisp"); if(d)d.textContent=fmtClock(t.left); const s=document.getElementById("artTimerSub"); if(s)s.textContent=t.subject||""; const r=document.getElementById("artTimerRound"); if(r)r.textContent="round "+t.round; }
function artTick(){ const t=state.art&&state.art.timer; if(!t||!t.on||state.tab!=="art"){ if(_artInt){clearInterval(_artInt);_artInt=null;} if(t&&t.on){ t.on=false; if((t.elapsed||0)>=60)state.art.pendingLog=Math.round(t.elapsed/60); t.elapsed=0; } return; } t.elapsed=(t.elapsed||0)+1; t.left--; if(t.left<0){ t.round++; t.left=t.len-1; t.subject=artPickGesture(); const w=document.getElementById("artStage"); if(w){ w.style.background="#fdeaf3"; setTimeout(()=>{ w.style.background=""; },450); } } artPaint(); }

/* ===== Egg Jean photos: downscale on-device so the upload stays light (≤1280px JPEG) + a tiny thumb for the chat log ===== */
function euScaleImage(file,max,q){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onerror=()=>rej(new Error("read failed")); r.onload=()=>{ const im=new Image(); im.onerror=()=>rej(new Error("not an image")); im.onload=()=>{ try{ const k=Math.min(1,max/Math.max(im.width||1,im.height||1)); const c=document.createElement("canvas"); c.width=Math.max(1,Math.round(im.width*k)); c.height=Math.max(1,Math.round(im.height*k)); const ctx=c.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(im,0,0,c.width,c.height); res(c.toDataURL("image/jpeg",q)); }catch(e){ rej(e); } }; im.src=r.result; }; r.readAsDataURL(file); }); }
async function euAttachPhoto(file){

}

/* ===== web push: this device subscribes itself; the public key comes from the reminders function (GET) ===== */
if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js").catch(function(){}); }catch(e){} }
function b64ToU8(b64){ const pad="=".repeat((4-b64.length%4)%4); const s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/"); const raw=atob(s); return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
async function pushSubscribe(){
  try{
    if(!("serviceWorker" in navigator)||!("PushManager" in window)){ toast("This browser doesn't support push 🌸"); return; }
    if(DEMO||!SB){ toast("Push needs the backend — switch demo off first 🌸"); return; }
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ toast("Notifications are blocked for this site 🌸"); return; }
    let pub="";
    try{ const r=await fetch(CONFIG.url+"/functions/v1/reminders",{headers:{apikey:CONFIG.anonKey}}); const j=await r.json(); pub=j.publicKey||""; }catch(e){}
    if(!pub){ toast("Deploy the reminders function + set the VAPID keys first 🌸"); return; }
    const reg=await navigator.serviceWorker.register("sw.js"); await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(sub && sub.options && sub.options.applicationServerKey){ /* keep existing */ }
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToU8(pub)});
    const j2=sub.toJSON();
    await DB.saveDaily(SENTINEL,n=>{ const subs=(n.pushSubs||[]).filter(s=>s.endpoint!==j2.endpoint); subs.push({endpoint:j2.endpoint,keys:j2.keys,ua:(navigator.userAgent||"").slice(0,90),added:TODAY}); return {...n,pushSubs:subs}; });
    toast("This device gets pushes now — even with the tab closed 📲");
    render();
  }catch(e){ console.error(e); toast("Push setup hiccuped: "+(e.message||e)+" 🌸"); }
}

/* auto-maintain push: if this device has EVER granted notifications, silently (re)subscribe on boot —
   push is effectively on by default once permission exists. Browsers forbid asking without a tap,
   so brand-new devices get one gentle nudge toward the 📲 button instead. */
async function pushAutoSubscribe(){
  try{
    if(DEMO||!SB||!("serviceWorker" in navigator)||!("PushManager" in window)||!window.Notification) return;
    if(Notification.permission!=="granted"){
      if(Notification.permission==="default" && !localStorage.getItem("push-nudged")){
        localStorage.setItem("push-nudged","1");
        setTimeout(function(){ try{ window.showPetBubble&&showPetBubble("⏰ want reminders even when this tab is closed? ⚙️ Settings → 📲 push to this device 💗",16000); }catch(e){} },9000);
      }
      return;
    }
    const reg=await navigator.serviceWorker.register("sw.js"); await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      let pub=""; try{ const r=await fetch(CONFIG.url+"/functions/v1/reminders",{headers:{apikey:CONFIG.anonKey}}); pub=(await r.json()).publicKey||""; }catch(e){}
      if(!pub) return;
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToU8(pub)});
    }
    const j=sub.toJSON();
    const sent=await DB.daily(SENTINEL);
    if(!(sent.pushSubs||[]).some(s=>s.endpoint===j.endpoint)){
      await DB.saveDaily(SENTINEL,n=>{ const subs=(n.pushSubs||[]).filter(s=>s.endpoint!==j.endpoint); subs.push({endpoint:j.endpoint,keys:j.keys,ua:(navigator.userAgent||"").slice(0,90),added:TODAY}); return {...n,pushSubs:subs}; });
    }
  }catch(e){}
}
setTimeout(pushAutoSubscribe, 3500);

/* ===================== TELEPROMPTER ===================== */
function openTeleprompter(text){
  text=(text||"").trim();
  if(!text){ toast("No script to read yet 🌸"); return; }
  closeTeleprompter();
  const ov=document.createElement("div"); ov.className="tp-overlay"; ov.id="tpOverlay";
  ov.innerHTML=`
    <div class="tp-bar">
      <button class="tp-go" id="tpPlay">▶ Play</button>
      <button id="tpRestart">↻ Restart</button>
      <label>🐢 Speed <input type="range" id="tpSpeed" min="10" max="240" value="55"> 🐇</label>
      <label>Size <input type="range" id="tpSize" min="24" max="92" value="44"></label>
      <label>Width <input type="range" id="tpWidth" min="30" max="100" value="70"></label>
      <button id="tpMirror" title="flip for teleprompter glass">🪞 Mirror</button>
      <div style="flex:1"></div>
      <span style="font-size:11.5px;color:#9a9ab0">space play/pause · ↑↓ speed · scroll to scrub · Esc close</span>
      <button id="tpClose">✕ Close</button>
    </div>
    <div class="tp-scroll" id="tpScroll">
      <div class="tp-mask"></div><div class="tp-line"></div>
      <div class="tp-text" id="tpText">${esc(text)}</div>
    </div>`;
  document.body.appendChild(ov);
  const txt=ov.querySelector("#tpText");
  const T={y:0,speed:55,size:44,width:70,playing:false,mirror:false,raf:null,last:0};
  function maxY(){ return Math.max(0, txt.scrollHeight - innerHeight*0.5); }
  function apply(){ txt.style.fontSize=T.size+"px"; txt.style.maxWidth=T.width+"%"; txt.style.transform=(T.mirror?"scaleX(-1) ":"")+"translateY("+(-T.y)+"px)"; }
  function setPlay(p){ T.playing=p; const b=ov.querySelector("#tpPlay"); b.textContent=p?"⏸ Pause":"▶ Play"; if(p){ T.last=0; T.raf=requestAnimationFrame(frame); } else if(T.raf){ cancelAnimationFrame(T.raf); T.raf=null; } }
  function frame(now){ if(!T.playing)return; const dt=Math.min(80, now-(T.last||now)); T.last=now; T.y+=T.speed*dt/1000; if(T.y>=maxY()){ T.y=maxY(); apply(); setPlay(false); return; } apply(); T.raf=requestAnimationFrame(frame); }
  ov.querySelector("#tpPlay").onclick=()=>setPlay(!T.playing);
  ov.querySelector("#tpRestart").onclick=()=>{ T.y=0; apply(); };
  ov.querySelector("#tpClose").onclick=closeTeleprompter;
  ov.querySelector("#tpMirror").onclick=function(){ T.mirror=!T.mirror; this.style.background=T.mirror?"#ec7faf":""; this.style.borderColor=T.mirror?"#ec7faf":""; apply(); };
  ov.querySelector("#tpSpeed").oninput=e=>{ T.speed=+e.target.value; };
  ov.querySelector("#tpSize").oninput=e=>{ T.size=+e.target.value; apply(); };
  ov.querySelector("#tpWidth").oninput=e=>{ T.width=+e.target.value; apply(); };
  ov.querySelector("#tpScroll").addEventListener("wheel",e=>{ e.preventDefault(); T.y=Math.max(0,Math.min(maxY(),T.y+e.deltaY)); apply(); },{passive:false});
  T._key=e=>{ if(!document.getElementById("tpOverlay"))return; if(e.key===" "){e.preventDefault();setPlay(!T.playing);} else if(e.key==="Escape"){closeTeleprompter();} else if(e.key==="ArrowUp"){e.preventDefault();T.speed=Math.min(240,T.speed+10);ov.querySelector("#tpSpeed").value=T.speed;} else if(e.key==="ArrowDown"){e.preventDefault();T.speed=Math.max(10,T.speed-10);ov.querySelector("#tpSpeed").value=T.speed;} };
  document.addEventListener("keydown",T._key);
  window._tp=T; apply();
}
function closeTeleprompter(){ const o=document.getElementById("tpOverlay"); if(o){ const T=window._tp; if(T){ if(T.raf)cancelAnimationFrame(T.raf); if(T._key)document.removeEventListener("keydown",T._key); } o.remove(); window._tp=null; } }

/* ===================== SCHEDULE · JOURNAL · BACKUP ===================== */
const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
async function loadSchedule(){ const s=await DB.daily(SENTINEL); return s.schedule||[]; }
async function saveSchedule(list){ await DB.saveDaily(SENTINEL,n=>({...n,schedule:list})); }
/* ── §5 per-week schedule: every week is its OWN plan (no infinite repeat). The legacy flat
   `schedule` array is the fallback for THIS week only and is NEVER deleted, so nothing is lost. ── */
function weekStartISO(off){ const m=mondayOf(TODAY); if(!off)return m; const d=new Date(m+"T00:00"); d.setDate(d.getDate()+off*7); return d.toLocaleDateString("en-CA"); }
function weekSlots(sent,wkISO){ const sw=(sent&&sent.schedWeeks)||{}; if(sw[wkISO])return sw[wkISO]; if(wkISO===mondayOf(TODAY))return (sent&&sent.schedule)||[]; return []; }
function slotsForDate(sent,ds){ return weekSlots(sent,mondayOf(ds)); }
async function setWeekSlots(wkISO,fn){ await DB.saveDaily(SENTINEL,n=>{ const sw={...(n.schedWeeks||{})}; const base=sw[wkISO]?sw[wkISO].slice():(wkISO===mondayOf(TODAY)?(n.schedule||[]).slice():[]); sw[wkISO]=fn(base); return {...n,schedWeeks:sw}; }); }
function weekLabel(off){ if(off===0)return "This week"; if(off===1)return "Next week"; if(off===-1)return "Last week"; const d=new Date(weekStartISO(off)+"T00:00"); return "Week of "+d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
/* per-day ideas for empty days. REAL 🎮 dates come ONLY from the calendar game layer (so they land on
   the right day and aren't invented); every other day gets a date-agnostic activity idea. */
function streamSuggestions(sent,wkISO){ const start=new Date(wkISO+"T00:00"); const games=(GAME_RELEASES||[]).concat(sent.gameEvents||[]); const byDay={};
  games.forEach(g=>{ if(!g.date)return; const d=new Date(g.date+"T00:00"); const diff=Math.round((d-start)/86400000); if(diff>=0&&diff<7){ const wd=DAYS[(d.getDay()+6)%7]; if(!byDay[wd])byDay[wd]=g.title; } });
  const ideas=["Cozy variety stream","Just chatting + a game","Art / creative stream","Community game night","Chill long stream","Reacts / watch-along","Catch-up cozy games"];
  return DAYS.map((wd,i)=>byDay[wd]?{day:wd,text:byDay[wd],real:true}:{day:wd,text:ideas[i%ideas.length],real:false}); }

function relTime(t){ const s=Math.floor((Date.now()-t)/1000); if(s<60)return "just now"; const m=Math.floor(s/60); if(m<60)return m+" min ago"; const h=Math.floor(m/60); if(h<24)return h+(h===1?" hour ago":" hours ago"); const d=Math.floor(h/24); if(d<7)return d+(d===1?" day ago":" days ago"); return new Date(t).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
/* Restore clients+inbox+invoices from a saved copy, merging onto the LIVE row so nothing else is touched */
async function restoreFrom(data,labelWhen){
  if(!data){ toast("That copy looks empty 🌸"); return; }
  const c=(data.clients||[]).length;
  if(!confirm(`Restore ${c} client${c===1?"":"s"} (+ inbox & invoices) from ${labelWhen}?\n\nThis replaces the current clients / inbox / invoices with that copy. Everything else stays as-is.`)) return;
  DB._force=true;   // restoring into a genuinely-empty row is legitimate — bypass the wipe tripwire
  try{ await DB.saveDaily(SENTINEL,n=>({...n, clients:data.clients||n.clients||[], inbox:data.inbox||n.inbox||[], invoices:data.invoices||n.invoices||[]})); }
  finally{ DB._force=false; }
  toast("🛟 Restored — welcome back 🌸"); state.clientPage=null; render();
}
