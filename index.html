const JOINTS=["jaw","shoulders","wrists","fingers","hips","knees","ankles","spine"];
function hscale(label,f,cur,hint){ let b=""; for(let i=0;i<=5;i++)b+=`<button data-act="healthSet" data-f="${f}" data-v="${i}" class="${(cur??-1)===i?'on':''}">${i}</button>`; return `<div style="margin:10px 0"><div class="label" style="margin-bottom:4px">${label}${hint?` <span class="muted">· ${hint}</span>`:""}</div><div class="scale">${b}</div></div>`; }
async function renderHealth(){

  const spark=(f,max,shift)=>{const s=series(f);return `<div class="spark">${s.map(v=>{if(v==null)return `<span style="height:2px;opacity:.25"></span>`;const hh=4+(((v+(shift||0))/max)*28);return `<span style="height:${Math.max(2,hh)}px" title="${v}"></span>`;}).join("")}</div>`;};

      ${hscale("Fatigue","fatigue",h.fatigue,"0 rested → 5 wiped")}
      ${hscale("Brain fog","fog",h.fog)}
      ${hscale("Dizziness / POTS","dizziness",h.dizziness)}
      <div style="margin:10px 0"><div class="label" style="margin-bottom:4px">Mood · 🌧️ low → ☀️ elevated</div><div class="scale">${moodBtns}</div></div>
      ${hscale("Anxiety","anxiety",h.anxiety,"0 calm → 5 high")}
      ${hscale("Focus","focus",h.focus,"0 scattered → 5 locked in")}
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin:10px 0">
        <div><div class="label" style="margin-bottom:4px">Sleep (hours)</div><input class="inp num" id="hSleepH" type="number" step="0.5" value="${h.sleepH??""}" style="width:90px" /></div>
        <div><div class="label" style="margin-bottom:4px">Sleep quality</div><div class="scale">${[1,2,3,4,5].map(i=>`<button data-act="healthSet" data-f="sleepQ" data-v="${i}" class="${h.sleepQ===i?'on':''}">${i}</button>`).join("")}</div></div>
      </div>
    </div>
    <div class="panel"><div class="card-head"><h2 style="font-size:18px">💊 Meds today</h2><button class="btn" data-act="editMeds">edit list</button></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">${medRows}</div></div>
    <div class="panel"><div class="card-head"><h2 style="font-size:18px">🌶️ Flare + notes</h2></div>
      <button class="hbtn ${h.flare?'done':''}" data-act="healthFlare" style="display:inline-flex;gap:8px;align-items:center"><span class="check ${h.flare?'on':''}"></span>I'm in a flare today</button>
      <div class="label" style="margin:10px 0 4px">Possible triggers</div><input class="inp" id="hTriggers" value="${esc(h.triggers||"")}" placeholder="weather, overdid it, stress, missed meds…" />
      <div class="label" style="margin:10px 0 4px">Notes</div><textarea class="inp" id="hNote" rows="2">${esc(h.note||"")}</textarea>
      <button class="btn btn-pink" data-act="saveHealthNotes" style="margin-top:10px">💾 save notes + sleep</button>
    </div>
    <div class="panel"><div class="card-head"><h2 style="font-size:18px">📈 Last 14 days</h2><span class="label">your patterns</span></div>
      ${[["Pain","pain",5,0],["Fatigue","fatigue",5,0],["Mood","mood",6,3],["Anxiety","anxiety",5,0],["Sleep (hrs)","sleepH",12,0]].map(([l,f,mx,sh])=>`<div style="display:flex;align-items:center;gap:10px;margin:7px 0"><span style="width:88px;font-size:12px" class="soft">${l}</span>${spark(f,mx,sh)}</div>`).join("")}
      ${flares.length?`<div class="label" style="margin-top:12px">recent flares</div>${flares.map(r=>`<div style="font-size:12px;margin-top:3px" class="soft">🌶️ ${r.date}${r.notes.health.triggers?` · ${esc(r.notes.health.triggers)}`:""}</div>`).join("")}`:""}
      <p class="soft" style="font-size:11.5px;margin-top:12px">Gaps are fine — a missing bar just means a rest day from tracking. 💗</p>
    </div>
  </div>`;
}

function loadThumb(file){
  const reader=new FileReader();
  reader.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=640, sc=Math.min(1,max/img.width), c=document.createElement("canvas");
    c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    state._thumb=c.toDataURL("image/jpeg",0.82);
    const p=document.getElementById("thumbPrev");
    if(p)p.innerHTML=`<div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">${[[120,"mobile feed"],[320,"desktop"],[480,"large"]].map(([w,l])=>`<div style="text-align:center"><img src="${state._thumb}" style="width:${w}px;max-width:100%;border-radius:8px;border:1px solid var(--line)" /><div class="label" style="margin-top:3px">${w}px · ${l}</div></div>`).join("")}</div>`;
  }; img.src=reader.result; };
  reader.readAsDataURL(file);
}
async function checkThumb(){

  if(DEMO||!SB){ out.innerHTML=`<div class="soft" style="font-size:12px">Deploy the analyze function + demo off to check thumbnails 🌸</div>`; return; }

  try{
    const r=await aiCall("thumbnail",{image:state._thumb,title:document.getElementById("oTitle").value});

/* ===================== HELPERS ===================== */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function greeting(){const h=new Date().getHours();return h<12?"Good morning":h<18?"Good afternoon":"Good evening";}
function habitVisible(h,energy,streamDay){if(h.energy==="essential")return true;if(h.energy==="intensive")return energy==="high"||streamDay;return energy!=="low";}
function energyShort(e){return e==="essential"?"🟢":e==="intensive"?"🌸":"🟦";}
function energyPill(e){return e==="essential"?"pill-mint":e==="intensive"?"pill-pink":"pill-lav";}
function catEmoji(c){return {"Pre-stream":"🌅","On-air":"🎙️","Post-stream":"🌙","Content":"📅","Community":"💬","Health":"💖","Business":"💼","Batch days":"🎨"}[c]||"🌸";}
function stageShort(s){return {idea:"💡",scripting:"✍️",recording:"🎥",editing:"✂️",thumbnail:"🖼️",scheduled:"📅",published:"✅"}[s]||s;}
function fmtShort(f){return {short:"SF",long:"LF",twitter:"X"}[f]||f;}
function pillarPill(p){return {growth:"pill-pink",retention:"pill-lav",experimental:"pill-peach"}[p]||"pill-gray";}
function sourceLabel(s){return {twitch:"Twitch",youtube:"YouTube",kofi:"Ko-fi",patreon:"Patreon",tips:"Tips",throne:"Throne",sponsor:"Sponsor",merch:"Merch",tiktok:"TikTok",fansly:"Fansly",other:"Other"}[s]||s;}
function sponsorPill(s){return {draft:"pill-gray",sent:"pill-lav",responded:"pill-peach",signed:"pill-mint",passed:"pill-gray"}[s]||"pill-gray";}
function toast(msg,undoAct){const el=document.getElementById("toast");el.innerHTML=`<div class="panel toast" style="display:flex;gap:12px;align-items:center;padding:10px 16px"><span style="font-size:13px">${esc(msg)}</span>${undoAct?`<button class="btn" data-act="${undoAct}">undo</button>`:""}</div>`;clearTimeout(toast._t);toast._t=setTimeout(()=>{el.innerHTML="";},4500);}

const WRITE_ACTS=["capture","habit","energy","streamDay","goalToggle","goalDel","addContent","addSub","delContent","bulkPublish","saveContent","delContentModal","critToggle","addIncome","addLedger","delLedger","addSponsor","editChannel","saveChannel","saveReview","dropStage","dropSponsor","addHabit","editHabit","saveHabit","delHabit","saveSetAside","addGoal","editGoal","allotGoal","saveGoal","delGoal","savePitch","aiAnalyze","ask","healthSet","healthJoint","medToggle","healthFlare","saveHealthNotes","recoveryDay","saveMed","delMed","autoChannel","runOptimize","checkThumb","addSlot","delSlot","saveJournal","saveConfig","noteToContent","noteSticky","delCapture","addSticky","stickyColor","delSticky"];
document.addEventListener("click",async(e)=>{
  const el=e.target.closest("[data-act]"); if(!el)return; const act=el.dataset.act, id=el.dataset.id;
  if(RO && WRITE_ACTS.includes(act)){ toast("Read-only mode 🌸"); return; }
  if(act==="tab")return setTab(el.dataset.tab);
  if(act==="toggleDemo"){ DEMO=!DEMO; if(!DEMO&&!SB){DEMO=true;toast("Add Supabase config to go live.");} return render(); }
  if(act==="closeModal"){ if(e.target===el){document.getElementById("modal").innerHTML="";render();} return; }
  if(act==="fmt"){ state.fmt=el.dataset.f; return render(); }

  if(act==="capture"){ const i=document.getElementById("capInput"); if(i.value.trim()){await DB.addCapture(i.value.trim());i.value="";toast("Captured 🐙");} }
  if(act==="habit"){ await bumpHabit(id); render(); }
  if(act==="energy"){ await DB.saveDaily(TODAY,n=>({...n,energy:el.dataset.v})); render(); }
  if(act==="streamDay"){ await DB.saveDaily(TODAY,n=>({...n,streamDay:!n.streamDay})); render(); }
  if(act==="goalToggle"){ await goalMut(el.dataset.scope,g=>g.map(x=>x.id===id?{...x,done:!x.done}:x)); render(); }
  if(act==="goalDel"){ await goalMut(el.dataset.scope,g=>g.filter(x=>x.id!==id)); render(); }

  if(act==="addContent"){ const i=document.getElementById("newContent"); if(i.value.trim()){await DB.addContent({title:i.value.trim(),stage:"idea",format:state.fmt==="all"?"short":state.fmt,priority:60});render();} }
  if(act==="addSub"){ const t=prompt("Sub-task (e.g. record b-roll):"); if(t){const p=(state._content||[]).find(x=>x.id===id);await DB.addContent({title:t,stage:p?p.stage:"idea",parent_id:id,priority:40});render();} }
  if(act==="delContent"){ await DB.delContent(id); render(); }
  if(act==="selContent"){ state.sel.has(id)?state.sel.delete(id):state.sel.add(id); render(); }
  if(act==="bulkPublish"){ for(const cid of state.sel) await DB.updateContent(cid,{stage:"published",published_at:new Date().toISOString()}); state.sel.clear(); toast("Shipped ✅ proud of you"); render(); }
  if(act==="bulkClear"){ state.sel.clear(); render(); }
  if(act==="smart")return smart();
  if(act==="smartClear"){ state.smartIds=null; render(); }
  if(act==="openContent")return openContent(id);
  if(act==="critToggle"){ const k=el.dataset.k; modalCrit[k]=!modalCrit[k]; el.classList.toggle("done"); el.querySelector(".check").classList.toggle("on"); }
  if(act==="saveContent")return saveContent(id);
  if(act==="delContentModal"){ await DB.delContent(id); document.getElementById("modal").innerHTML=""; toast("Deleted"); render(); }
  if(act==="aiAnalyze")return aiAnalyze();
  if(act==="useTitle"){ const f=document.getElementById("f_title"); if(f){f.value=el.dataset.t;toast("Title set ✨ — save the brief to keep it");} return; }

  if(act==="addHabit")return habitModal(null);
  if(act==="editHabit")return habitModal(state.lib.find(h=>h.id===id));
  if(act==="saveHabit")return saveHabit(id);
  if(act==="delHabit")return delHabit(id);

  if(act==="moneyView"){ state.moneyView=el.dataset.v; return render(); }
  if(act==="ledgerKind"){ state.ledgerKind=el.dataset.v; return render(); }
  if(act==="addLedger"){ const kind=state.ledgerKind||"in", src=document.getElementById("ledSource").value, a=parseFloat(document.getElementById("ledAmount").value), note=document.getElementById("ledNote").value.trim(); if(a){await DB.addIncome({kind,source:src,category:kind==="out"?src:null,amount:a,note});render();} }
  if(act==="delLedger"){ await DB.delIncome(id); render(); }
  if(act==="addGoal")return goalModal(null);
  if(act==="editGoal"){ const list=await DB.savings(); return goalModal(list.find(g=>g.id===id)); }
  if(act==="saveGoal")return saveGoal(id);
  if(act==="delGoal"){ await DB.delGoal(id); document.getElementById("modal").innerHTML=""; toast("Removed"); render(); }
  if(act==="allotGoal"){ const amt=parseFloat(prompt("Allot how much to this goal? $")); if(amt){const list=await DB.savings();const g=list.find(x=>x.id===id);await DB.updateGoal(id,{saved:Number(g.saved)+amt});toast("Allotted 🐖");render();} }
  if(act==="saveSetAside"){ const rate=(parseFloat(document.getElementById("taxRate").value)||0)/100, saved=parseFloat(document.getElementById("setAside").value)||0; await DB.saveDaily(SENTINEL,n=>({...n,taxRate:rate,setAside:{...(n.setAside||{}),[monthKey()]:saved}})); toast("Saved 🏦"); render(); }
  if(act==="addSponsor"){ const b=document.getElementById("sponsorBrand").value.trim(); if(b){await DB.addSponsor({brand:b,stage:"draft"});render();} }
  if(act==="genPitch")return genPitch();
  if(act==="copy"){ const t=document.getElementById(el.dataset.target); if(t){navigator.clipboard&&navigator.clipboard.writeText(t.value);toast("Copied 💗");} return; }
  if(act==="savePitch"){ const b=pitchVal("pBrand"); if(!b){toast("Add a brand name first 🌸");return;} await DB.addSponsor({brand:b,deal_type:pitchVal("pType"),stage:"draft",note:pitchVal("pAngle")||null}); toast("Saved to pipeline 💌"); return; }
  if(act==="settings")return settingsModal();
  if(act==="editConfig")return configModal();
  if(act==="saveConfig")return saveConfig();
  if(act==="exportData")return exportData();
  if(act==="openNote")return openNote(id);
  if(act==="noteToContent"){ const caps=await DB.captures(); const c=caps.find(x=>x.id===id); if(c){await DB.addContent({title:c.raw_text.slice(0,120),stage:"idea",priority:60});} document.getElementById("modal").innerHTML=""; toast("Added to content 🎬"); render(); return; }
  if(act==="noteSticky"){ const caps=await DB.captures(); const c=caps.find(x=>x.id===id); if(c)addSticky(c.raw_text); document.getElementById("modal").innerHTML=""; toast("Pinned 📌"); return; }
  if(act==="delCapture"){ await DB.delCapture(id); document.getElementById("modal").innerHTML=""; toast("Deleted"); render(); return; }
  if(act==="addSticky"){ addSticky(""); return; }
  if(act==="stickyColor"){ const cols=["#fff3b0","#ffd6e8","#d6f5e3","#e0d6fb","#cfe8ff"]; const n=STICKIES.find(s=>s.id===id); if(n){const i=cols.indexOf(n.color); n.color=cols[(i+1)%cols.length]; saveStickies(); renderStickies();} return; }
  if(act==="delSticky"){ STICKIES=STICKIES.filter(s=>s.id!==id); saveStickies(); renderStickies(); return; }
  if(act==="editSchedule")return scheduleModal();
  if(act==="addSlot")return addSlot();
  if(act==="delSlot")return delSlot(id);
  if(act==="saveJournal"){ const v=document.getElementById("journalBox").value; await DB.saveDaily(TODAY,n=>({...n,journal:v})); toast("Journaled 🌙"); return; }
  if(act==="setCalm"){ localStorage.setItem("eggie-calm",localStorage.getItem("eggie-calm")==="1"?"0":"1"); applySettings(); settingsModal(); return; }
  if(act==="setText"){ localStorage.setItem("eggie-text",localStorage.getItem("eggie-text")==="1"?"0":"1"); applySettings(); settingsModal(); return; }
  if(act==="setFocus"){ localStorage.setItem("eggie-focus",localStorage.getItem("eggie-focus")==="1"?"0":"1"); applySettings(); settingsModal(); render(); return; }
  if(act==="exitFocus"){ localStorage.setItem("eggie-focus","0"); applySettings(); render(); return; }
  if(act==="healthSet"){ const f=el.dataset.f,v=Number(el.dataset.v); await DB.saveDaily(TODAY,n=>({...n,health:{...(n.health||{}),[f]:v}})); render(); }
  if(act==="healthJoint"){ const j=el.dataset.j; await DB.saveDaily(TODAY,n=>{const cur=(n.health&&n.health.joints)||[];const joints=cur.includes(j)?cur.filter(x=>x!==j):[...cur,j];return {...n,health:{...(n.health||{}),joints}};}); render(); }
  if(act==="medToggle"){ await DB.saveDaily(TODAY,n=>{const meds={...((n.health&&n.health.meds)||{})};meds[id]=!meds[id];return {...n,health:{...(n.health||{}),meds}};}); render(); }
  if(act==="healthFlare"){ await DB.saveDaily(TODAY,n=>({...n,health:{...(n.health||{}),flare:!((n.health||{}).flare)}})); render(); }
  if(act==="saveHealthNotes"){ const sleepH=parseFloat(document.getElementById("hSleepH").value)||null, triggers=document.getElementById("hTriggers").value, note=document.getElementById("hNote").value; await DB.saveDaily(TODAY,n=>({...n,health:{...(n.health||{}),sleepH,triggers,note}})); toast("Saved 💗"); }
  if(act==="recoveryDay"){ await DB.saveDaily(TODAY,n=>({...n,energy:"low",streamDay:false})); toast("Recovery day set 🌙 be kind to yourself"); render(); }
  if(act==="editMeds")return medsModal();
  if(act==="saveMed")return saveMed();
  if(act==="delMed")return delMed(id);
  if(act==="editChannel")return editChannel();
  if(act==="saveChannel")return saveChannel();
  if(act==="autoChannel"){ if(DEMO||!SB){toast("Deploy the analyze function + demo off to auto-pull 🌸");return;} toast("Pulling your numbers… 🐙"); try{ const r=await aiCall("channelStats",{channelId:CONFIG.youtubeChannelId,discordInvite:CONFIG.discordInvite,twitchHandle:CONFIG.twitchHandle}); toast(r&&r.error?r.error:"Channel pulse updated ✨"); render(); }catch(e){ toast("Couldn't auto-pull: "+(e.message||e)); } return; }
  if(act==="optMode"){ state.optMode=el.dataset.v; return render(); }
  if(act==="runOptimize")return runOptimize();
  if(act==="checkThumb")return checkThumb();
  if(act==="copyText"){ if(navigator.clipboard)navigator.clipboard.writeText(el.dataset.t); toast("Copied 💗"); return; }
  if(act==="saveReview")return saveReview();
  if(act==="ask")return ask();
});
document.addEventListener("change",e=>{ if(e.target&&e.target.id==="thumbFile"&&e.target.files&&e.target.files[0]) loadThumb(e.target.files[0]);
  if(e.target&&e.target.dataset&&e.target.dataset.act==="stickyEdit"&&!RO){ const n=STICKIES.find(s=>s.id===e.target.dataset.id); if(n){n.text=e.target.value;saveStickies();} } });
/* sticky drag */
let dragSticky=null,dragOff={x:0,y:0};
document.addEventListener("mousedown",e=>{ if(RO)return; if(e.target.closest('[data-act="stickyColor"],[data-act="delSticky"]'))return; const h=e.target.closest('[data-act="stickyDrag"]'); if(!h)return; const el=h.closest(".sticky"); if(!el)return; dragSticky=el; const r=el.getBoundingClientRect(); dragOff={x:e.clientX-r.left,y:e.clientY-r.top}; e.preventDefault(); });
document.addEventListener("mousemove",e=>{ if(!dragSticky)return; let x=Math.max(0,Math.min(window.innerWidth-60,e.clientX-dragOff.x)), y=Math.max(54,Math.min(window.innerHeight-30,e.clientY-dragOff.y)); dragSticky.style.left=x+"px"; dragSticky.style.top=y+"px"; });
document.addEventListener("mouseup",()=>{ if(!dragSticky)return; const id=dragSticky.getAttribute("data-sid"), n=STICKIES.find(s=>s.id===id); if(n){n.x=parseInt(dragSticky.style.left)||n.x; n.y=parseInt(dragSticky.style.top)||n.y; saveStickies();} dragSticky=null; });
document.addEventListener("keydown",async(e)=>{
  if(e.key!=="Enter")return; const t=e.target;
  if(t.id==="capInput")document.querySelector('[data-act="capture"]').click();
  if(t.id==="newContent")document.querySelector('[data-act="addContent"]').click();
  if(t.id==="ledAmount"||t.id==="ledNote")document.querySelector('[data-act="addLedger"]').click();
  if(t.id==="sponsorBrand")document.querySelector('[data-act="addSponsor"]').click();
  if(t.id==="smartQ")smart();
  if(t.id==="askQ")ask();
  if(t.dataset&&t.dataset.act==="goalAdd"&&t.value.trim()){const sc=t.dataset.scope,tx=t.value.trim();t.value="";await goalMut(sc,g=>[...g,{id:uid(),text:tx,done:false}]);render();}
});
let dragId=null,dragType=null;
document.addEventListener("dragstart",e=>{const cc=e.target.closest('[data-act="dragContent"]');const sc=e.target.closest('[data-act="dragSponsor"]');if(cc){dragId=cc.dataset.id;dragType="content";}else if(sc){dragId=sc.dataset.id;dragType="sponsor";}});
document.addEventListener("drop",async e=>{
  if(RO)return; const cs=e.target.closest('[data-act="dropStage"]');const ss=e.target.closest('[data-act="dropSponsor"]');
  if(cs&&dragType==="content"&&dragId){e.preventDefault();const stage=cs.dataset.stage;const patch={stage};if(stage==="published")patch.published_at=new Date().toISOString();await DB.updateContent(dragId,patch);dragId=null;render();}
  else if(ss&&dragType==="sponsor"&&dragId){e.preventDefault();await DB.updateSponsor(dragId,{stage:ss.dataset.stage});dragId=null;render();}
});

/* feature impls */
async function bumpHabit(hid){ const h=state.lib.find(x=>x.id===hid); const t=(h&&h.total)||1; await DB.saveDaily(TODAY,n=>{const habits=n.habits||{counts:{}};const counts={...(habits.counts||{})};const cur=counts[hid]||0;counts[hid]=cur>=t?0:cur+1;return{...n,habits:{counts}};}); }
async function goalMut(scope,fn){ const key=scope==="week"?"goals_week_items":"goals_month_items"; await DB.saveDaily(SENTINEL,n=>({...n,[key]:fn(n[key]||[])})); }
function smart(){ const q=(document.getElementById("smartQ").value||"").toLowerCase().trim(); if(!q){state.smartIds=null;return render();} state.smartIds=(state._content||[]).filter(c=>(c.title+" "+(c.hook||"")+" "+(c.hashtags||[]).join(" ")).toLowerCase().includes(q)).map(c=>c.id); render(); }
async function editChannel(){ const day=await DB.daily(TODAY); const ch=day.channel||{};
  document.getElementById("modal").innerHTML=`<div class="modal-bg" data-act="closeModal"><div class="panel" style="max-width:400px;width:100%"><div class="card-head"><h3 style="font-size:16px">Channel pulse</h3><button class="btn" data-act="closeModal">✕</button></div>${CHANNEL_STATS.map(([k,l])=>`<div class="label" style="margin-top:8px">${l}</div><input class="inp num" id="ch_${k}" type="number" value="${ch[k]??""}" />`).join("")}<button class="btn btn-pink" data-act="saveChannel" style="margin-top:14px">💾 save</button></div></div>`; }
async function saveChannel(){ const ch={}; CHANNEL_STATS.forEach(([k])=>{const v=document.getElementById("ch_"+k).value;if(v!=="")ch[k]=parseInt(v);}); await DB.saveDaily(TODAY,n=>({...n,channel:ch})); document.getElementById("modal").innerHTML=""; toast("Updated 🌸"); render(); }
async function saveReview(){ const data={}; document.querySelectorAll("[data-rv]").forEach(el=>data[el.dataset.rv]=el.value); await DB.saveDaily(SENTINEL,n=>({...n,review:data})); toast("Week sealed 🌷 proud of you"); }
async function ask(){
  const raw=(document.getElementById("askQ").value||"").trim(); const box=document.getElementById("askResults"); if(!raw){box.innerHTML="";return;}
  if(!DEMO && SB){
    box.innerHTML=`<div class="label">thinking… 🐙</div>`;
    try{ const r=await aiCall("ask",{question:raw}); if(r&&r.error)throw new Error(r.error); box.innerHTML=`<div class="soft-card" style="white-space:pre-wrap;font-size:13px;line-height:1.6">${esc((r&&r.answer)||"(no answer)")}</div>`; }
    catch(e){ box.innerHTML=`<div class="soft-card" style="font-size:12.5px;color:var(--rose)">Couldn't reach the assistant: ${esc(e.message||e)}. Showing a keyword search instead.</div>`; await keywordAsk(raw,box); }
    return;
  }
  box.innerHTML=""; await keywordAsk(raw,box);
}
async function keywordAsk(raw,box){
  const q=raw.toLowerCase(); const [content,caps]=await Promise.all([DB.content(),DB.captures()]);
  const hits=[...content.filter(c=>(c.title+" "+(c.hook||"")+" "+(c.script||"")).toLowerCase().includes(q)).map(c=>({t:"🎬 "+stageShort(c.stage),x:c.title})),...caps.filter(c=>(c.raw_text||"").toLowerCase().includes(q)).map(c=>({t:"🐙 capture",x:c.raw_text}))];
  box.insertAdjacentHTML("beforeend",hits.length?hits.map(h=>`<div class="citem" style="margin:8px 0 0;cursor:default"><div class="label">${h.t}</div><div style="font-size:13px;margin-top:3px">${esc(h.x)}</div></div>`).join(""):`<div class="soft" style="font-size:13px;margin-top:8px">No matches — try fewer words. 🌸</div>`);
}

/* boot */
function postRender(){ const c=document.getElementById("clock"); if(c)c.textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}); }
setInterval(()=>{const c=document.getElementById("clock");if(c)c.textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});},1000);
applySettings();
render();
</script>
</body>
</html>
