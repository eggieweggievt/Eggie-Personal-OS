/* ===================== FOCUS TIMER 🍅 (with always-on-top pop-out) ===================== */
let PIP=null;
const timer={ running:false, mode:"work", workMin:+(localStorage.getItem("eggie-work")||25), breakMin:+(localStorage.getItem("eggie-break")||5), remaining:0, pomos:0, task:"", min:false, iv:null };
timer.remaining=timer.workMin*60;
function ftFmt(s){ s=Math.max(0,s); const m=Math.floor(s/60),x=s%60; return m+":"+String(x).padStart(2,"0"); }
function actDoc(){ return PIP?PIP.document:document; }
function paintTimer(){ if(PIP)renderPip(); else renderTimer(); }
function toggleTimer(){ if(PIP)return; const w=document.getElementById("focusWidget"); if(!w)return; if(w.classList.contains("hidden")){ w.classList.remove("hidden"); if(!w.style.left){w.style.left=Math.max(8,window.innerWidth-272)+"px";w.style.top=Math.max(60,window.innerHeight-380)+"px";} renderTimer(); } else { pauseTimer(); w.classList.add("hidden"); } }
/* wall-clock based: browsers throttle setInterval in background tabs, so we always compute
   the remaining time from an absolute end-timestamp — the countdown stays true even if the
   tab was asleep for ten minutes, and catches up the moment it wakes. */
function startPause(){ const t=actDoc().getElementById("focusTask"); if(t)timer.task=t.value; if(timer.running){ pauseTimer(); } else { timer.running=true; timer.endsAt=Date.now()+Math.max(1,timer.remaining)*1000; timer.iv=setInterval(()=>{ timer.remaining=Math.round((timer.endsAt-Date.now())/1000); if(timer.remaining<=0){phaseComplete();return;} tickTimer(); },1000); } paintTimer(); }
function pauseTimer(){ if(timer.running&&timer.endsAt)timer.remaining=Math.max(0,Math.round((timer.endsAt-Date.now())/1000)); timer.running=false; timer.endsAt=null; if(timer.iv){clearInterval(timer.iv);timer.iv=null;} }
function resetTimer(){ pauseTimer(); timer.remaining=(timer.mode==="work"?timer.workMin:timer.breakMin)*60; paintTimer(); }
function phaseComplete(){ pauseTimer(); ftChime(); if(timer.mode==="work"){ timer.pomos++; timer.mode="break"; timer.remaining=timer.breakMin*60; toast("Focus block done 🍅 — gentle break 🌸"); } else { timer.mode="work"; timer.remaining=timer.workMin*60; toast("Break over — ready when you are 💗"); } paintTimer(); }
function setLen(which,d){ if(which==="work"){ timer.workMin=Math.max(5,Math.min(90,timer.workMin+d)); localStorage.setItem("eggie-work",timer.workMin); if(timer.mode==="work"&&!timer.running)timer.remaining=timer.workMin*60; } else { timer.breakMin=Math.max(1,Math.min(30,timer.breakMin+d)); localStorage.setItem("eggie-break",timer.breakMin); if(timer.mode==="break"&&!timer.running)timer.remaining=timer.breakMin*60; } paintTimer(); }
function ftChime(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(),g=a.createGain(); o.connect(g);g.connect(a.destination); o.type="sine"; o.frequency.value=680; g.gain.setValueAtTime(.0001,a.currentTime); g.gain.exponentialRampToValueAtTime(.18,a.currentTime+.05); g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+1.1); o.start(); o.stop(a.currentTime+1.15);}catch{} }
function tickTimer(){ const d=actDoc(); const t=d.getElementById("ftTime"); if(t)t.textContent=ftFmt(timer.remaining); const mp=d.getElementById("ftMinTime"); if(mp)mp.textContent=ftFmt(timer.remaining); const arc=d.getElementById("ftArc"); if(arc){ const R=46,C=2*Math.PI*R,total=(timer.mode==="work"?timer.workMin:timer.breakMin)*60; arc.setAttribute("stroke-dashoffset", C*(1-Math.max(0,timer.remaining)/total)); } }
function timerInner(){
  const R=46,C=2*Math.PI*R,total=(timer.mode==="work"?timer.workMin:timer.breakMin)*60,off=C*(1-Math.max(0,timer.remaining)/total);
  return `<div class="ft-ring ${timer.running?'running':''}"><svg width="118" height="118" viewBox="0 0 118 118"><circle cx="59" cy="59" r="${R}" fill="none" stroke="#f0e6f2" stroke-width="8"/><circle id="ftArc" cx="59" cy="59" r="${R}" fill="none" stroke="url(#ftg)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 59 59)" style="transition:stroke-dashoffset .9s linear"/><defs><linearGradient id="ftg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ec7faf"/><stop offset="1" stop-color="#a98fe0"/></linearGradient></defs></svg><div class="ft-time mono" id="ftTime">${ftFmt(timer.remaining)}</div></div>
    <input class="inp" id="focusTask" placeholder="focusing on…" value="${esc(timer.task||"")}" style="margin:2px 0 8px;font-size:12px"/>
    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:8px"><button class="btn btn-pink" data-act="timerStartPause">${timer.running?"⏸ pause":"▶ start"}</button><button class="btn" data-act="timerReset">↺</button></div>
    <div style="display:flex;gap:12px;justify-content:center;font-size:11px" class="soft"><span>work <button class="ft-ic" data-act="timerWorkDown">–</button>${timer.workMin}<button class="ft-ic" data-act="timerWorkUp">+</button></span><span>break <button class="ft-ic" data-act="timerBreakDown">–</button>${timer.breakMin}<button class="ft-ic" data-act="timerBreakUp">+</button></span></div>`;
}
function renderTimer(){
  const w=document.getElementById("focusWidget"); if(!w||w.classList.contains("hidden"))return;
  if(timer.min){ w.classList.add("min"); w.innerHTML=`<div class="ft-head" data-act="dragTimer"><span class="label">${timer.mode==="work"?"🎯":"🌸"} <span id="ftMinTime" class="mono">${ftFmt(timer.remaining)}</span></span><div><button class="ft-ic" data-act="timerStartPause">${timer.running?"⏸":"▶"}</button><button class="ft-ic" data-act="timerMin" title="expand">▢</button></div></div>`; return; }
  w.classList.remove("min");
  w.innerHTML=`<div class="ft-head" data-act="dragTimer"><span class="label">${timer.mode==="work"?"🎯 Focus":"🌸 Break"} · 🍅 ${timer.pomos}</span><div><button class="ft-ic" data-act="popOutTimer" title="pop out — floats on top of everything">⤢</button><button class="ft-ic" data-act="timerMin" title="minimize">–</button><button class="ft-ic" data-act="timerClose" title="close">×</button></div></div>${timerInner()}`;
}
function renderPip(){ if(!PIP)return; const root=PIP.document.getElementById("pipRoot"); if(!root)return;

async function popOutTimer(){
  if(!window.documentPictureInPicture){ toast("Pop-out needs Chrome, Edge, or Firefox 151+ 🌸"); return; }
  try{
    PIP=await documentPictureInPicture.requestWindow({width:256,height:540});
    document.querySelectorAll('style,link[rel="stylesheet"]').forEach(n=>PIP.document.head.appendChild(n.cloneNode(true)));
    PIP.document.body.style.cssText="margin:0;padding:14px;background:#fbf3f9;font-family:'Quicksand',ui-rounded,system-ui,sans-serif";
    const root=PIP.document.createElement("div"); root.id="pipRoot"; PIP.document.body.appendChild(root);
    PIP.document.addEventListener("click",e=>{ const el=e.target.closest("[data-act]"); if(!el)return; const a=el.dataset.act;
      if(a==="delSticky"){ STICKIES=STICKIES.filter(s=>s.id!==el.dataset.id); saveStickies(); renderPip(); renderStickies(); }
      else if(a==="pipAddNote"){ const i=PIP.document.getElementById("pipNote"); if(i&&i.value.trim()){ addSticky(i.value.trim()); renderPip(); } }
      else handleTimerAct(a); });
    PIP.addEventListener("pagehide",()=>{ PIP=null; const w=document.getElementById("focusWidget"); if(w)w.classList.remove("hidden"); renderTimer(); const fb=document.getElementById("focusBtn"); if(fb)fb.style.display=RO?"none":""; });
    document.getElementById("focusWidget").classList.add("hidden");
    renderPip();
  }catch(e){ toast("Couldn't pop out: "+(e.message||e)); }
}
function handleTimerAct(a){ if(a==="timerStartPause")startPause(); else if(a==="timerReset")resetTimer(); else if(a==="timerMin"){timer.min=!timer.min;renderTimer();} else if(a==="timerClose")toggleTimer(); else if(a==="timerWorkUp")setLen("work",1); else if(a==="timerWorkDown")setLen("work",-1); else if(a==="timerBreakUp")setLen("break",1); else if(a==="timerBreakDown")setLen("break",-1); else if(a==="popOutTimer")popOutTimer(); else if(a==="toggleTimer")toggleTimer(); }

/* ===================== HELPERS ===================== */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function greeting(){const h=new Date().getHours();return h<12?"Good morning":h<18?"Good afternoon":"Good evening";}
function habitVisible(h,energy,streamDay){if(h.energy==="essential")return true;if(h.energy==="intensive")return energy==="high"||streamDay;return energy!=="low";}
function energyShort(e){return e==="essential"?"🟢":e==="intensive"?"🌸":"🟦";}
function energyPill(e){return e==="essential"?"pill-mint":e==="intensive"?"pill-pink":"pill-lav";}
function catEmoji(c){const f=HABIT_CATS.find(x=>x.name===c);if(f)return f.emoji;return {"Pre-stream":"🌅","On-air":"🎙️","Post-stream":"🌙","Content":"📅","Community":"💬","Health":"💖","Business":"💼","Batch days":"🎨"}[c]||"🌸";}
function stageShort(s){return {idea:"💡",scripting:"✍️",recording:"🎥",editing:"✂️",thumbnail:"🖼️",scheduled:"📅",published:"✅"}[s]||s;}
function fmtShort(f){return {short:"SF",long:"LF",twitter:"X"}[f]||f;}
function pillarPill(p){return {growth:"pill-pink",retention:"pill-lav",experimental:"pill-peach"}[p]||"pill-gray";}
function sourceLabel(s){return {twitch:"Twitch",youtube:"YouTube",kofi:"Ko-fi",patreon:"Patreon",tips:"Tips",throne:"Throne",sponsor:"Sponsor",merch:"Merch",tiktok:"TikTok",fansly:"Fansly",other:"Other"}[s]||s;}
function sponsorPill(s){return {draft:"pill-gray",sent:"pill-lav",responded:"pill-peach",signed:"pill-mint",passed:"pill-gray"}[s]||"pill-gray";}
/* toast(msg) · toast(msg,"undoAct") · toast(msg,{act,label,id,ms}) — the object form shows one action button */
function toast(msg,extra){const el=document.getElementById("toast");
  let btn="",ms=4500;
  if(typeof extra==="string")btn=`<button class="btn" data-act="${extra}">undo</button>`;
  else if(extra&&extra.act){btn=`<button class="btn btn-pink" data-act="${esc(extra.act)}" ${extra.id?`data-id="${esc(extra.id)}"`:""} ${extra.tab?`data-tab="${esc(extra.tab)}"`:""} ${extra.v?`data-v="${esc(extra.v)}"`:""}>${esc(extra.label||"do it")}</button>`;ms=extra.ms||8000;}
  el.innerHTML=`<div class="panel toast" style="display:flex;gap:12px;align-items:center;padding:10px 16px"><span style="font-size:13px">${esc(msg)}</span>${btn}</div>`;clearTimeout(toast._t);toast._t=setTimeout(()=>{el.innerHTML="";},ms);}

/* sticky drag */
let dragSticky=null,dragOff={x:0,y:0};
document.addEventListener("pointerdown",e=>{ if(e.target.closest("button,textarea,input,select,a"))return; const h=e.target.closest('[data-act="stickyDrag"],[data-act="dragTimer"]'); if(!h)return; const el=h.dataset.act==="dragTimer"?document.getElementById("focusWidget"):h.closest(".sticky"); if(!el)return; if(el.classList.contains("sticky")&&RO)return; dragSticky=el; const r=el.getBoundingClientRect(); dragOff={x:e.clientX-r.left,y:e.clientY-r.top}; try{h.setPointerCapture(e.pointerId);}catch(er){} e.preventDefault(); });
document.addEventListener("pointermove",e=>{ if(!dragSticky)return; let x=Math.max(0,Math.min(window.innerWidth-60,e.clientX-dragOff.x)), y=Math.max(54,Math.min(window.innerHeight-30,e.clientY-dragOff.y)); dragSticky.style.left=x+"px"; dragSticky.style.top=y+"px"; });
document.addEventListener("pointerup",()=>{ if(!dragSticky)return; const id=dragSticky.getAttribute("data-sid"), n=STICKIES.find(s=>s.id===id); if(n){n.x=parseInt(dragSticky.style.left)||n.x; n.y=parseInt(dragSticky.style.top)||n.y; saveStickies();} dragSticky=null; });
document.addEventListener("pointercancel",()=>{ dragSticky=null; });   // pencil palm-rejection cancels mustn't leave a sticky glued to the pointer

    if(RO)return;
    const rzh=e.target.closest("[data-mbrz]");
    if(rzh){ const card=rzh.closest(".mb-card"); if(!card)return; mbRz={id:rzh.getAttribute("data-mbrz"),card,sx:e.clientX,sy:e.clientY,w:card.offsetWidth,h:card.offsetHeight}; try{rzh.setPointerCapture(e.pointerId);}catch(_){}; e.preventDefault(); e.stopPropagation(); return; }
    if(e.target.closest("textarea,button,.mb-hex"))return;
    const card=e.target.closest(".mb-card"); if(!card)return;
    const board=document.getElementById("moodBoard"); if(!board)return; const br=board.getBoundingClientRect(), cr=card.getBoundingClientRect();
    mbDrag={id:card.getAttribute("data-mb"),card,br,ox:e.clientX-cr.left,oy:e.clientY-cr.top};
    card.style.zIndex=60; try{card.setPointerCapture(e.pointerId);}catch(_){}; e.preventDefault();

    if(!mbDrag)return; let x=e.clientX-mbDrag.br.left-mbDrag.ox, y=e.clientY-mbDrag.br.top-mbDrag.oy; x=Math.max(0,Math.min(x,mbDrag.br.width-28)); y=Math.max(0,Math.min(y,mbDrag.br.height-18)); mbDrag.card.style.left=x+"px"; mbDrag.card.style.top=y+"px";
  },true);

    if(mbRz){ const id=mbRz.id,w=parseInt(mbRz.card.style.width)||mbRz.card.offsetWidth,h=parseInt(mbRz.card.style.height)||mbRz.card.offsetHeight; mbRz=null; try{await mbUpdate(id,{w,h});}catch(_){}; render(); return; }

/* ===== resource center: drag rows to reorder ===== */
(function(){
  let rr=null;
  document.addEventListener("pointerdown",e=>{
    if(RO)return; const g=e.target.closest("[data-resgrip]"); if(!g)return;
    const row=g.closest("[data-resid]"), list=document.getElementById("artResList"); if(!row||!list)return;
    rr={row,list}; row.style.opacity=".55"; row.style.boxShadow="0 6px 18px rgba(120,90,140,.25)"; try{g.setPointerCapture(e.pointerId);}catch(_){}; e.preventDefault();
  },true);
  document.addEventListener("pointermove",e=>{
    if(!rr)return; const rows=[...rr.list.querySelectorAll("[data-resid]")];
    const after=rows.find(r=>{ if(r===rr.row)return false; const b=r.getBoundingClientRect(); return e.clientY < b.top+b.height/2; });
    if(after){ if(after!==rr.row.nextSibling) rr.list.insertBefore(rr.row,after); }
    else if(rr.list.lastElementChild!==rr.row){ rr.list.appendChild(rr.row); }
  },true);
  document.addEventListener("pointerup",async()=>{
    if(!rr)return; rr.row.style.opacity=""; rr.row.style.boxShadow=""; const order=[...rr.list.querySelectorAll("[data-resid]")].map(r=>r.getAttribute("data-resid")); rr=null;
    await DB.saveDaily(SENTINEL,n=>{ const cur=(n.artResources)||DEFAULT_ART_RES; const map=Object.fromEntries(cur.map(x=>[x.id,x])); const out=order.map(id=>map[id]).filter(Boolean); cur.forEach(x=>{ if(!order.includes(x.id))out.push(x); }); return {...n,artResources:out}; });
    render();
  },true);
  document.addEventListener("pointercancel",()=>{ if(!rr)return; rr.row.style.opacity=""; rr.row.style.boxShadow=""; rr=null; render(); },true);
})();

/* ===== touch drag-and-drop (iPad/phone): HTML5 DnD doesn't fire on touch, so for touch
   pointers we run a ghost + elementFromPoint drop. Desktop mouse keeps native DnD. ===== */
(function(){
  let TD=null, swallowClick=false;
  function pick(t){
    let e=t.closest&&t.closest(".cal-ev"); if(e&&e.dataset.eid)return {kind:"event",id:e.dataset.eid,el:e};
    let c=t.closest&&t.closest('[data-act="dragContent"]'); if(c)return {kind:"content",id:c.dataset.id,el:c};
    let s=t.closest&&t.closest('[data-act="dragSponsor"]'); if(s)return {kind:"sponsor",id:s.dataset.id,el:s};
    let k=t.closest&&t.closest('[data-act="dragTask"]'); if(k)return {kind:"task",id:k.dataset.id,el:k};
    let cl=t.closest&&t.closest('[data-act="dragClientTask"]'); if(cl)return {kind:"clienttask",id:cl.dataset.id,cid:cl.dataset.cid,el:cl};
    return null;
  }
  function targetAt(x,y,kind){
    const el=document.elementFromPoint(x,y); if(!el)return null;
    if(kind==="event"){ const c=el.closest(".cal-cell[data-date]"); return c?{type:"calcell",el:c,date:c.dataset.date}:null; }
    if(kind==="content"){ let t=el.closest('[data-act="dropStage"]'); if(t)return{type:"stage",el:t,stage:t.dataset.stage}; t=el.closest('[data-act="ccDrop"]'); if(t)return{type:"ccdate",el:t,date:t.dataset.date}; t=el.closest('[data-act="ccUnschedule"]'); if(t)return{type:"ccun",el:t}; return null; }
    if(kind==="sponsor"){ const t=el.closest('[data-act="dropSponsor"]'); return t?{type:"sponsor",el:t,stage:t.dataset.stage}:null; }
    if(kind==="task"){ const t=el.closest('[data-act="dropTaskStatus"]'); return t?{type:"taskstatus",el:t,status:t.dataset.status}:null; }
    if(kind==="clienttask"){ const t=el.closest('[data-act="dropClientNeed"]'); return t?{type:"clientneed",el:t,status:t.dataset.status}:null; }
    return null;
  }
  async function applyDrop(d,tg){
    if(d.kind==="event"&&tg.type==="calcell"){ await DB.saveDaily(SENTINEL,n=>{const evs=(n.calendarEvents||[]).slice();const t=evs.find(x=>x.id===d.id);if(t){if(t.endDate&&t.endDate>t.date){const dur=calDiff(t.date,t.endDate);t.date=tg.date;t.endDate=calAdd(tg.date,dur);}else t.date=tg.date;}return{...n,calendarEvents:evs};}); render(); return; }
    if(d.kind==="content"){ if(tg.type==="stage"){const patch={stage:tg.stage};if(tg.stage==="published")patch.published_at=new Date().toISOString();await DB.updateContent(d.id,patch);}else if(tg.type==="ccdate"){await DB.updateContent(d.id,{scheduled_for:tg.date});}else if(tg.type==="ccun"){await DB.updateContent(d.id,{scheduled_for:null});} render(); return; }
    if(d.kind==="sponsor"&&tg.type==="sponsor"){ await DB.updateSponsor(d.id,{stage:tg.stage}); render(); afterSponsorMove(d.id,tg.stage); return; }
    if(d.kind==="task"&&tg.type==="taskstatus"){ await setTaskStatus(d.id,tg.status); render(); return; }
    if(d.kind==="clienttask"&&tg.type==="clientneed"){ await setClientTaskStatus(d.cid,d.id,tg.status); render(); return; }
  }
  document.addEventListener("pointerdown",e=>{ if(e.pointerType==="mouse"||RO)return; const d=pick(e.target); if(!d)return; TD={...d,sx:e.clientX,sy:e.clientY,moved:false,ghost:null}; },true);
  document.addEventListener("pointermove",e=>{ if(!TD||e.pointerType==="mouse")return; const dx=e.clientX-TD.sx,dy=e.clientY-TD.sy; if(!TD.moved){ if(Math.abs(dx)+Math.abs(dy)<8)return; TD.moved=true; const r=TD.el.getBoundingClientRect(); const g=TD.el.cloneNode(true); g.classList.add("drag-ghost"); g.style.cssText="position:fixed;left:0;top:0;z-index:9998;pointer-events:none;opacity:.85;box-shadow:0 8px 22px rgba(80,70,110,.35);width:"+r.width+"px;"; TD.ox=e.clientX-r.left; TD.oy=e.clientY-r.top; document.body.appendChild(g); TD.ghost=g; try{TD.el.setPointerCapture(e.pointerId);}catch(er){} } e.preventDefault(); TD.ghost.style.transform="translate("+(e.clientX-TD.ox)+"px,"+(e.clientY-TD.oy)+"px)"; document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); const tg=targetAt(e.clientX,e.clientY,TD.kind); if(tg&&tg.el)tg.el.classList.add("drop-hot"); },true);
  document.addEventListener("pointerup",async e=>{ if(!TD||e.pointerType==="mouse")return; const d=TD; TD=null; if(d.ghost)d.ghost.remove(); document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); if(!d.moved)return; swallowClick=true; setTimeout(()=>swallowClick=false,350); const tg=targetAt(e.clientX,e.clientY,d.kind); if(tg)try{await applyDrop(d,tg);}catch(er){console.error(er);} },true);
  document.addEventListener("pointercancel",()=>{ if(!TD)return; if(TD.ghost)TD.ghost.remove(); document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); TD=null; },true);
  document.addEventListener("click",e=>{ if(swallowClick){ e.stopPropagation(); e.preventDefault(); swallowClick=false; } },true);
})();

let dragId=null,dragType=null,_lastPtr="mouse";
document.addEventListener("pointerdown",e=>{ _lastPtr=e.pointerType||"mouse"; },true);
/* Apple Pencil / touch: suppress Safari's NATIVE drag so only the pointer ghost-drag engine runs — otherwise both fire and drops glitch/double */
let dragCid=null;
document.addEventListener("dragstart",e=>{ if(_lastPtr!=="mouse"){ e.preventDefault(); return; } const cc=e.target.closest('[data-act="dragContent"]');const sc=e.target.closest('[data-act="dragSponsor"]');const tc=e.target.closest('[data-act="dragTask"]');const clt=e.target.closest('[data-act="dragClientTask"]');if(cc){dragId=cc.dataset.id;dragType="content";}else if(sc){dragId=sc.dataset.id;dragType="sponsor";}else if(tc){dragId=tc.dataset.id;dragType="task";}else if(clt){dragId=clt.dataset.id;dragCid=clt.dataset.cid;dragType="clienttask";}});
document.addEventListener("drop",async e=>{
  if(RO)return; const cs=e.target.closest('[data-act="dropStage"]');const ss=e.target.closest('[data-act="dropSponsor"]');const cd=e.target.closest('[data-act="ccDrop"]');const cu=e.target.closest('[data-act="ccUnschedule"]');const ts=e.target.closest('[data-act="dropTaskStatus"]');const cn=e.target.closest('[data-act="dropClientNeed"]');
  if(cd&&dragType==="content"&&dragId){e.preventDefault();await DB.updateContent(dragId,{scheduled_for:cd.dataset.date});dragId=null;render();}
  else if(cu&&dragType==="content"&&dragId){e.preventDefault();await DB.updateContent(dragId,{scheduled_for:null});dragId=null;render();}
  else if(cs&&dragType==="content"&&dragId){e.preventDefault();const stage=cs.dataset.stage;const patch={stage};if(stage==="published")patch.published_at=new Date().toISOString();await DB.updateContent(dragId,patch);dragId=null;render();}
  else if(ss&&dragType==="sponsor"&&dragId){e.preventDefault();const _sid=dragId;await DB.updateSponsor(_sid,{stage:ss.dataset.stage});dragId=null;render();afterSponsorMove(_sid,ss.dataset.stage);}
  else if(ts&&dragType==="task"&&dragId){e.preventDefault();await setTaskStatus(dragId,ts.dataset.status);dragId=null;render();}
  else if(cn&&dragType==="clienttask"&&dragId){e.preventDefault();await setClientTaskStatus(dragCid,dragId,cn.dataset.status);dragId=null;dragCid=null;render();}
});

/* 🕵️ crash detector: a heartbeat that survives reloads (sessionStorage is per-tab). If we boot and
   the last heartbeat was seconds ago WITHOUT a clean unload, the tab died and Chrome silently
   revived it — say so out loud instead of letting it masquerade as a mystery "refresh". */
(function(){ try{
  const hb=+(sessionStorage.getItem("eggie-hb")||0), clean=sessionStorage.getItem("eggie-clean")==="1";
  if(hb && (Date.now()-hb)<15000 && !clean){ console.warn("[boot] ⚠️ this tab was ALIVE "+Math.round((Date.now()-hb)/1000)+"s ago and did NOT unload cleanly — it crashed and Chrome silently reloaded it."); setTimeout(()=>{ try{ toast("⚠️ the tab crashed and reloaded itself — that's the 'double refresh'. Sparkles are now off by default to prevent it 💗",{ms:9000}); }catch(e){} },2500); }
  sessionStorage.removeItem("eggie-clean");
  setInterval(()=>{ try{ sessionStorage.setItem("eggie-hb",String(Date.now())); }catch(e){} },3000);
  addEventListener("beforeunload",()=>{ try{ sessionStorage.setItem("eggie-clean","1"); }catch(e){} });
}catch(e){} })();

/* ===== glowing sakura petal cursor trail (pink + white) =====
   ⚠️ OPT-IN since build .39 ("✨ sparkles" in Settings): petals + the bubble canvas together were
   heavy enough GPU/DOM churn to crash the tab on some machines — Chrome then silently reloads it,
   which looked exactly like "the page refreshed itself". Off by default. */
const FX_ON=()=>{ try{ return localStorage.getItem("eggie-fx")==="1"; }catch(e){ return false; } };
(function(){
  const reduce=()=>{ try{ return !FX_ON()||document.body.classList.contains("calm")||matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return true; } };
  let last=0, count=0; const MAX=(innerWidth<640?20:42), TH=(innerWidth<640?95:55);
  function spawn(x,y){
    if(reduce()||count>=MAX)return;
    const p=document.createElement("div"); p.className="petal";
    const size=(9+Math.random()*9).toFixed(0);
    const c1=Math.random()<0.5?"#ffffff":"#ffd9ee", c2=Math.random()<0.5?"#ff9ed8":"#ffc2e3";
    p.style.width=p.style.height=size+"px";
    p.style.left=(x-size/2)+"px"; p.style.top=(y-size/2)+"px";
    p.style.background=`radial-gradient(circle at 34% 28%, ${c1}, ${c2})`;
    p.style.boxShadow=`0 0 ${(6+Math.random()*9).toFixed(0)}px ${(1+Math.random()*2).toFixed(0)}px rgba(255,160,214,.55)`;
    p.style.setProperty("--dx",(Math.random()*64-32).toFixed(0)+"px");
    p.style.setProperty("--dy",(40+Math.random()*64).toFixed(0)+"px");
    p.style.setProperty("--dr",(Math.random()*340-120).toFixed(0)+"deg");
    p.style.setProperty("--o",(0.45+Math.random()*0.35).toFixed(2));
    p.style.animation=`petalFloat ${(1.6+Math.random()*1.5).toFixed(2)}s ease-out forwards`;
    document.body.appendChild(p); count++;
    p.addEventListener("animationend",()=>{ p.remove(); count--; });
  }
  window.addEventListener("pointermove",e=>{ if(e.pointerType!=="mouse")return; const now=performance.now(); if(now-last<TH)return; last=now; spawn(e.clientX,e.clientY); },{passive:true});
})();
/* ===== ambient bubble field — canvas, behind the boxes, plentiful + mouse-interactive 🐙 ===== */
(function(){
  if(!FX_ON()) return;                                  // sparkles are opt-in — no canvas, no RAF loop, zero cost when off
  const reduce=()=>{ try{ return !FX_ON()||document.body.classList.contains("calm")||matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return true; } };
  const cv=document.createElement("canvas"); cv.id="bubbleCanvas";
  cv.style.cssText="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;";
  document.body.appendChild(cv);
  const ctx=cv.getContext("2d");
  let DPR=Math.min(2,window.devicePixelRatio||1), W=0, H=0;
  function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=cv.width=Math.floor(innerWidth*DPR); H=cv.height=Math.floor(innerHeight*DPR); }
  resize(); addEventListener("resize",resize);
  /* pre-rendered bubble sprite (fast to stamp many times) */
  const SS=72, spr=document.createElement("canvas"); spr.width=spr.height=SS; const s=spr.getContext("2d");
  const g=s.createRadialGradient(SS*0.4,SS*0.37,SS*0.04,SS*0.5,SS*0.5,SS*0.5);
  g.addColorStop(0,"rgba(255,255,255,.95)"); g.addColorStop(.45,"rgba(200,228,255,.42)"); g.addColorStop(.82,"rgba(168,205,242,.12)"); g.addColorStop(1,"rgba(168,205,242,0)");
  s.fillStyle=g; s.beginPath(); s.arc(SS/2,SS/2,SS/2,0,6.2832); s.fill();
  s.lineWidth=1.6; s.strokeStyle="rgba(255,255,255,.5)"; s.beginPath(); s.arc(SS/2,SS/2,SS/2-1.6,0,6.2832); s.stroke();
  s.fillStyle="rgba(255,255,255,.92)"; s.beginPath(); s.arc(SS*0.36,SS*0.34,SS*0.09,0,6.2832); s.fill();
  let mx=-9999,my=-9999;
  addEventListener("pointermove",e=>{ mx=e.clientX*DPR; my=e.clientY*DPR; });
  addEventListener("pointerleave",()=>{ mx=my=-9999; });
  const COUNT=(innerWidth<640?34:90), bub=[];   // phones get a lighter sea — battery + smoothness
  function mk(seed){ const r=(7+Math.random()*22)*DPR; return { x:Math.random()*W, y: seed? Math.random()*H : H+r+Math.random()*60*DPR, r, sp:(0.35+Math.random()*0.95)*DPR, wob:Math.random()*6.28, wobsp:0.008+Math.random()*0.02, amp:(0.3+Math.random()*0.7)*DPR, o:0.2+Math.random()*0.4 }; }
  for(let i=0;i<COUNT;i++)bub.push(mk(true));
  const R=120; // mouse push radius (css px)
  function loop(){
    ctx.clearRect(0,0,W,H);
    if(reduce()){ requestAnimationFrame(loop); return; }
    const Rd=R*DPR;
    for(let i=0;i<COUNT;i++){ const b=bub[i];
      b.wob+=b.wobsp; b.y-=b.sp; b.x+=Math.sin(b.wob)*b.amp;
      const dx=b.x-mx, dy=b.y-my, d2=dx*dx+dy*dy;
      if(d2<Rd*Rd){ const d=Math.sqrt(d2)||1, f=(Rd-d)/Rd*3.2*DPR; b.x+=dx/d*f; b.y+=dy/d*f; }
      if(b.y< -b.r-12*DPR || b.x< -60*DPR || b.x>W+60*DPR){ const n=mk(false); b.x=n.x;b.y=n.y;b.r=n.r;b.sp=n.sp;b.wob=n.wob;b.wobsp=n.wobsp;b.amp=n.amp;b.o=n.o; }
      ctx.globalAlpha=b.o; ctx.drawImage(spr,b.x-b.r,b.y-b.r,b.r*2,b.r*2);
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
/* ===== modular drag-reorder + resize: iOS-style lift, follow, slide, settle ===== */
(function(){
  let d=null, sc=false, rafL=0;
  const gridEl=()=>document.querySelector(".grid-modular");
  function maxCols(){ const g=gridEl(); return g?Math.max(3,Math.min(16,Math.floor(g.clientWidth/88))):3; }
  function relayoutSoon(){ if(rafL)return; rafL=requestAnimationFrame(()=>{ rafL=0; try{layoutHome();}catch(_){} }); }
  function commitTabs(order){ try{ localStorage.setItem("tab-order",JSON.stringify(order)); }catch(e){} }
  function gtab(el){ const g=el&&el.closest&&el.closest(".grid-modular"); return g?g.dataset.tab:"home"; }
  function commitWidgetOrder(c,order){ setLayout(c.dataset.tab||"home",L=>{L.order=order;}).catch(()=>{}); }
  function commitWidgetSize(item,key,val){ setLayout(gtab(item),L=>{L.size=Object.assign({},L.size,{[key]:val});}).catch(()=>{}); }
  function moveGhost(x,y,scale){ if(d&&d.ghost)d.ghost.style.transform="translate("+(x-d.gx)+"px,"+(y-d.gy)+"px) scale("+(scale||1.04)+")"; }
  /* FLIP: smoothly slide siblings into their new spots after a DOM reorder */
  function flipReorder(c, mutate){
    const kids=[...c.children], firsts=kids.map(k=>k.getBoundingClientRect());
    mutate(); try{layoutHome();}catch(_){}
    kids.forEach((k,i)=>{ if(k===(d&&d.item))return; const a=firsts[i], b=k.getBoundingClientRect(), dx=a.left-b.left, dy=a.top-b.top; if(!dx&&!dy)return; k.style.transition="none"; k.style.transform="translate("+dx+"px,"+dy+"px)"; requestAnimationFrame(()=>{ k.style.transition=""; k.style.transform=""; }); });
  }
  document.addEventListener("pointerdown",e=>{
    if(RO||document.body.classList.contains("locked"))return;
    const rez=e.target.closest(".home-resize");
    if(rez){ const item=rez.closest(".home-widget"); if(item){ const r=item.getBoundingClientRect(), cur=parseInt(((item.style.gridColumn||"").match(/span (\d+)/)||[])[1]||"1"), panel=item.querySelector(".panel,section"), startH=panel?panel.getBoundingClientRect().height:160; d={mode:"resize",item,panel,key:item.getAttribute("data-w"),startW:r.width,startCols:cur,cols:cur,startH,h:startH,sx:e.clientX,sy:e.clientY,moved:false,cap:rez,pid:e.pointerId}; try{rez.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); } return; }
    const grip=e.target.closest(".home-grip");
    if(grip){ const item=grip.closest(".home-widget"), c=item&&item.parentElement; if(item&&c){ d={mode:"order",item,c,itemSel:".home-widget",key:"data-w",horiz:false,sx:e.clientX,sy:e.clientY,moved:false,cap:grip,pid:e.pointerId}; try{grip.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); } return; }
    const tab=e.target.closest("#nav .tab");
    if(tab){ const c=tab.parentElement; d={mode:"order",item:tab,c,itemSel:".tab",key:"data-tab",commit:commitTabs,horiz:true,sx:e.clientX,sy:e.clientY,moved:false,cap:tab,pid:e.pointerId}; try{tab.setPointerCapture(e.pointerId);}catch(_){} }
  },true);
  document.addEventListener("pointermove",e=>{
    if(!d)return;
    if(!d.moved){ if(Math.abs(e.clientX-d.sx)+Math.abs(e.clientY-d.sy)<6)return; d.moved=true;
      if(d.mode==="resize"){ d.item.classList.add("resizing"); }
      else { const r=d.item.getBoundingClientRect(); d.gx=d.sx-r.left; d.gy=d.sy-r.top; const g=d.item.cloneNode(true); g.classList.add("drag-clone"); g.classList.remove("reordering","dragsrc"); g.style.width=r.width+"px"; g.style.height=r.height+"px"; g.querySelectorAll(".home-tools,.home-resize").forEach(x=>x.remove()); document.body.appendChild(g); d.ghost=g; d.item.classList.add("dragsrc"); moveGhost(d.sx,d.sy); }
    }
    e.preventDefault();
    if(d.mode==="resize"){ const unit=d.startW/d.startCols||d.startW; let nc=Math.round((d.startW+(e.clientX-d.sx))/unit); nc=Math.max(3,Math.min(maxCols(),nc)); if(nc!==d.cols){ d.cols=nc; d.item.style.gridColumn="span "+nc; d.item.dataset.c=nc; } const nh=Math.max(120,Math.round(d.startH+(e.clientY-d.sy))); d.h=nh; if(d.panel)d.panel.style.minHeight=nh+"px"; d.item.dataset.h=nh; relayoutSoon(); return; }
    moveGhost(e.clientX,e.clientY);
    const el=document.elementFromPoint(e.clientX,e.clientY), over=el&&el.closest(d.itemSel);
    if(over&&over!==d.item&&over.parentElement===d.c){ const r=over.getBoundingClientRect(), before=d.horiz?(e.clientX<r.left+r.width/2):(e.clientY<r.top+r.height/2); const ref=before?over:over.nextSibling; if(ref!==d.item){ flipReorder(d.c, ()=>d.c.insertBefore(d.item, ref)); } }
  },true);
  document.addEventListener("pointerup",()=>{
    if(!d)return; const x=d; d=null;
    try{x.cap.releasePointerCapture(x.pid);}catch(_){}
    if(x.mode==="resize"){ x.item.classList.remove("resizing"); if(x.moved){ sc=true; setTimeout(()=>sc=false,350); commitWidgetSize(x.item,x.key,{c:x.cols,h:Math.round(x.h)}); try{layoutHome();}catch(_){} } return; }
    if(!x.moved){ return; }
    sc=true; setTimeout(()=>sc=false,350);
    // settle the floating clone into the placeholder's final spot, then reveal
    const fr=x.item.getBoundingClientRect();
    if(x.ghost){ x.ghost.style.transition="transform .2s cubic-bezier(.2,.8,.25,1),opacity .2s"; x.ghost.style.transform="translate("+fr.left+"px,"+fr.top+"px) scale(1)"; x.ghost.style.opacity="0"; const gh=x.ghost; setTimeout(()=>{ gh&&gh.remove(); },220); }
    x.item.classList.remove("dragsrc");
    const ord=[...x.c.querySelectorAll(x.itemSel)].map(it=>it.getAttribute(x.key));
    if(x.itemSel===".tab"){ commitTabs(ord); } else { commitWidgetOrder(x.c,ord); try{layoutHome();}catch(_){} }
  },true);
  document.addEventListener("pointercancel",()=>{ if(!d)return; if(d.ghost)d.ghost.remove(); if(d.item){d.item.classList.remove("dragsrc","resizing","reordering");} d=null; },true);
  document.addEventListener("click",e=>{ if(sc){ e.stopPropagation(); e.preventDefault(); sc=false; } },true);
})();

        await DB.saveDaily(SENTINEL,function(n){ return Object.assign({},n,{euPlans:(n.euPlans||[]).map(function(p){ if((p.title||"").toLowerCase().indexOf(ppn)>=0){ return Object.assign({},p,{steps:(p.steps||[]).map(function(s){ if(!phit&&(s.text||"").toLowerCase().indexOf(psn)>=0){phit=s;return Object.assign({},s,{done:(a.done!==false)});} return s; })}); } return p; })}); });
        return phit? "✅ "+(a.done!==false?"checked off":"reopened")+" “"+phit.text+"” — proud of you 🌸" : "couldn't find that step 🌸";
      }
      case "addPlanStep": {
        var apn=(a.plan||"").toLowerCase(), ahit=null;
        await DB.saveDaily(SENTINEL,function(n){ return Object.assign({},n,{euPlans:(n.euPlans||[]).map(function(p){ if(!ahit&&(p.title||"").toLowerCase().indexOf(apn)>=0){ahit=p;return Object.assign({},p,{steps:(p.steps||[]).concat([{id:uid(),text:String(a.text||"step").slice(0,160),done:false}])});} return p; })}); });
        return ahit? "➕ added a step to “"+ahit.title+"”" : "couldn't find that plan 🌸";
      }
      case "delPlan": {
        var dpn=(a.title||"").toLowerCase(), dhit=null;
        await DB.saveDaily(SENTINEL,function(n){ return Object.assign({},n,{euPlans:(n.euPlans||[]).filter(function(p){ if(!dhit&&(p.title||"").toLowerCase().indexOf(dpn)>=0){dhit=p;return false;} return true; })}); });
        return dhit? "🗑 removed the plan “"+dhit.title+"”" : "couldn't find that plan 🌸";
      }
      case "requestChange":
        if(!a.title) return "";
        await DB.saveDaily(SENTINEL,function(n){ var r=(n.osChangeRequests||[]).slice(); r.push({id:uid(),date:TODAY,title:String(a.title).slice(0,200),detail:String(a.detail||"").slice(0,1200),area:String(a.area||"other").slice(0,20),status:"new"}); if(r.length>100)r=r.slice(-100); return Object.assign({},n,{osChangeRequests:r}); });
        return "🛠️ noted on the wishlist for Claude: “"+String(a.title).slice(0,120)+"” (Settings → 🛠️ change requests)";
      case "forgetFact": {
        var nm=(a.hint||"").toLowerCase(); var hit=null;
        await DB.saveDaily(SENTINEL,function(n){ var f=(n.eugeneFacts||[]).filter(function(x){ var tx=typeof x==="string"?x:String(x&&x.text||""); if(!hit&&tx.toLowerCase().indexOf(nm)>=0){hit=tx;return false;} return true; }); return Object.assign({},n,{eugeneFacts:f}); });
        return hit? "🧠 forgotten" : "I don't have a memory like that 🌸";
      }
      case "optimizeTitle": {
        try{
          var r2=await aiCall("optimize",{kind:"video",title:a.title||"",topic:a.topic||"",format:a.format||"long",platform:a.platform||"youtube",footer:(CONFIG.descFooter||"")});
          if(r2&&r2._needsBackend) return "the optimizer needs the backend deployed first 🌸";
          if(r2&&r2.error) return "optimizer hiccuped: "+r2.error;
          var lines=["🎯 title score: "+(r2.titleScore!=null?r2.titleScore+"/100":"—")+(r2.titleWhy?" — "+r2.titleWhy:"")];
          (r2.titles||[]).slice(0,4).forEach(function(t,ix){ lines.push((ix+1)+". "+t); });
          if(r2.hashtags&&r2.hashtags.length) lines.push("tags: "+r2.hashtags.join(" "));
          return lines.join("\n");
        }catch(e){ return "optimizer hiccuped: "+(e.message||e); }
      }
      default: return "";
    }
  }
  /* Egg Jean speaks in plain text + emojis only — strip any markdown/asterisks/symbols a model might add */
  function plainText(s){ return String(s==null?"":s)
    .replace(/```[\s\S]*?```/g,"")        // code fences
    .replace(/`([^`]*)`/g,"$1")            // inline code
    .replace(/\*\*([^*]+)\*\*/g,"$1")      // **bold**
    .replace(/(^|[^*])\*([^*\n]+)\*/g,"$1$2") // *italic*
    .replace(/__([^_]+)__/g,"$1").replace(/(^|[^_])_([^_\n]+)_/g,"$1$2") // _underline_
    .replace(/~~([^~]+)~~/g,"$1")          // ~~strike~~
    .replace(/^\s{0,3}#{1,6}\s*/gm,"")     // # headings
    .replace(/^\s*[-*•]\s+/gm,"")          // bullet markers
    .replace(/[*_`#>~|]/g,"")              // any stray md symbols
    .replace(/\n{3,}/g,"\n\n")
    .trim(); }
  window.EUGENE_HIST = (function(){ try{ return JSON.parse(localStorage.getItem("eugene-hist")||"[]"); }catch(e){ return []; } })();   // rolling conversation memory — survives reloads
  function eugeneSpeak(text){
    try{ if(localStorage.getItem("eugene-speak")!=="1"||!window.speechSynthesis) return;
      var clean=String(text).replace(/[\u{1F000}-\u{1FAFF}]|[☀-➿]|[←-⇿]/gu,"").replace(/\s+/g," ").trim();
      if(!clean) return; var u=new SpeechSynthesisUtterance(clean.slice(0,500)); u.rate=1.04; u.pitch=1.1;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    }catch(e){}
  }
  async function runClientRelay(action){ if(DEMO||!SB)return "needs the backend deployed first 🌸"; try{
    var tok=""; try{ tok=((await SB.auth.getSession()).data.session||{}).access_token||""; }catch(e){}   // post-lockdown, the relay requires her real sign-in token
    var r=await fetch(CONFIG.url+"/functions/v1/discord",{method:"POST",headers:Object.assign({"content-type":"application/json","apikey":CONFIG.anonKey},tok?{authorization:"Bearer "+tok}:{}),body:JSON.stringify({op:"relay",userId:UID,action:action})}); var j=await r.json(); return j.message||(j.error?("hmm — "+j.error):"done"); }catch(e){ return "couldn't reach Discord: "+(e.message||e); } }
  window.runClientRelay=runClientRelay;
  async function runAgent(q,img){
    if(IS_MGR) return "I'm Eggie's personal assistant, so my brain stays hers — but the 🌸 hub is all yours! 💗";
    var hist=window.EUGENE_HIST.slice(-16);
    var mdl; try{ mdl=(SENT&&SENT.appConfig&&SENT.appConfig.assistantModel)||undefined; }catch(e){}
    var r = await aiCall("agent",{question:q,today:TODAY,tz:CAL_TZ_TARGET,history:hist,image:img||undefined,appBuild:APP_BUILD,news:OS_NEWS,model:mdl});
    if(r && r._needsBackend) return "I can actually run things once the analyze function is deployed + demo mode is off 🐙 — redeploy and I'll be your hands! 🌸";
    if(r && r.error) throw new Error(r.error);
    var acts = Array.isArray(r.actions)? r.actions : [];
    var did=[];
    for(var i=0;i<acts.length;i++){ try{ var m=await execAgentAction(acts[i]); if(m) did.push(m); }catch(e){ console.error("agent action failed",acts[i],e); } }
    if(did.length){ try{ render(); }catch(e){} }
    var reply = plainText(r.reply) || (did.length? "done!" : "okay!");
    if(did.length) reply += "\n\n"+did.join("\n");
    window.EUGENE_HIST.push({role:"me",text:(q||"")+(img?" 📷[she attached a photo]":"")},{role:"pet",text:reply});
    if(window.EUGENE_HIST.length>32) window.EUGENE_HIST=window.EUGENE_HIST.slice(-32);
    try{ localStorage.setItem("eugene-hist",JSON.stringify(window.EUGENE_HIST)); }catch(e){}
    eugeneSpeak(reply);
    try{ memorizeSoon(); }catch(e){}   // 🧠 quiet background memory pass — never blocks the reply
    return reply;
  }
  /* 🧠 long-term memory: after a couple of exchanges, quietly ask the brain to consolidate.
     Debounced 25s so it fires once per "sitting", skipped in 🕶 incognito or when memory is paused. */
  function memorizeSoon(){
    window._memN=(window._memN||0)+1;
    if(window._memN<2) return;                                     // wait for a real exchange, not a one-liner
    clearTimeout(window._memT);
    window._memT=setTimeout(async function(){
      try{
        if(state.euIncognito) return;
        var sentM=await DB.daily(SENTINEL);
        if(sentM&&sentM.eugeneMemory&&sentM.eugeneMemory.paused) return;
        var r=await aiCall("memorize",{history:window.EUGENE_HIST.slice(-14),today:TODAY});
        if(r&&r.ok){
          window._memN=0;
          try{ delete DB._c.daily[SENTINEL]; }catch(e){}           // server wrote the sentinel — drop the stale cache
          if(r.learned&&r.learned.length) toast("🧠 Egg Jean noted: "+r.learned[0]+(r.learned.length>1?" (+"+(r.learned.length-1)+" more)":""),{act:"memOpen",label:"see memory",ms:7000});
        }
      }catch(e){ /* memory is a bonus, never an error she has to see */ }
    },25000);
  }
  /* 🌙 reflection — the deep "dreaming" pass: reads her WHOLE OS and learns higher-level patterns.
     manual=true shows progress + reopens the panel; manual=false runs quietly (weekly auto-learn). */
  async function eugeneReflect(manual){
    if(DEMO||!SB){ if(manual)toast("Reflection needs the analyze function deployed 🐙"); return; }
    try{
      var sentR=await DB.daily(SENTINEL);
      if(sentR&&sentR.eugeneMemory&&sentR.eugeneMemory.paused){ if(manual)toast("Memory's paused — flip it back on to reflect 🌸"); return; }
      if(manual)toast("🌙 Egg Jean is reflecting on everything you've logged…");
      var r=await aiCall("reflect",{today:TODAY});
      if(r&&r._needsBackend){ if(manual)toast("Deploy the analyze function first 🐙"); return; }
      if(r&&r.error){ if(manual)toast(""+r.error); return; }
      try{ delete DB._c.daily[SENTINEL]; }catch(e){}                 // server graft-wrote the sentinel — drop stale cache
      if(manual){ toast("🧠✨ Egg Jean learned "+(((r&&r.insights)||[]).length)+" patterns about you"); memoryModal(); }
    }catch(e){ if(manual)toast("reflection hiccup: "+(e.message||e)); }
  }
  window.eugeneReflect=eugeneReflect;
  window.eugeneAsk = function(q,img){ return runAgent(q,img); };   // lets the 🥚 Ask Egg Jean tab share the same brain (img = optional photo dataURL)
  var W=64,H=64, row=function(r,n){ var a=[],c=(n||12); for(var i=0;i<c;i++)a.push({x:i*W,y:r*H,w:W,h:H}); return a; };
  window.PET = PetWidget.init({
    sheet:"pet-widget/Sprite Sheet.png", sheetW:768, sheetH:1216,   // Egg Jean sheet: 64×64 frames · 12 cols × 19 rows
    walk: row(0,12),              // top row = walk/idle cycle (if the walk looks off, change the row index or frame count)
    sit:  {x:0,y:0,w:W,h:H},      // first frame (top-left) = idle/sit
    jump: row(4,4),               // rising while thrown — row 4 (4 frames)
    fall: row(6,8),               // falling while thrown — row 6 (8 frames)
    scale:1.6, faces:"right", speed:42, frameMs:130,
    leftClear:86, rightClear:96,  // keep clear of the 🗒️+ (bottom-left) and focus timer (bottom-right)
    avatar:"pet-widget/egg-jean-icon.png",   // round chat-header face icon (Egg Jean)
    title:"Egg Jean", subtitle:"your cozy egg helper — ask or search the web 🥚",
    accentFrom:"#ec7faf", accentTo:"#a98fe0",
    font:"inherit",
    greetings:["pspsps… try \"add stream Friday 4pm\" 🥚","ask me to look something up on the web 🌐","tell me to add a task or event 🌸","need a hand? just tap me ✨","rest is productive too, you know 💜"],
    suggestions:[
      "I'm feeling aimless — pick ONE thing for me 🧭",
      "Break down my scariest task into tiny steps 🪄",
      "What's trending for VTuber shorts right now?",
      "How much money did I make this month?",
      "Give me 3 cozy short ideas for this week",
      "Add a stream this Friday at 4pm",
      "What's on my calendar coming up?"
    ],
    reduceMotion:function(){ try{ return document.body.classList.contains("calm") || matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return false; } },
    ask: async function(q,img){
      try{ return await runAgent(q,img); }
      catch(e){ throw new Error(e.message||"couldn't reach the OS brain"); }
    },
    pickPhoto: (typeof euScaleImage==="function") ? async function(file){ const data=await euScaleImage(file,1280,0.85); const thumb=await euScaleImage(file,160,0.7); return {data,thumb}; } : null
  });
  /* bubble taps open the chat — EXCEPT taps on action chips inside it (those go to the OS click handler) */
  setTimeout(function(){ var b=document.getElementById("petBubble"); if(b) b.onclick=function(e){ if(e.target&&e.target.closest&&e.target.closest("[data-act]"))return; try{ window.PET&&window.PET.open(); }catch(_){} }; },800);
  /* ---- Egg Jean's once-a-day check-in: a bubble with today's shape, built from her own data ---- */
  function showPetBubble(text,ms,html){ var b=document.getElementById("petBubble"); if(!b)return; if(html)b.innerHTML=html; else b.textContent=text; b.classList.remove("pet-hidden"); clearTimeout(b._h); b._h=setTimeout(function(){ b.classList.add("pet-hidden"); },ms||9000); }
  window.showPetBubble=showPetBubble;
  async function eugeneDailyBrief(){
    try{
      if(IS_MGR) return;
      var key="eugene-brief"; if(localStorage.getItem(key)===TODAY) return;
      var sent=await DB.daily(SENTINEL);
      var wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];
      var evs=(sent.calendarEvents||[]).filter(function(e){ return e.date===TODAY||(e.endDate&&e.date<=TODAY&&e.endDate>=TODAY); });
      var slot=slotsForDate(sent,TODAY).find(function(s){ return (s.day||"").slice(0,3)===wd; });
      var openT=(sent.tasks||[]).filter(function(t){ return !t.done; }).length;
      var ch=artChallengeState(sent);
      var bits=[];
      if(slot) bits.push("stream day 🔴 "+(slot.time||""));
      if(evs.length) bits.push(evs.map(function(e){return e.title;}).slice(0,2).join(" + ")+(evs.length>2?" +"+(evs.length-2):""));
      if(openT) bits.push(openT+" open task"+(openT>1?"s":""));
      if(ch.dayText&&!ch.dayDone) bits.push("art: "+ch.dayText);
      /* E4: the daily bubble doubles as a one-tap energy check-in — log spoons where your eyes already are */
      var day=await DB.daily(TODAY);
      var txt="hi! 🐙 today: "+(bits.length?bits.join(" · "):"a clear slate — spend a spoon on something fun 🌸");
      var eBtn=function(v,e2,l){ return '<button data-act="energy" data-v="'+v+'" data-bubbledismiss="1" style="border:1.5px solid #ecd7ef;background:#fff;border-radius:999px;padding:4px 10px;font:inherit;font-size:11.5px;cursor:pointer;color:#7c6a80'+((day.energy===v)?';background:#fde4ef;border-color:#ec7faf;color:#db5e98':'')+'">'+e2+" "+l+"</button>"; };
      var chips=day.energy?"":('<div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap"><span style="font-size:11px;color:#9b8aa0;align-self:center">🥄 spoons?</span>'+eBtn("low","🌙","low")+eBtn("medium","🌤","med")+eBtn("high","🌞","high")+"</div>");
      showPetBubble("",day.energy?15000:30000,'<div style="font-size:12.5px">'+esc(txt)+'</div>'+chips);
      localStorage.setItem(key,TODAY);
      /* 🌙 weekly auto-reflection — Egg Jean keeps learning on his own. Quietly runs at most once every 7 days
         (skipped if memory paused/incognito) so his INSIGHTS stay current without her lifting a finger. */
      try{
        var mm=sent.eugeneMemory||{};
        if(!DEMO&&SB&&!mm.paused&&!state.euIncognito){
          var last=mm.reflectedAt?Date.parse(mm.reflectedAt):0;
          if(!last || (Date.now()-last) > 7*864e5){ setTimeout(function(){ try{ window.eugeneReflect&&window.eugeneReflect(false); }catch(e){} }, 12000); }
        }
      }catch(e){}
    }catch(e){}
  }
  setTimeout(eugeneDailyBrief, 6500);
  /* 💡 proactive nudge — once a day, Egg Jean surfaces ONE timely, gentle thing (or stays quiet). Dismissible. */
  async function eugeneNudge(){
    try{
      if(DEMO||!SB||RO||state.euIncognito||IS_MGR) return;
      var key="eugene-nudge"; if(localStorage.getItem(key)===TODAY) return;
      var sentN=await DB.daily(SENTINEL);
      if(sentN&&sentN.eugeneMemory&&sentN.eugeneMemory.paused) return;
      var r=await aiCall("nudge",{today:TODAY});
      localStorage.setItem(key,TODAY);                          // once/day even if null — never spam
      try{ delete DB._c.daily[SENTINEL]; }catch(e){}            // server logged the nudge
      if(!r||!r.nudge) return;
      var btn = r.navTab ? '<button data-act="goTab" data-tab="'+esc(r.navTab)+'" data-bubbledismiss="1" style="border:1.5px solid #ecd7ef;background:#fff;border-radius:999px;padding:4px 11px;font:inherit;font-size:11.5px;cursor:pointer;color:#db5e98;margin-top:8px">'+esc(r.label||("open "+r.navTab))+' →</button>' : '';
      showPetBubble("", 24000, '<div style="font-size:12.5px">🐙 '+esc(r.nudge)+'</div>'+btn);
    }catch(e){}
  }
  setTimeout(eugeneNudge, 32000);
  /* ---- reminder watcher: while the OS is open, ping due reminders (browser notification + bubble + toast).
     Email delivery for closed-tab times is handled by the "reminders" Edge Function on a cron. ---- */
  async function checkReminders(){
    try{
      if(RO||IS_MGR) return;
      var sent=await DB.daily(SENTINEL); var rems=sent.reminders||[];
      var now=new Date(); var hm=("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2);
      var NAG=30*60000, MAXP=4;   // same wave clock as the cron — whichever fires first claims the wave
      var due=rems.filter(function(r){ if(r.done)return false; var dueNow=(r.date<TODAY||(r.date===TODAY&&(r.time||"09:00")<=hm)); var last=r.lastPing?Date.parse(r.lastPing):0; return dueNow&&(Date.now()-last>=NAG)&&((r.pings||0)<MAXP); });
      if(!due.length) return;
      due.forEach(function(r){
        var nudge=(r.pings||0)>0?("🔁 nudge "+((r.pings||0)+1)+"/"+MAXP+" · "):"";
        try{ if(window.Notification&&Notification.permission==="granted") new Notification("⏰ Egg Jean reminder",{body:nudge+r.text,icon:"favicon.png"}); }catch(e){}
        toast("⏰ "+nudge+r.text);
      });
      showPetBubble("⏰ psst — "+due.map(function(r){return r.text;}).join(" · ")+" (tap ✓ on the Planner when it's handled 💗)",20000);
      await DB.saveDaily(SENTINEL,function(n){ return Object.assign({},n,{reminders:(n.reminders||[]).map(function(r){ return due.some(function(d){return d.id===r.id;})?Object.assign({},r,{notified:true,lastPing:new Date().toISOString(),pings:(r.pings||0)+1}):r; })}); });
    }catch(e){}
  }
  setTimeout(checkReminders, 5000); setInterval(checkReminders, 30000);
})();
</script>
